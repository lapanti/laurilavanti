    - heading "Kirkkonummi" [level=2]
    - paragraph: Istun Kirkkonummen kunnanvaltuustossa. Se tarkoittaa äänestämistä budjeteista, kaavoituksesta, palvelusopimuksista ja infrastruktuurista — päätöksiä, jotka vaikuttavat suoraan siihen, millaista täällä on elää. Suurin osa näistä päätöksistä tehdään hiljaa, ilman julkista huomiota, ja juuri silloin on merkitystä sillä, kuka on paikalla ja mitä he ymmärtävät.
    - paragraph: "Paikallisesti ajamani asiat ovat samat kuin kansallisesti: digitaaliset palvelut, jotka oikeasti toimivat asukkaiden kannalta eivätkä vain täytä hankintalaatikkoja, kaavoitus, joka hyödyntää Kirkkonummen maastoa sen sijaan että taistelee sitä vastaan, ja joukkoliikenne, joka yhdistää kunnan eikä jätä kokonaisia asuinalueita autoistumisen varaan."
    - paragraph: "Kirkkonummi on kaksikielinen, rannikolla sijaitseva kunta, joka kasvaa nopeasti Helsingin seudun reunalla. Sillä on todellisia vahvuuksia — rantaviiva, luonto, monimuotoinen yhteisö — ja todellisia paineita: verotulopohja, joka kamppailee pysyä palvelutarpeen perässä, ja ratakäytävä, jolla on suuri merkitys koko seudun kehitykselle. Paikallispolitiikka täällä ei ole pientä politiikkaa."
