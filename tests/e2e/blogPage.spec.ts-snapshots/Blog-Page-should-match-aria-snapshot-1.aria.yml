    - heading "Vapaus" [level=2]
    - paragraph: Vapaus tekoälyn aikana ei ole abstraktio. Se on kysymys siitä, pysyykö datasi, viestintäsi ja arkesi sinun ominasi, kun suuri osa niitä ympäröivästä infrastruktuurista on jonkun toisen omistuksessa. Yksityisyydensuoja on perusoikeus — mutta laajempi kysymys on, säilyvätkö perusoikeudet teknologiassa, joka skaalaa valvontaa kaikille, koko ajan, lähes ilmaiseksi.
    - paragraph: "Olen rakentanut urallani ohjelmistoja ympäristöissä, joissa datan säännöt otetaan vakavasti — pankki- ja muilla säännellyillä aloilla. Se kokemus tekee yhden asian selväksi: yksityisyys ja perusoikeudet eivät suojaa itse itseään. Niitä suojaavat lait, hankintapäätökset ja ihmiset eduskunnassa, jotka osaavat lukea teknisen esityksen ja kertoa, tekeekö se mitä lupaa."
    - paragraph: Vapauden varmaksi tekeminen tekoälyn aikana edellyttää rehellisyyttä kompromisseista. Massavalvonta, biometriikan laajentaminen ja viestien automaattinen seulonta eivät ole neutraaleja työkaluja, joita vain odotetaan käytettävän viisaasti. Ne muotoilevat uudelleen kansalaisen ja valtion suhteen. Eduskunnan tehtävä on asettaa rajat ennen kuin työkalut on rakennettu — ei keskustella niistä jälkikäteen.
