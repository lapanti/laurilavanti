    - heading "Sivistys" [level=2]
    - paragraph: Suomen vahvuus on aina ollut sen ihmisissä ja heidän osaamisessaan. Tekoälyn aikana sivistyksen on pysyttävä saumattomana — varhaiskasvatuksesta työelämään asti — niin että jokainen voi kehittää potentiaaliaan täysimääräisesti. Silloin tekoälyn tuottavuushyödyt kertautuvat koko yhteiskunnalle, eivät vain niille joilla on jo valmiiksi hyvät lähtökohdat.
    - paragraph: Koulutus ei ole kuluerä, jota leikataan ensimmäisenä kun budjetti tiukkenee. Se on koko tekoälyaikaisen talouden infrastruktuuri. Säästöt opetuksesta, kirjastoista, ammatillisesta koulutuksesta ja aikuisopiskelusta maksetaan takaisin kymmenkertaisina, kun työmarkkinat muuttuvat nopeammin kuin ihmiset ehtivät kouluttautua uudelleen.
    - paragraph: Saumaton sivistys tarkoittaa, että polku pysyy auki — koulujen välillä, töiden välillä, elämänvaiheiden välillä. Tekoäly tekee tästä polusta tärkeämmän, ei vähemmän tärkeän. Maa, joka pitää polun auki kaikille, saa käyttöönsä koko kansansa potentiaalin. Se on vahvempi pohja kuin mikään muu kilpailuetu.
