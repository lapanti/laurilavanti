    - heading "Talous" [level=2]
    - paragraph: Suomen talouden on toimittava tekoälyn aikakaudella. Se tarkoittaa uusia yrityksiä, uusia työpaikkoja ja julkisia palveluita, jotka oikeasti käyttävät teknologiaa eivätkä osta sitä mustana laatikkona. Ilman teknologiaosaamista eduskunnassa päätökset tekoälyhankinnoista, datainfrastruktuurista ja työelämästä tekevät ihmiset, jotka eivät tiedä mitä ovat ostamassa.
    - paragraph: "Kirjoitan taloudesta sen kautta, mitä olen tehnyt yli vuosikymmenen ajan: rakentanut ohjelmistoja, myös pankkijärjestelmiä, joissa virheet maksavat sekunneissa. Tekoäly muuttaa työn, kilpailukyvyn ja julkisten palveluiden perustan. Suomi voi olla tässä edelläkävijä, mutta vain jos julkinen panostus suunnataan kotimaiseen osaamiseen sen sijaan, että se vuokrataan muutamalta ulkomaiselta alustalta."
    - paragraph: "Toimiva talous tekoälyn aikana ei ole iskulause. Se on konkreettista: osaamista, joka kestää murroksen yli, yrityksiä, jotka voivat rakentaa suomalaisen ja eurooppalaisen infrastruktuurin päälle, ja valtio, joka hankkii teknologiaa harkiten — ei hypen varassa."
