    - heading "Digitaalinen itsenäisyys" [level=2]
    - paragraph: Suomen ja Euroopan on hallittava omaa digitaalista infrastruktuuriaan. Olen Digitaalinen itsenäisyys -kansalaisaloitteen alullepanija, jolla vaaditaan Suomea vähentämään riippuvuuttaan muutamista ulkomaisista pilvipalveluntarjoajista.
    - paragraph: "/Suomen julkishallinto on voimakkaasti riippuvainen yhdysvaltalaisista hyperscalereista — Amazonista, Microsoftista ja Googlesta\\. Tämän riippuvuuden geopoliittinen riski on kasvanut merkittävästi vuoden \\d+ jälkeen\\. Suomalaisia ja eurooppalaisia vaihtoehtoja on olemassa: UpCloud on konkreettinen esimerkki suorituskykyisestä kotimaisesta pilvipalvelusta, jonka julkinen sektori voi valita jo tänään\\. Ajan julkisten IT-hankintojen pilkkomista ja avoimen lähdekoodin sekä eurooppalaisten toimittajien suosimista\\./"
    - paragraph: Digitaalinen itsenäisyys tarkoittaa myös datan siirrettävyyttä ja toimittajariippuvuuden välttämistä. Julkisella rahalla tuotetun julkisen datan tulee olla siirrettävää ja tallennettuna eurooppalaisessa oikeudenkäyttöalueessa — ei ulkomaisten voimien vallassa.
