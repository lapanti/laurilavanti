          - paragraph: Tekoälyä on esitetty ratkaisuna julkisten palveluiden kehittämiseen. Sillä voi olla roolinsa, mutta se ei korvaa ihmistä eikä selkeää suunnitelmaa.
      - listitem:
        - article "Kylmä riihi Kirkkonummelle":
