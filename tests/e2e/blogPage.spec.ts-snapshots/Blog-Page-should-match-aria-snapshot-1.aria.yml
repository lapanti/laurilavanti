- main:
  - heading "Kirjoituksia tekoälyn aikakaudelta" [level=1]
  - img "Lauri Lavanti istumassa jakkaralla ja nojaa korkeaan pöytään. Päällään hänellä on musta bleiseri ja sinivalkoinen kukkakuvioinen kauluspaita. Bleiserin taskussa on monivärinen taskuliina. Taustalla portaikko."
  - article:
    - paragraph: "Tekoäly muuttaa kaiken — työn, talouden ja sen, miten valtio palvelee meitä. Kirjoitan siitä, miten se vaikuttaa kolmeen asiaan, joiden on toimittava: talouteen, sivistykseen ja vapauteen. Niiden synteesi on digitaalinen itsenäisyys: yhteiskunta, joka käyttää teknologiaa omilla ehdoillaan."
    - heading "Mitä tarkoittaa elää tekoälyn aikakaudella?" [level=2]
    - paragraph: Käytännön kokemukseni on yli vuosikymmenen ajalta turvallisten ohjelmistojen ja pankkijärjestelmien rakentajana. Sitä taustaa vasten kirjoitan siitä, miksi tekoäly ei vain tehosta työtä vaan pakottaa miettimään uudelleen koko sosiaaliturvan, miksi digitaalinen itsenäisyys on välttämättömyys vapaan yhteiskunnan kannalta, ja miten varmistetaan, että teknologian hyödyt tulevat kaikille — ei vain harvoille.
