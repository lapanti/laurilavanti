- main:
  - heading "Kirjoitukset" [level=1]
  - img "Lauri Lavanti istumassa jakkaralla ja nojaa korkeaan pöytään. Päällään hänellä on musta bleiseri ja sinivalkoinen kukkakuvioinen kauluspaita. Bleiserin taskussa on monivärinen taskuliina. Taustalla portaikko."
  - article:
    - paragraph: "Tekoäly muuttaa kaiken — työn, talouden ja sen, miten valtio palvelee meitä. Kirjoitan siitä, miten se vaikuttaa kolmeen asiaan, joiden on toimittava: talouteen, sivistykseen ja vapauteen. Niiden synteesi on digitaalinen itsenäisyys: yhteiskunta, joka käyttää teknologiaa omilla ehdoillaan."
    - heading "Mitä tarkoittaa elää tekoälyn aikakaudella?" [level=2]
    - paragraph: Käytännön kokemukseni on yli vuosikymmenen ajalta turvallisten ohjelmistojen ja pankkijärjestelmien rakentajana. Sitä taustaa vasten kirjoitan siitä, miksi tekoäly ei vain tehosta työtä vaan pakottaa miettimään uudelleen koko sosiaaliturvan, miksi digitaalinen itsenäisyys on välttämättömyys vapaan yhteiskunnan kannalta, ja miten varmistetaan, että teknologian hyödyt tulevat kaikille — ei vain harvoille.
    - heading "Tekoäly" [level=2]:
      - link "Tekoäly":
        - /url: /fi/category/artificial-intelligence/
    - paragraph: Olen käyttänyt tekoälytyökaluja ammatillisesti lead developer -roolissa — argumentoin käytännön kokemuksesta. Suomen on tartuttava tekoälyyn aktiivisesti.
    - list:
      - listitem:
        - article "Tekoäly auttaa palvelujen turvaamisessa, mutta se ei ole ilmaista":
          - link "Lauri Lavanti seisoo kukkapaita päällään valkoisella taustalla. Tekoäly auttaa palvelujen turvaamisessa, mutta se ei ole ilmaista":
            - /url: /fi/blog/60/tekoaly-auttaa-palvelujen-turvaamisessa-mutta-se-ei-ole-ilmaista/
            - img "Lauri Lavanti seisoo kukkapaita päällään valkoisella taustalla."
            - heading "Tekoäly auttaa palvelujen turvaamisessa, mutta se ei ole ilmaista" [level=2]
          - complementary "Kirjoituksen \"Tekoäly auttaa palvelujen turvaamisessa, mutta se ei ole ilmaista\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Tekoäly":
                  - /url: /fi/category/artificial-intelligence/
              - listitem:
                - link "Kirkkonummi":
                  - /url: /fi/category/kirkkonummi/
              - listitem:
                - link "Digitalisaatio":
                  - /url: /fi/category/digitalisation/
              - listitem:
                - link "Sivistys":
                  - /url: /fi/category/learning/
          - paragraph: Konnevedellä tekoäly lyhensi käsittelyajan kahdesta kuukaudesta päiviin. Kirkkonummi on liian pieni yksin — mutta yhteistyöllä muutos on mahdollinen.
      - listitem:
        - article "Tekoäly muuttaa kehittäjän palkan perustan":
          - link "Kuvassa tietokoneen näyttö, jossa näkyy koodia. Tekoäly muuttaa kehittäjän palkan perustan":
            - /url: /fi/blog/57/tekoaly-ei-korvaa-koodareita-vaan-muuttaa-sen-mista-heille-maksetaan/
            - img "Kuvassa tietokoneen näyttö, jossa näkyy koodia."
            - heading "Tekoäly muuttaa kehittäjän palkan perustan" [level=2]
          - complementary "Kirjoituksen \"Tekoäly muuttaa kehittäjän palkan perustan\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Tekoäly":
                  - /url: /fi/category/artificial-intelligence/
              - listitem:
                - link "Digitalisaatio":
                  - /url: /fi/category/digitalisation/
              - listitem:
                - link "Sivistys":
                  - /url: /fi/category/learning/
              - listitem:
                - link "Talous":
                  - /url: /fi/category/economy/
          - paragraph: Tekoäly tekee kahdessa minuutissa sen, mihin kehittäjältä meni kaksi viikkoa. Koodin hinta romahtaa — mutta mistä kehittäjille sitten maksetaan?
      - listitem:
        - article /Vuosi \d+ on tekoälyn/:
          - link /Lauri Lavanti seisomassa peilin edessä puhelin kädessä, ottamassa itsestään kuvaa\. Päällä musta takki, valkoinen kauluspaita ja kaulassa vihreä kravatti\. Taustalla Helsingin Yliopiston päärakennuksen vaalea käytävä\. Vuosi \d+ on tekoälyn/:
            - /url: /fi/blog/47/vuosi-2026-on-tekoalyn/
            - img "Lauri Lavanti seisomassa peilin edessä puhelin kädessä, ottamassa itsestään kuvaa. Päällä musta takki, valkoinen kauluspaita ja kaulassa vihreä kravatti. Taustalla Helsingin Yliopiston päärakennuksen vaalea käytävä."
            - heading /Vuosi \d+ on tekoälyn/ [level=2]
          - complementary /Kirjoituksen "Vuosi \d+ on tekoälyn" meta-tiedot/:
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Digitalisaatio":
                  - /url: /fi/category/digitalisation/
              - listitem:
                - link "Tekoäly":
                  - /url: /fi/category/artificial-intelligence/
              - listitem:
                - link "Sivistys":
                  - /url: /fi/category/learning/
          - paragraph: Tekoäly muuttaa yhteiskuntaamme – mutta et ehkä odottaisi, miten. Suurimmat muutokset näemme yksityiselämässä ja lasten arjessa.
    - link "Kaikki kirjoitukset aiheesta Tekoäly →":
      - /url: /fi/category/artificial-intelligence/
    - heading "Talous" [level=2]:
      - link "Talous":
        - /url: /fi/category/economy/
    - paragraph: Suomen talous toimivaksi tekoälyn aikakaudella — uusia yrityksiä, uusia työpaikkoja ja julkisia palveluita, jotka käyttävät teknologiaa harkiten.
    - list:
      - listitem:
        - article "Vihreät – Markkinatalouden aito puolustaja":
          - link /Vihreiden puoluekokous Turussa \d+ Vihreät – Markkinatalouden aito puolustaja/:
            - /url: /fi/blog/62/vihreat-markkinatalouden-aito-puolustaja/
            - img /Vihreiden puoluekokous Turussa \d+/
            - heading "Vihreät – Markkinatalouden aito puolustaja" [level=2]
          - complementary "Kirjoituksen \"Vihreät – Markkinatalouden aito puolustaja\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Talous":
                  - /url: /fi/category/economy/
              - listitem:
                - link "Vihreät":
                  - /url: /fi/category/green-party/
              - listitem:
                - link "Kansallinen politiikka":
                  - /url: /fi/category/national-politics/
          - paragraph: Markkinatalous on tehokkain tunnettu tapa jakaa resursseja. Vihreät on sen ainoa aito puolustaja Suomessa – ei kamreritaloutta, vaan aitoja markkinoita.
      - listitem:
        - article "Velkajarrun ulkopuolelta ei tehdä vihreää talouspolitiikkaa":
