- main:
  - heading "Kirjoitukset" [level=1]
  - img "Lauri Lavanti istumassa jakkaralla ja nojaa korkeaan pöytään. Päällään hänellä on musta bleiseri ja sinivalkoinen kukkakuvioinen kauluspaita. Bleiserin taskussa on monivärinen taskuliina. Taustalla portaikko."
  - article:
    - paragraph: "Tekoäly muuttaa kaiken — työn, talouden ja sen, miten valtio palvelee meitä. Kirjoitan siitä, miten se vaikuttaa kolmeen asiaan, joiden on toimittava: talouteen, sivistykseen ja vapauteen. Niiden synteesi on digitaalinen itsenäisyys: yhteiskunta, joka käyttää teknologiaa omilla ehdoillaan."
    - heading "Mitä tarkoittaa elää tekoälyn aikakaudella?" [level=2]
    - paragraph: Käytännön kokemukseni on yli vuosikymmenen ajalta turvallisten ohjelmistojen ja pankkijärjestelmien rakentajana. Sitä taustaa vasten kirjoitan siitä, miksi tekoäly ei vain tehosta työtä vaan pakottaa miettimään uudelleen koko sosiaaliturvan, miksi digitaalinen itsenäisyys on välttämättömyys vapaan yhteiskunnan kannalta, ja miten varmistetaan, että teknologian hyödyt tulevat kaikille — ei vain harvoille.
    - heading "Tekoäly" [level=2]
    - paragraph: Olen käyttänyt tekoälytyökaluja ammatillisesti johtavan ohjelmistokehittäjän roolissa — argumentoin käytännön kokemuksesta, en teoriasta. Tekoäly on aikamme merkittävin tuottavuusmuutos, ja Suomen on tartuttava siihen aktiivisesti ja kriittisesti.
    - paragraph: Tekoäly vahvistaa sekä kykyjä että vahinkoja. Julkisen sektorin sovelluksissa — etuuspäätöksissä, luvankäsittelyssä, ennakoivassa poliisitoiminnassa — panokset ovat liian suuret, jotta järjestelmiä voitaisiin ottaa käyttöön ilman läpinäkyvyyttä ja inhimillistä valvontaa. Ajan selitettäviä algoritmeja merkityksellisiin päätöksiin, avoimen lähdekoodin malleja silloin kun mahdollista, ja pakollista ihmisvalvontaa yksilöiden oikeuksiin vaikuttavissa päätöksissä.
    - paragraph: Mitä voimakkaammaksi tekoäly kehittyy, sitä tärkeämmiksi yksityisyydensuoja tulee. Tekoälyjärjestelmät ovat tiedonnälkäisiä; ilman vahvoja tietosuojasääntöjä niistä tulee valvontainfrastruktuuria. EU:n tekoälysäädös on askel oikeaan suuntaan, mutta toimeenpanon on oltava sisällöllistä — ei pelkkää laatikoiden ruksimista.
