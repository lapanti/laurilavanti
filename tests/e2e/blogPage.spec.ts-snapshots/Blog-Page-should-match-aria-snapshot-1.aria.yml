    - heading "Sivistys" [level=2]:
      - link "Sivistys":
        - /url: /fi/category/learning/
    - paragraph: Tekoälyn aikana sivistyksen on pysyttävä saumattomana varhaiskasvatuksesta työelämään — ettei tuottavuushyöty kasaannu pienelle ryhmälle.
    - list:
      - listitem:
        - article "Tekoäly ei pysty mihin tahansa":
          - link "Kuvituskuva tekoälylle, jossa on piirretty ihmisen päätä muistuttava kone, johon tulee ja josta lähtee erilaisia sähköisiä virtauksia Tekoäly ei pysty mihin tahansa":
