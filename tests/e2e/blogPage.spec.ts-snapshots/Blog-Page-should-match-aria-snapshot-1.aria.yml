    - paragraph: Kirjoitan teknologiasta, taloudesta ja kunnallispolitiikasta Kirkkonummella. Uskon, että hyvä politiikka perustuu tietoon ja avoimeen keskusteluun. Lue kirjoituksiani ja ota rohkeasti kantaa.
