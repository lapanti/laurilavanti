- main:
  - heading "Lauri Lavanti" [level=1]
  - heading "Expertise for the age of AI" [level=2]
  - img "Lauri Lavanti resting his hands against each other and looking at the camera with a smile. He is wearing a white dress shirt and a dark blazer. Photo by Erkki Laine."
  - article:
    - paragraph: "For decades, Finland has been a model country for high technology and expertise – from Vaisala to icebreakers, Nokia, Linux, and Supercell. Now, however, this position is under threat. At the same time, AI is fundamentally transforming society: it is changing work, trust in digital services, and human connections. Additionally, the state’s financial situation sets limits on what we can do."
    - heading "Why do we need new thinking right now?" [level=2]
    - paragraph: Now more than ever, we need expertise and understanding of technology, AI, and business. I have a technology education from Aalto University and over a decade of practical experience developing secure software and banking services. I understand the different ways business can be conducted and the connection between all of this and society and the rule of law, which sets limits for technology.
    - paragraph: "Some of these limits are particularly valuable: they protect everyone’s privacy and fundamental rights. Privacy protection is not a brake on development, but a prerequisite for democracy."
    - paragraph: I am Lauri Lavanti, a municipal councilor from Kirkkonummi, Chair of the Green Council Group, father of four, lead developer, and Master of Science in Technology. On these pages, you will find my thoughts on the future and what lies ahead for us.
    - heading "Newsletter" [level=2]
    - paragraph: Subscribe to receive digested explanations and analysis of the latest technologies and their impact on society. Straight to your inbox.
    - text: Email
    - textbox "Email"
    - paragraph:
      - text: You can unsubscribe at any time. For more information, read our
