    - region "Frequently Asked Questions":
      - heading "Frequently Asked Questions" [level=2]
      - term: Which party does Lauri Lavanti belong to?
      - definition: Lauri Lavanti is a member of The Greens (Vihreät) and serves as a municipal councillor in Kirkkonummi and chair of the Green council group.
      - term: What are Lauri Lavanti's key policy areas?
      - definition: Lauri Lavanti focuses on digitalization, privacy, and the responsible adoption of AI. He combines IT expertise with economic thinking to advocate for technology policy that serves both competitiveness and sustainability.
      - term: What is Lauri Lavanti's professional background?
      - definition: Lauri Lavanti is a lead software developer at a bank and a Master of Science (Tech.) from Aalto University. He works at the intersection of technology and society, focusing on digitalization, privacy, and responsible AI adoption.
      - term: How does Lauri Lavanti combine technology and politics?
      - definition: Lauri Lavanti brings hands-on IT expertise to political decision-making, examining challenges as both technical and societal systems. His goal is to ensure that public administration keeps pace with technological development.