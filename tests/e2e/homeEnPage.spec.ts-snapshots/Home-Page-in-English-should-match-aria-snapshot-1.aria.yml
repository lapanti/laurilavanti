  - article:
    - paragraph: I’m Lauri Lavanti – Municipal Councillor in Kirkkonummi for the Greens, lead software developer and M.Sc. (Tech.). I combine IT expertise, economic thinking, and local government experience, because a good municipality in the digital age needs all three. Browse my blog posts, or subscribe to the newsletter to get them straight to your inbox.
    - heading "Newsletter" [level=2]
    - paragraph: Subscribe to receive digested explanations and analysis of the latest technologies and their impact on society. Straight to your inbox.
    - text: Email
    - textbox "Email"
    - paragraph:
      - text: You can unsubscribe at any time. For more information, read our
      - link "privacy policy":
        - /url: /en/privacy-policy/
