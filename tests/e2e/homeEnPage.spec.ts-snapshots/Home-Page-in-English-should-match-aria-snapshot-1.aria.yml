    - region "Frequently Asked Questions":
      - heading "Frequently Asked Questions" [level=2]
      - term: What does AI mean for the Finnish economy?
      - definition: AI is transforming the foundations of work, competitiveness, and public services — Finland needs to build its own expertise rather than becoming dependent on foreign platforms. Lauri Lavanti argues that economic policy must respond to this shift with concrete technological knowledge, not just general statements.
      - term: Why is privacy protection a political issue?
      - definition: "Privacy is a fundamental right that risks becoming stratified: those with the resources and knowledge protect themselves, while others cannot. Lauri Lavanti treats digital privacy as an equality issue that requires both legislation and genuine technical understanding."
      - term: What does digital independence mean in practice?
      - definition: Digital independence means that public services, critical infrastructure, and citizens' data are not at the mercy of a handful of foreign corporations. Lauri Lavanti advocates for policies where Finland and the EU build their own technology base, rather than purchasing surveillance capacity from abroad.
      - term: How does technical expertise show up in political decision-making?
      - definition: Lauri Lavanti brings hands-on experience in software development and digital systems to decision-making — he can tell when a technical argument holds and when it's just a sales pitch. His goal is for the public sector to keep pace with technological development and not procure solutions it doesn't understand.