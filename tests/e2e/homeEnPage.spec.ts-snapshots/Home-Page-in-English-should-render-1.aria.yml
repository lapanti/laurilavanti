- main:
  - article:
    - heading "Lauri Lavanti" [level=1]
    - heading "About everyday life at the heart of digitalisation" [level=2]
    - img "Lauri Lavanti resting his chin on his hands and looking to the right, wearing a suit with a green tie"
    - list:
      - listitem:
        - article "Digital independence is a necessity":
          - link "A cartoon image showing a blonde woman holding a laptop computer. The Finnish flag is displayed on the computer screen. A bald eagle is attempting to snatch the computer from the woman. The image is surrounded by text that reads 'Digital independence', 'Digitaalinen itsenäisyys' and 'Digital självständighet'. Copyright for the image belongs to the Digital Independence citizens' initiative. Digital independence is a necessity":
            - /url: /en/blog/51/digital-independence-is-a-necessity/
            - img "A cartoon image showing a blonde woman holding a laptop computer. The Finnish flag is displayed on the computer screen. A bald eagle is attempting to snatch the computer from the woman. The image is surrounded by text that reads 'Digital independence', 'Digitaalinen itsenäisyys' and 'Digital självständighet'. Copyright for the image belongs to the Digital Independence citizens' initiative."
            - heading "Digital independence is a necessity" [level=2]
          - complementary "Meta information for post \"Digital independence is a necessity\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Digital independence":
                  - /url: /en/category/digitaalinen-itsenaisyys/
              - listitem:
                - link "#Digitalisation":
                  - /url: /en/category/digitalisaatio/
          - paragraph: As Russia's neighbor, Finland has learned to be prepared. However, the concepts of security of supply and sovereignty have not spread to digital services.
      - listitem:
        - article "The West Railway decision revealed problems in Kirkkonummi's long-term strategic development":
          - link "Lauri Lavanti leaning against a tall table. He is wearing a black blazer and a blue-and-white floral-patterned shirt. There is a multicoloured pocket square in the blazer pocket. Windows in the background. The West Railway decision revealed problems in Kirkkonummi's long-term strategic development":
            - /url: /en/blog/50/the-west-railway-decision-revealed-problems-in-kirkkonummis-long-term-strategic-development/
            - img "Lauri Lavanti leaning against a tall table. He is wearing a black blazer and a blue-and-white floral-patterned shirt. There is a multicoloured pocket square in the blazer pocket. Windows in the background."
            - heading "The West Railway decision revealed problems in Kirkkonummi's long-term strategic development" [level=2]
          - complementary "Meta information for post \"The West Railway decision revealed problems in Kirkkonummi's long-term strategic development\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Infrastructure":
                  - /url: /en/category/infra/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Western railway":
                  - /url: /en/category/lansirata/
          - paragraph: In making the West Railway decision, the ability of decision-makers to make strategically important, forward-looking decisions for the whole municipality was tested.
      - listitem:
        - article "Lyyra, the House of Culture, opens new possibilities and points the way for Kirkkonummi's future":
          - link "An image of Kirkkonummi's new upper secondary school campus, the House of Culture Lyyra, still under construction. Lyyra, the House of Culture, opens new possibilities and points the way for Kirkkonummi's future":
            - /url: /en/blog/49/lyyra-the-house-of-culture-opens-new-possibilities-and-points-the-way/
            - img "An image of Kirkkonummi's new upper secondary school campus, the House of Culture Lyyra, still under construction."
            - heading "Lyyra, the House of Culture, opens new possibilities and points the way for Kirkkonummi's future" [level=2]
          - complementary "Meta information for post \"Lyyra, the House of Culture, opens new possibilities and points the way for Kirkkonummi's future\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Culture & education":
                  - /url: /en/category/sivistys/
          - paragraph: The renovation of Kirkkonummi's centre, in which the cluster of culture formed by Fyyri, Lyyra and Rovastinpuisto is being built, creates conditions for growth in the municipality for decades to come.
      - listitem:
        - article "The use of biometric identifiers in passports must not be expanded":
          - link "A photo of Atte Harjanne and Lauri Lavanti. Both are wearing a black jacket and shirt. The use of biometric identifiers in passports must not be expanded":
            - /url: /en/blog/48/the-use-of-biometric-identifiers-in-passports-must-not-be-expanded/
            - img "A photo of Atte Harjanne and Lauri Lavanti. Both are wearing a black jacket and shirt."
            - heading "The use of biometric identifiers in passports must not be expanded" [level=2]
          - complementary "Meta information for post \"The use of biometric identifiers in passports must not be expanded\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Technology":
                  - /url: /en/category/teknologia/
              - listitem:
                - link "#Privacy":
                  - /url: /en/category/yksityisyydensuoja/
          - paragraph: When fingerprints were introduced in passports, an electronic register was created in Finland in which they are stored. It was only meant to be for proving identity, but now the government plans to grant the police access to it.
      - listitem:
        - article /\d+ is the year of AI/:
          - link /Lauri Lavanti standing in front of a mirror with a phone in his hand, taking a selfie\. Wearing a black jacket, white shirt and green tie\. In the background, the light corridor of the main building of the University of Helsinki\. \d+ is the year of AI/:
            - /url: /en/blog/47/2026-is-the-year-of-ai/
            - img "Lauri Lavanti standing in front of a mirror with a phone in his hand, taking a selfie. Wearing a black jacket, white shirt and green tie. In the background, the light corridor of the main building of the University of Helsinki."
            - heading /\d+ is the year of AI/ [level=2]
          - complementary /Meta information for post "\d+ is the year of AI"/:
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Digitalisation":
                  - /url: /en/category/digitalisaatio/
              - listitem:
                - link "#Artificial intelligence":
                  - /url: /en/category/tekoaly/
          - paragraph: This year we will see how AI affects our society no longer merely as a new tool but as part of society's structures. Right now it is an opportunity for us.
      - listitem:
        - article "I voted for the Western Rail Link":
          - link /A visualisation by Länsirata Oy of what the Veikkola railway station could look like\. The image shows tracks, platforms and a pedestrian overpass\. Taken from https:\/\/lansirata\.sitowise\.com\/\?link=Pysm6# on 8 December \d+\. I voted for the Western Rail Link/:
            - /url: /en/blog/46/i-voted-for-the-western-rail-link/
            - img /A visualisation by Länsirata Oy of what the Veikkola railway station could look like\. The image shows tracks, platforms and a pedestrian overpass\. Taken from https:\/\/lansirata\.sitowise\.com\/\?link=Pysm6# on 8 December \d+\./
            - heading "I voted for the Western Rail Link" [level=2]
          - complementary "Meta information for post \"I voted for the Western Rail Link\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Infrastructure":
                  - /url: /en/category/infra/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Western railway":
                  - /url: /en/category/lansirata/
          - paragraph: I voted for the Western Rail Link. As this is an extremely significant decision that will affect Kirkkonummi for decades if not centuries, I feel it is my duty to justify my decision comprehensively.
      - listitem:
        - article "Fundamental rights must not be dismantled without justification":
          - link "An image of the lights on the roof of a police car. Fundamental rights must not be dismantled without justification":
            - /url: /en/blog/45/fundamental-rights-must-not-be-dismantled-without-justification/
            - img "An image of the lights on the roof of a police car."
            - heading "Fundamental rights must not be dismantled without justification" [level=2]
          - complementary "Meta information for post \"Fundamental rights must not be dismantled without justification\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Technology":
                  - /url: /en/category/teknologia/
              - listitem:
                - link "#Privacy":
                  - /url: /en/category/yksityisyydensuoja/
          - paragraph: The government plans to expand the use of intelligence legislation methods to combat crime. Particularly concerning is the plan to breach fundamental rights by means of the emergency constitutional amendment procedure.
      - listitem:
        - article "AI cannot do everything":
          - link "An illustrative image for artificial intelligence, depicting a machine resembling a human head with various electronic currents flowing in and out of it. AI cannot do everything":
            - /url: /en/blog/44/ai-cannot-do-everything/
            - img "An illustrative image for artificial intelligence, depicting a machine resembling a human head with various electronic currents flowing in and out of it."
            - heading "AI cannot do everything" [level=2]
          - complementary "Meta information for post \"AI cannot do everything\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Digitalisation":
                  - /url: /en/category/digitalisaatio/
              - listitem:
                - link "#Artificial intelligence":
                  - /url: /en/category/tekoaly/
          - paragraph: AI has been presented as a means of making Finland's public services the best in the world. It may indeed have its own role in that, but the most important thing would be a comprehensive evaluation.