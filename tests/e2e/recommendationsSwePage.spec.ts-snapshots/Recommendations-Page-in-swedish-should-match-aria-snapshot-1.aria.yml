        - article:
          - img "Foto på Atte Harjanne. Han bär en vit skjorta och en mörk kavaj."
          - blockquote:
            - paragraph:
              - emphasis: Eduskunnassa on iso vaje teknologian ja tietopolitiikan asiantuntijoista. Lauri paikkaisi tätä vajetta isosti!
            - text: Atte Harjanne Riksdagsledamot
