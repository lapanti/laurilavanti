- main:
  - heading "Rekommendationer och vittnesbörd om Lauri" [level=1]
  - img "Lauri Lavanti stående i en korridor med händerna i fickorna, blicken mot kameran. Iklädd mörk kostym och vit skjorta."
  - article:
    - complementary "Varför välja Lauri?":
      - heading "Varför välja Lauri?" [level=2]
      - list:
        - listitem: » Lauri fyller riksdagens kunskapsbrist inom teknik- och informationspolitik. Just sådana experter som han behövs.
        - listitem: » Lauri är en intelligent och skicklig påverkare. Hans samarbetsförmåga uppskattas också i arbetslivet och över partigränserna.
        - listitem: » Lauri förenar teknik, ekonomi och rättvisa. Han har en vision om ett bättre samhälle.
        - listitem: » Lauri driver Finlands digitala självständighet. Han fokuserar på människoorienterade och ekonomiskt hållbara lösningar.
        - listitem: » På denna sida har vi samlat rekommendationer från personer som känner Lauri.
      - button "Mer"
    - list:
      - listitem:
        - article:
          - img "Foto på Atte Harjanne. Han bär en vit skjorta och en mörk kavaj."
          - blockquote:
            - paragraph:
              - emphasis: Eduskunnassa on iso vaje teknologian ja tietopolitiikan asiantuntijoista. Lauri paikkaisi tätä vajetta isosti!
            - text: Atte Harjanne Riksdagsledamot
      - listitem:
        - article:
          - img "Foto på Mari Holopainen. Hon bär en ljus jacka."
          - blockquote: Mari Holopainen Riksdagsledamot
      - listitem:
        - article:
          - img "Foto på Otso Kivekäs. Han bär en t-shirt med texten Helsinki och en kavaj, samt en hatt."
          - blockquote: Otso Kivekäs VD, stadsfullmäktigeledamot
      - listitem:
        - article:
          - img "Foto på Aki Koikkalainen. Iklädd en vit skjorta och en mörk kavaj."
          - blockquote:
            - paragraph:
              - emphasis: Jos kuitenkin äänestät vihreitä, anna äänesi Laurille. Älystä ja osaamisesta on hyötyä ihan joka puolueessa!
            - text: Aki Koikkalainen Verkställande direktör
      - listitem:
        - article:
          - img "Foto på Juho Makkonen. Han bär en beige tröja."
          - blockquote:
            - paragraph:
              - emphasis: Laurissa vankka osaaminen teknologiasta ja taloudesta yhdistyy vahvaan visioon siitä, miten yhteiskunnasta rakennetaan oikeudenmukaisempi ja parempi paikka kaikille, samalla ympäristöstä huolehtien.
            - text: Juho Makkonen VD, Sharetribe Oy
      - listitem:
        - article:
          - img "Foto på Allu Pyhälammi. Han bär en mörk kavaj och en stor halsduk."
          - blockquote:
            - paragraph:
              - emphasis: Lauri on hyvin nopeasti osoittanut suurta omistautumista ja aktiivisuutta maailman muuttamiselle ja Vihreän politiikan teolle! Häneltä hoituu niin järjestön pyörittäminen, poliittisten teemojen syväosaaminen, vahva ja kestävä sosiaalisen median näkyvyys ja hienot verkostotaidot. Hän on mm. kunnostautunut Suomen digitaalista itsenäisyyttä ajavana moottorina, jolla on aina ihmisen hyvinvointi ja järkevät talousratkaisut toimintansa keskiössä.
            - text: Allu Pyhälammi Grönas vice ordförande
      - listitem:
        - article:
          - img "Foto på Sofia Virta. Hon bär en blå skjorta och en skinnjacka."
          - blockquote: Sofia Virta Riksdagsledamot