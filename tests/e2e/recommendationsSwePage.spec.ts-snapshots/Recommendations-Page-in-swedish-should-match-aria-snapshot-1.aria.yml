      - listitem:
        - article:
          - img "Foto på Allu Pyhälammi. Han bär en mörk kavaj och en stor halsduk."
          - blockquote:
            - paragraph:
              - emphasis: Lauri on hyvin nopeasti osoittanut suurta omistautumista ja aktiivisuutta maailman muuttamiselle ja Vihreän politiikan teolle! Häneltä hoituu niin järjestön pyörittäminen, poliittisten teemojen syväosaaminen, vahva ja kestävä sosiaalisen median näkyvyys ja hienot verkostotaidot. Hän on mm. kunnostautunut Suomen digitaalista itsenäisyyttä ajavana moottorina, jolla on aina ihmisen hyvinvointi ja järkevät talousratkaisut toimintansa keskiössä.
            - text: Allu Pyhälammi Grönas vice ordförande
      - listitem:
        - article:
          - img "Foto på Sofia Virta. Hon bär en blå skjorta och en skinnjacka."
          - blockquote: Sofia Virta Riksdagsledamot