- main:
  - heading "Rekommendationer och vittnesmål om Lauri" [level=1]
  - img "Lauri Lavanti stående i en korridor med händerna i fickorna, blicken mot kameran. Iklädd mörk kostym och vit skjorta."
  - article:
    - complementary "Varför välja Lauri?":
      - heading "Varför välja Lauri?" [level=2]
      - list:
        - listitem: » Lauri fyller riksdagens kunskapsbrist inom teknik- och informationspolitik. Just sådana experter som han behövs.
        - listitem: » Lauri är en intelligent och skicklig påverkare. Hans samarbetsförmåga uppskattas också i arbetslivet och över partigränserna.
        - listitem: » Lauri förenar teknik, ekonomi och rättvisa. Han har en vision om ett bättre samhälle.
        - listitem: » Lauri driver Finlands digitala självständighet. Han fokuserar på människoorienterade och ekonomiskt hållbara lösningar.
        - listitem: » På denna sida har vi samlat rekommendationer från personer som känner Lauri.
      - button "Mer"
    - paragraph: På denna sida finns rekommendationer och kommentarer om Lauri Lavanti.
    - heading "Varför behövs teknisk kompetens just nu?" [level=2]
    - paragraph: "Finland har i decennier varit ett föredöme för hög teknik och kompetens – från Vaisala till isbrytare, Nokia, Linux och Supercell. Nu är dock denna ställning hotad, och AI revolutionerar samhället på ett grundläggande sätt: det förändrar arbete, förtroendet för digitala tjänster och människors inbördes relationer. Vi behöver kompetens och förståelse för teknik, AI och näringsliv. Jag har en teknisk utbildning från Aalto-universitetet och över ett decennium av erfarenhet som utvecklare av säkra programvaror och banktjänster. Jag förstår de olika sätten att bedriva näringsverksamhet samt sambandet mellan allt detta och samhället och rättsstaten, som sätter gränser för teknologin."
    - paragraph: "En del av dessa gränser är särskilt värdefulla: de skyddar allas integritet och grundläggande rättigheter. Integritetsskydd är ingen broms för utvecklingen, utan en förutsättning för demokratin."
    - paragraph: Läs rekommendationerna nedan!
