- main:
  - heading "Aiheet – tekoäly, yksityisyys ja koulutus" [level=1]
  - img "Lauri Lavanti istumassa jakkaralla ja nojaa korkeaan pöytään. Päällään hänellä on musta bleiseri ja sinivalkoinen kukkakuvioinen kauluspaita. Bleiserin taskussa on monivärinen taskuliina. Taustalla portaikko."
  - article:
    - paragraph: Suomi on rakentanut teknologista osaamistaan vuosikymmeniä — Vaisalasta jäänmurtajiin, Nokiaan, Linuxiin ja Supercelliin. Nyt se asema on horjumassa, ja samaan aikaan tekoäly muuttaa työtä, digitaalisia palveluita ja ihmisten välisiä yhteyksiä nopeammin kuin päätöksentekijät ehtivät reagoida.
    - paragraph: Liian usein päätöksenteosta puuttuu ymmärrys siitä, miten teknologia toimii ja miten se vaikuttaa yhteiskuntaan. Olen diplomi-insinööri Aalto-yliopistosta, ja minulla on yli vuosikymmenen kokemus turvallisten ohjelmistojen ja pankkipalveluiden kehittäjänä. Tiedän, miten järjestelmät toimivat — ja mitä tapahtuu, kun ne eivät toimi.
    - paragraph: Alta löydät tarkemmin eri aiheisiin jaoteltuna ajatuksiani. Tekoälystä talouteen, sivistykseen ja vapauteen, sekä digitaaliseen itsenäisyyteen.
    - heading "Tekoäly" [level=2]:
      - link "Tekoäly":
        - /url: /fi/category/artificial-intelligence/
    - paragraph: Olen käyttänyt tekoälytyökaluja ammatillisesti lead developer -roolissa — argumentoin käytännön kokemuksesta. Suomen on tartuttava tekoälyyn aktiivisesti.
    - heading "Teknologia" [level=2]:
      - link "Teknologia":
        - /url: /fi/category/technology/
    - paragraph: Suomella on vahva teknologiaosaamisen perinne. Sen ylläpitäminen edellyttää käytännön asiantuntemusta poliittisten päätösten pöydässä.
    - heading "Digitaalinen itsenäisyys" [level=2]:
      - link "Digitaalinen itsenäisyys":
        - /url: /fi/category/digital-independence/
    - paragraph: Suomen ja Euroopan on hallittava omaa digitaalista infrastruktuuriaan — olen Digitaalinen itsenäisyys -kansalaisaloitteen alullepanija.
    - heading "Digitalisaatio" [level=2]:
      - link "Digitalisaatio":
        - /url: /fi/category/digitalisation/
    - paragraph: Digitalisaatio on sekä mahdollisuus että riski. Suomen on johdettava laadulla, ei pelkästään nopeudella — epäonnistuminen mittakaavassa on kallista.
    - heading "Yksityisyydensuoja" [level=2]:
      - link "Yksityisyydensuoja":
        - /url: /fi/category/privacy/
    - paragraph: Yksityisyydensuoja on demokratian edellytys — ei jarru innovaatiolle tai turvallisuudelle. Ilman suojattua yksityistä tilaa vapaa ajattelu vaikeutuu.
    - heading "Tasa-arvo ja yhdenvertaisuus" [level=2]:
      - link "Tasa-arvo ja yhdenvertaisuus":
        - /url: /fi/category/equality-and-non-discrimination/
    - paragraph: Yhdenvertaisuus on käytännöllistä hallintoa, ei ideologiaa. Jokaisella asukkaalla on oikeus yhtä laadukkaaseen palveluun taustastaan riippumatta.
    - heading "Sosiaalinen media" [level=2]:
      - link "Sosiaalinen media":
        - /url: /fi/category/social-media/
    - paragraph: Kirjoituksia sosiaalisesta mediasta, sen vaikutuksesta politiikkaan ja viestintään.
    - heading "Opetus" [level=2]:
      - link "Opetus":
        - /url: /fi/category/education/
    - paragraph: Koulutus on investointi, ei menoerä. Tämänpäiväiset säästöt kertyvät osaamispuutteiksi ja heikentyneeksi kilpailukyvyksi vuosiksi eteenpäin.
    - heading "Sivistys" [level=2]:
      - link "Sivistys":
        - /url: /fi/category/culture-and-education/
    - paragraph: Kirjoituksia sivistyksestä, kulttuurista, kirjastoista ja vapaa-ajan palveluista.
    - heading "Varhaiskasvatus" [level=2]:
      - link "Varhaiskasvatus":
        - /url: /fi/category/early-childhood-education/
    - paragraph: Kirjoituksia varhaiskasvatuksesta, päiväkodeista ja lasten palveluista.
    - heading "Sote-uudistus" [level=2]:
      - link "Sote-uudistus":
        - /url: /fi/category/health-and-social-reform/
    - paragraph: Kirjoituksia sote-uudistuksesta, hyvinvointialueista ja sosiaali- ja terveyspalvelujen järjestämisestä.
    - heading "Perusturva" [level=2]:
      - link "Perusturva":
        - /url: /fi/category/basic-welfare/
    - paragraph: Kirjoituksia perusturvasta, sosiaalietuuksista ja sosiaalipalveluista.