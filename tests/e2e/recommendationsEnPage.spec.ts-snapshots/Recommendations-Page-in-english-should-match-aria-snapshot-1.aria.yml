- main:
  - heading "Endorsements and testimonials about Lauri" [level=1]
  - img "Lauri Lavanti standing in a hallway with his hands in his pockets, looking at the camera. Wearing a dark suit and a white dress shirt."
  - article:
    - complementary "Why choose Lauri?":
      - heading "Why choose Lauri?" [level=2]
      - list:
        - listitem: » Lauri fills the expertise gap in technology and information policy in Parliament. Experts like him are exactly what we need.
        - listitem: » Lauri is an intelligent and skilled influencer. His ability to collaborate is also valued in the workplace and across party lines.
        - listitem: » Lauri combines technology, economics, and justice. He has a vision for a better society.
        - listitem: » Lauri advocates for Finland's digital sovereignty, focusing on human-centered and economically sustainable solutions.
        - listitem: » This page features recommendations from people who know Lauri.
      - button "More"
    - paragraph: On this page, you will find recommendations and comments about Lauri Lavanti.
    - heading "Why do we need technological expertise right now?" [level=2]
    - paragraph: "For decades, Finland has been a model country for high technology and expertise – from Vaisala to icebreakers, Nokia, Linux, and Supercell. Now, however, this position is under threat, and AI is fundamentally transforming society: it is changing work, trust in digital services, and human connections. We need expertise and understanding of technology, AI, and business. I have a technology education from Aalto University and over a decade of experience developing secure software and banking services. I understand the different ways business can be conducted and the connection between all of this and society and the rule of law, which sets limits for technology."
    - paragraph: "Some of these limits are particularly valuable: they protect everyone’s privacy and fundamental rights. Privacy protection is not a brake on development, but a prerequisite for democracy."
    - paragraph: Read the recommendations below!
    - list:
      - listitem:
        - article:
          - img "Photo of Aki Koikkalainen. Wearing a white dress shirt and a dark blazer."
          - blockquote:
            - paragraph:
              - emphasis: Jos kuitenkin äänestät vihreitä, anna äänesi Laurille. Älystä ja osaamisesta on hyötyä ihan joka puolueessa!
            - text: Aki Koikkalainen CEO
      - listitem:
        - article:
          - img "Photo of Juho Makkonen. He is wearing a tan sweater."
          - blockquote:
            - paragraph:
              - emphasis: Laurissa vankka osaaminen teknologiasta ja taloudesta yhdistyy vahvaan visioon siitä, miten yhteiskunnasta rakennetaan oikeudenmukaisempi ja parempi paikka kaikille, samalla ympäristöstä huolehtien.
            - text: Juho Makkonen CEO, Sharetribe Oy
      - listitem:
        - article:
          - img "Photo of Atte Harjanne. He is wearing a white dress shirt and a dark blazer."
          - blockquote:
            - paragraph:
              - emphasis: Eduskunnassa on iso vaje teknologian ja tietopolitiikan asiantuntijoista. Lauri paikkaisi tätä vajetta isosti!
            - text: Atte Harjanne Member of Parliament
      - listitem:
        - article:
          - img "Photo of Allu Pyhälammi. He is wearing a dark blazer and a large scarf."
          - blockquote:
            - paragraph:
              - emphasis: Lauri on hyvin nopeasti osoittanut suurta omistautumista ja aktiivisuutta maailman muuttamiselle ja Vihreän politiikan teolle! Häneltä hoituu niin järjestön pyörittäminen, poliittisten teemojen syväosaaminen, vahva ja kestävä sosiaalisen median näkyvyys ja hienot verkostotaidot. Hän on mm. kunnostautunut Suomen digitaalista itsenäisyyttä ajavana moottorina, jolla on aina ihmisen hyvinvointi ja järkevät talousratkaisut toimintansa keskiössä.
            - text: Allu Pyhälammi Deputy Chair of the Greens
      - listitem:
        - article:
          - 'img "Photo of Juhana Karhula performing in a wrestling ring, wearing a black tank top and a long fur-trimmed coat under green stage lights. Photo: FCF Wrestling / Akseli Vaheristo."'
          - blockquote:
            - paragraph:
              - emphasis: Lauri on ennen kaikkea hyvä ihminen joka välittää ihmisistä, ympäristöstä ja Suomesta. Teknologisella asiantuntijuudellaan ja empatiakyvyllään Lauri pystyy taistelemaan teknologiajättien aiheuttamia haittavaikutuksia vastaan aidosti ihmislähtöisestä asemasta. Suomi olisi yksinkertaisesti parempi paikka olla ja asua jos Lauri olisi edustamassa sen kansaa.
            - text: Juhana Karhula Agile specialist - Legend of Finnish pro wrestling
      - listitem:
        - article:
          - img "Photo of Lauri Nevanperä. He has long hair tied back, a beard, and glasses, and is wearing a black jacket over a mauve t-shirt."
          - blockquote:
            - paragraph:
              - emphasis: Tietojärjestelmät ovat yhä enemmän yhteiskunnan perusinfraa. Tekoälymurroksessa ja nykyisessä geopoliittisessa tilanteessa tarvitaan osaajia, jotka ymmärtävät järjestelmien mahdollisuudet ja uhat. Lauri on myös valtavan aikaansaava kaveri.
            - text: Lauri Nevanperä Tampere City Councillor, Lead AI Engineer
      - listitem:
        - article:
          - img "Photo of Kalle Euro. He is wearing glasses, a grey sweater, and a dark jacket."
          - blockquote:
            - paragraph:
              - emphasis: Laurin kanssa voi puhua yhtä sujuvasti tekoälyn yhteiskunnallisista vaikutuksista kuin siitä, miten markkinatalous pidetään reiluna kaikille. Tällaista yhdistelmää – uteliaisuutta, asiantuntemusta ja oikeudentajua – tarvitaan eduskunnassa.
            - text: Kalle Euro Executive Director
      - listitem:
        - article:
          - img "Photo of Mari Holopainen. She is wearing a light-coloured jacket."
          - blockquote:
            - paragraph:
              - emphasis: Eduskuntaan tarvitaan enemmän ihmisiä, jotka ymmärtävät sekä taloudesta että teknologiasta. Yhtenä Digitaalinen itsenäisyys -kansalaisaloitteen perustajista Lauri tunnistaa, miten Suomen tulisi toimia yhteiskuntaa monin tavoin muokkaavan teknologisen murroksen edessä. Laurilla on vahva analyyttinen ote, kyky hahmottaa laajoja kokonaisuuksia ja taito tehdä monimutkaisistakin asioista ymmärrettäviä. Hän on myös poikkeuksellisen sinnikäs ja työtä pelkäämätön.
            - text: Mari Holopainen Member of Parliament, M.Sc. (Econ.)