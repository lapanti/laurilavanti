- main:
  - heading "Endorsements and voter testimonials" [level=1]
  - img "Lauri Lavanti standing in a hallway with his hands in his pockets, looking at the camera. Wearing a dark suit and a white dress shirt."
  - article:
    - complementary "Why choose Lauri?":
      - heading "Why choose Lauri?" [level=2]
      - list:
        - listitem: » Lauri fills the expertise gap in technology and information policy in Parliament. Experts like him are exactly what we need.
        - listitem: » Lauri is an intelligent and skilled influencer. His ability to collaborate is also valued in the workplace and across party lines.
        - listitem: » Lauri combines technology, economics, and justice. He has a vision for a better society.
        - listitem: » Lauri advocates for Finland's digital sovereignty, focusing on human-centered and economically sustainable solutions.
        - listitem: » This page features recommendations from people who know Lauri.
    - list:
      - listitem:
        - article:
          - img "Photo of Atte Harjanne. He is wearing a white dress shirt and a dark blazer."
          - blockquote:
            - paragraph:
              - emphasis: Eduskunnassa on iso vaje teknologian ja tietopolitiikan asiantuntijoista. Lauri paikkaisi tätä vajetta isosti!
            - text: Atte Harjanne Member of Parliament
      - listitem:
        - article:
          - img "Photo of Mari Holopainen. She is wearing a light-coloured jacket."
          - blockquote: Mari Holopainen Member of Parliament
      - listitem:
        - article:
          - img "Photo of Otso Kivekäs. He is wearing a t-shirt reading Helsinki and a blazer, and a hat."
          - blockquote: Otso Kivekäs CEO, city councillor
      - listitem:
        - article:
          - img "Photo of Aki Koikkalainen. Wearing a white dress shirt and a dark blazer."
          - blockquote:
            - paragraph:
              - emphasis: Jos kuitenkin äänestät vihreitä, anna äänesi Laurille. Älystä ja osaamisesta on hyötyä ihan joka puolueessa!
            - text: Aki Koikkalainen CEO
      - listitem:
        - article:
          - img "Photo of Juho Makkonen. He is wearing a tan sweater."
          - blockquote:
            - paragraph:
              - emphasis: Laurissa vankka osaaminen teknologiasta ja taloudesta yhdistyy vahvaan visioon siitä, miten yhteiskunnasta rakennetaan oikeudenmukaisempi ja parempi paikka kaikille, samalla ympäristöstä huolehtien.
            - text: Juho Makkonen CEO, Sharetribe Oy
      - listitem:
        - article:
          - img "Photo of Allu Pyhälammi. He is wearing a dark blazer and a large scarf."
          - blockquote:
            - paragraph:
              - emphasis: Lauri on hyvin nopeasti osoittanut suurta omistautumista ja aktiivisuutta maailman muuttamiselle ja Vihreän politiikan teolle! Häneltä hoituu niin järjestön pyörittäminen, poliittisten teemojen syväosaaminen, vahva ja kestävä sosiaalisen median näkyvyys ja hienot verkostotaidot. Hän on mm. kunnostautunut Suomen digitaalista itsenäisyyttä ajavana moottorina, jolla on aina ihmisen hyvinvointi ja järkevät talousratkaisut toimintansa keskiössä.
            - text: Allu Pyhälammi Deputy Chair of the Greens
      - listitem:
        - article:
          - img "Photo of Sofia Virta. She is wearing a blue shirt and a leather jacket."
          - blockquote: Sofia Virta Member of Parliament