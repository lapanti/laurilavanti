              - listitem:
                - link "Immigration":
                  - /url: /en/category/immigration/
          - paragraph: Growing polarisation and inequality-creating policies unnecessarily divide our small nation. History shows we fare best when we cooperate.
      - listitem:
        - 'article "Essays on immigration: on asylum seekers"':
          - 'link "A gravel path leading to a white house. Essays on immigration: on asylum seekers"':
            - /url: /en/blog/31/on-asylum-seekers/
