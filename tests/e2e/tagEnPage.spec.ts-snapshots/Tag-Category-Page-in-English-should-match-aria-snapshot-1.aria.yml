              - listitem:
                - link "#Council motion":
                  - /url: /en/category/council-motion/
          - paragraph: Kirkkonummi's strategy promotes equality and equal treatment. Flying the Pride flag is an inexpensive and easy action to implement it.
      - listitem:
        - article "A cold harvest for Kirkkonummi – weak budget":
          - link "Kirkkonummi's town centre from a high vantage point, with the sun low in the background. A cold harvest for Kirkkonummi – weak budget":
