      - listitem:
        - article "Together we are stronger — polarisation":
          - link "A view from the shore at Wohls Gård. The image shows a sandy path to the waterfront lined with a few white benches. Two benches have people sitting on them, and a child is walking along the sandy path. Together we are stronger — polarisation":
