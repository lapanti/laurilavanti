                  - /url: /en/category/municipal-elections-2025/
              - listitem:
                - link "Immigration":
                  - /url: /en/category/immigration/
          - paragraph: Receiving asylum is not automatic — it is a carefully defined process. Too often we forget the actual people behind the applications.
      - listitem:
        - 'article "Essays on immigration: those who came to study"':
          - 'link "A laptop screen with Google open and the search \"Finland university application\". Essays on immigration: those who came to study"':
