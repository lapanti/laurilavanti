          - 'link "A triptych: on the left Johanna Fleming in a blue-and-white outfit, in the centre Lauri Lavanti in a suit and tie, and on the right Paula Oittinen in a dark top. Is education under special protection?"':
            - /url: /en/blog/27/is-education-under-special-protection/
            - 'img "A triptych: on the left Johanna Fleming in a blue-and-white outfit, in the centre Lauri Lavanti in a suit and tie, and on the right Paula Oittinen in a dark top."'
