            - list:
              - listitem:
                - link /Regional elections \d+/:
                  - /url: /en/category/regional-elections-2025/
              - listitem:
                - link "Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /Municipal elections \d+/:
                  - /url: /en/category/municipal-elections-2025/
              - listitem:
                - link "Immigration":
                  - /url: /en/category/immigration/
          - paragraph: There are many misconceptions about asylum seekers. It is important to distinguish facts from myths — seekers do not live at taxpayers' expense.
      - listitem:
        - 'article "Essays on immigration: those granted asylum"':
          - 'link "A person running in a forest. A lake and a brightly shining sun are visible in the background. Essays on immigration: those granted asylum"':
            - /url: /en/blog/30/on-those-granted-asylum/
            - img "A person running in a forest. A lake and a brightly shining sun are visible in the background."
            - 'heading "Essays on immigration: those granted asylum" [level=2]'
