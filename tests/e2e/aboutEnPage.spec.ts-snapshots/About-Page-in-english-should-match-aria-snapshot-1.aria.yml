- main:
  - heading "AI expertise belongs in decision-making" [level=1]
  - img "Lauri Lavanti sitting on a stool in front of a window, looking at the camera, smiling. He is wearing a white shirt with blue flower patterns and a dark jacket. Photo was taken by Juha Jantunen."
  - article:
    - complementary "Facts about Lauri":
      - heading "Lauri in TL;DR -format" [level=2]
      - list:
        - listitem: » Combines hands-on technology expertise with economic thinking and societal responsibility.
        - listitem: » Over a decade of experience building secure software, lead developer at a bank.
        - listitem: » Municipal councillor in Kirkkonummi, chair of the Green council group.
        - listitem: » Master of Science (Tech.), Information Networks, Aalto University.
        - listitem: » Advocates for digital independence, privacy, and the sensible use of AI.
        - listitem: » Four children.
      - button "More"
    - paragraph: Lauri Lavanti builds software at a bank and makes decisions on the municipal council. His view of technology is grounded in practical experience and expertise — not hype or watching from the sidelines.
    - paragraph: "He is a lead developer, municipal councillor in Kirkkonummi, and chair of the Greens council group. He graduated as a Master of Science (Tech.) from Aalto University and focuses on AI, economic policy, entrepreneurship, and digital independence. Digital independence, privacy, and the responsible adoption of AI are all part of the same whole: how we build technological development that is both competitive and sustainable."
    - paragraph:
      - text: Lauri also has a
      - link "Wikipedia article":
        - /url: https://fi.wikipedia.org/wiki/Lauri_Lavanti
      - text: (in Finnish).
    - heading "A technology expert who combines competitiveness and privacy" [level=2]
    - paragraph: I work as a lead developer and am responsible for the technical solutions of our team’s services. My work focuses on the design, development, and maintenance of demanding systems. I manage technical guidelines, build the team’s AI tools, and engage in active dialogue with stakeholders to ensure that solutions meet real needs and stand the test of time.
    - paragraph: For me, digitalization is not just a technical issue, but also a social and ethical one. I make sure that solutions are not only functional today, but also secure and maintainable tomorrow. Technology must be safe, functional, and serve people.
    - paragraph: Finland has been a model country for high technology for decades. AI is reshaping work, services, and trust in digital systems. We need people in decision-making positions who understand technology at a practical level.
    - heading "Why did I get into politics?" [level=2]
    - paragraph: In politics, I focus particularly on AI, economic policy, and digitalisation — as well as on how Finland can remain competitive while safeguarding privacy and digital independence. Society is rapidly becoming digitalized, but public administration and decision-making do not often keep pace with developments. The same challenge applies across Finland.
    - paragraph: My most important civic roles are serving as municipal councillor in Kirkkonummi and chair of the Green council group.
    - paragraph: We need a better understanding of the opportunities and risks presented by technology, as well as the courage to invest in education and high-productivity technological development. It is more important than ever that Finland does not fall behind in terms of expertise or competitiveness.
    - heading "Digital independence and civic action" [level=2]
    - paragraph: I am the initiator and primary contact of the Digital Independence citizen initiative. Our initiative calls for legislation ensuring that critical public digital services and data remain in the hands of Finnish and European actors, on servers located in the EU/EEA area.
    - paragraph: Digital independence supports European technological development, reduces dependence on individual vendors, and creates better conditions for domestic software development. It is not an ideology but a practical prerequisite for a functioning society — and it also strengthens democracy and citizens’ rights, while creating markets for new business activity.
    - heading "Multidisciplinarity and a broad perspective" [level=2]
    - paragraph: By training, I am a Master of Science (Tech.) from the study programme of information networks. The program is based on information technology, but it also covers other subjects such as aesthetics and philosophy. The program has taught me to view systems as both technical and humane entities.
    - paragraph: My multidisciplinary background has given me the ability to act smoothly as a bridge builder, fostering mutual understanding between different professional groups. I also always examine technology from the perspective of its significance, impact, and responsibility. In practice, that means I can speak with both technical experts and business representatives — and make sure they understand each other.
    - heading "At home and off duty" [level=2]
    - paragraph: My four children are the focus of my free time. Everyday life consists of hobbies, excursions, and moments spent together. Parenting teaches me a lot about emotional skills, interaction, and the importance of continuous practice and development.
    - paragraph: Board games, video games, literature, and team sports have been a part of my life for a long time. Even though my busy schedule limits my time, I think it’s important to make room for these interests, and I’ve replaced team sports with active jogging. One of my dearest hobbies has been American football, where I played defensive lineman and long snapper for Aalto Predators and the Helsinki Wolverines. I also had the honour of representing Finland on the student national team, including at the first-ever university-level World Championships in Uppsala.
