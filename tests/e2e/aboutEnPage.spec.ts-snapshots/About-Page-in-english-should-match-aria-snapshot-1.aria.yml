    - heading "Education" [level=2]
    - list:
      - listitem:
        - text: /» Master of Science \(Tech\.\) in Information Networks Aalto University \(Espoo\) \d+–\d+/
        - list:
          - listitem: "» Extended major in ICT in Business — chosen over a traditional minor to gain more depth at the intersection of technology, business, and decision-making. The programme gave me the toolkit I have used in every role since: rapidly understanding complex systems, mapping how they interact with their environment, and acting as a translation layer between technology and business."
          - listitem: "» Master's thesis: case study on designing and developing an ontology editor for fashion domain experts — done at Zalando, where I built the tool."
          - listitem: » Bachelor's major in User Experience and Usability, which taught me to look at systems and requirements through the user's eyes, regardless of a system's technical nature.
          - listitem: » Bachelor's minor in Applications of Information Networks, which gave me low-level IT fundamentals I've used in every banking, retail, and platform role since.
          - listitem: "» Bachelor's thesis: using drones (still called \"quadcopters\" at the time) for warehouse inventory management."
      - listitem:
        - text: /» Vocational qualification in data processing Omnia vocational college \(Kirkkonummi\) \d+–\d+/
        - list:
          - listitem: "» Vocational qualification in data processing — information networks and technologies — completed as part of a so-called triple qualification: full high school studies, a vocational qualification, and a matriculation examination, all at the same time."
          - listitem: » In high school, I focused on mathematics and social studies. The vocational track covered information networks and technologies.
          - listitem: » I wanted a completed vocation as well as technical depth, alongside what the matriculation examination offers.
      - listitem: /» Finnish matriculation examination Masala upper secondary school \(Kirkkonummi\) \d+–\d+/