    - heading "Education" [level=2]
    - list:
      - listitem:
        - text: /» Master of Science \(Tech\.\) in Information Networks Aalto University \(Espoo\) \d+–\d+/
        - list:
          - listitem: "» Extended major in ICT in Business — chosen over a traditional minor to spend more credits on the intersection of technology, business, and decision-making. The programme gave me the toolkit I have used in every role since: rapidly understanding complex systems, mapping how they interact with their environment, and acting as a translation layer between technology and business."
          - listitem: "» Master's thesis: case study on designing and developing an ontology editor for fashion domain experts — done at Zalando, where I built the tool."
      - listitem:
        - text: /» Vocational qualification in data processing Omnia vocational college \(Kirkkonummi\) \d+–\d+/
        - list:
          - listitem: » Completed as part of a triple qualification alongside full high school studies and a matriculation examination. Completing three qualifications simultaneously was a deliberate choice — I wanted technical depth alongside the academic path.
          - listitem: » The vocational track covered information networks and technologies.
