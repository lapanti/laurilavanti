    - heading "Civic roles" [level=2]
    - list:
      - listitem:
        - text: /» Municipal councillor Kirkkonummi municipality \d+–/
        - list:
          - listitem: » In the council, we decide on the municipality strategy, the budget, and critical, larger matters, such as school buildings.
      - listitem:
        - text: /» Chair of the Green council group Kirkkonummi municipality \d+–/
        - list:
          - listitem: » Responsible for coordinating the group's positions and leading its work in the council.
      - listitem:
        - text: /» Member of the municipal development committee Kirkkonummi municipality \d+–/
        - list:
          - listitem: » The municipal development committee decides on land use and zoning in the municipality, as well as the upkeep of road infrastructure.
      - listitem:
        - text: /» Chair Greens of Kirkkonummi \d+/
        - list:
          - listitem: /» Led Kirkkonummi Greens through the \d+ municipal elections — consolidating the party's position as the third-largest party in Kirkkonummi with significant new membership\./
          - listitem: » Built and managed the full candidate slate; worked directly with the campaign manager on strategy and execution.
          - listitem: » Improved organisation and ways of working to be less dependant on specific people.
      - listitem: /» Deputy member of the premises services committee Kirkkonummi municipality \d+–\d+/
      - listitem: /» Deputy member of the board Greens of Kirkkonummi \d+–\d+/
      - listitem: /» Deputy member of the board of Western Uusimaa Rescue Services Western Uusimaa Wellbeing Services County \d+–\d+/
      - listitem: /» Deputy member of the Finnish-language education committee Kirkkonummi municipality \d+–\d+/
      - listitem: /» Member of the basic welfare section Kirkkonummi municipality \d+–\d+/
      - listitem:
        - text: /» International affairs captain Information Networks Guild Athene \d+/
        - list:
          - listitem: » First board member at Athene responsible for international students — the role itself was new because the study programme had only just opened to Master's-level international students.
          - listitem: » Built the guild's internal practices for supporting international students.
          - listitem: » Coordinated across guilds to align how Aalto's technical study programmes serve international students, not just within Athene.
      - listitem:
        - text: /» Team captain Aalto Predators \d+–\d+/
        - list:
          - listitem: » Built team spirit and our ways of working, and led by example.
      - listitem:
        - text: /» Chair of the board Aalto Predators \d+–\d+/
        - list:
          - listitem: » Took the team from the second to last of the series to university champions during my tenure.
          - listitem: » Started live-streaming our matches — the stream trended on Reddit and earned one of our commentators an interview on a US morning radio show.
          - listitem: » Built up recruitment alongside competitive results.
      - listitem:
        - text: /» Board member, secretary, and communications lead Aalto Predators \d+/
        - list:
          - listitem: » Built the team's external communications from scratch — match reports, social media, and the website.
          - listitem: » Handled board administration and record-keeping as secretary.
      - listitem:
        - text: /» Chair of the youth council board Kirkkonummi municipality \d+/
        - list:
          - listitem: » Led the board's decision-making, including opening Kirkkonummi's first (and Finland's third) legal graffiti wall.
