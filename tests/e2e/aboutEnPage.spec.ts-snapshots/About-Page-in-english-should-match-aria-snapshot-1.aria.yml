          - listitem: » Lead the team's process for technical decision-making and ways of working — including how we evaluate new technologies (AI/ML tooling, observability, security posture) before adopting them.
          - listitem: » Drive long-term capability and vision work to keep the team viable as demands shift.
          - listitem: » Build the AI tools the team uses day-to-day.
      - listitem:
        - text: /» Team Lead Verkkokauppa\.com \(Helsinki\) \d+–\d+/
        - list:
          - listitem: » Owned the team's technical direction and architectural decisions.
          - listitem: » Drove ways-of-working improvements across the wider IT organisation, not only the immediate team.
          - listitem: "» Led developer recruitment for the team: interviewing, hiring, and onboarding new developers into the webstore codebase and processes."
      - listitem:
        - text: /» Software developer Verkkokauppa\.com \(Helsinki\) \d+–\d+/
        - list:
          - listitem: » Led the team's process for improving and synchronising the codebase across teams.
          - listitem: » Worked between the developer team and the product owner — helped shape business goals into workable initiatives and pushed back on goals when technical constraints required it.
          - listitem: » Co-owned developer recruitment. Handled onboarding new team members into our systems.
      - listitem:
        - text: /» Software developer Gofore \(Helsinki\) \d+/
        - list:
          - listitem: » After Gofore bought Solinor, I continued on the same project for a while. Afterwards I switched to a similar project in another industry.
          - listitem: » Owned frontend technical decisions for the PaaS, balancing business goals against long-term maintainability of the platform.
          - listitem: » Conducted developer recruitment for the customer organisation — interviewing candidates and onboarding new team members.
      - listitem:
        - text: /» Software developer Solinor \(Helsinki\) \d+–\d+/
        - list:
          - listitem: » Consultant on a large Platform-as-a-Service project; for most of the engagement, I was the technical lead on the frontend side, in close collaboration with the backend team and the customer's product owners and architects.
          - listitem: » Owned frontend technical decisions for the PaaS, balancing business goals against long-term maintainability of the platform.
          - listitem: » Conducted developer recruitment for both Solinor and the customer organisation — interviewing candidates and onboarding new team members.
          - listitem: » Contributed to Solinor's company-wide ways-of-working improvements.
      - listitem:
        - text: /» Software engineer Zalando \(Helsinki\) \d+–\d+/
