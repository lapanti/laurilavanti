          - listitem: » Frontend developer building internal tools for Zalando's fashion domain experts — this tool also became the subject of my master's thesis, an ontology editor for fashion domain experts.
          - listitem: » Designed and built a visualisation and management tool for the knowledge graph from scratch using React, TypeScript, D3 and PIXI.js — used by domain experts to maintain the fashion ontology powering Zalando's catalogue.
          - listitem: » Worked in a mixed-skillset agile team and led frontend hiring.
      - listitem:
        - text: /» Software developer Futurice \(Helsinki\) \d+–\d+/
        - list:
          - listitem: » Software developer on several client projects — from an Android consumer app to B2B platforms — in mixed-skillset agile teams.
          - listitem: "» Final project: tech lead on a project delivered by a team split across the Helsinki and Stockholm offices. I travelled between the offices often myself, always meeting clients on the Stockholm side too."
          - listitem: » Active with clients' business representatives throughout every project, to reconcile technical realities with client goals.
      - listitem:
        - text: /» Software developer Pulmaton Solutions Oy \(Helsinki\) \d+/
        - list:
