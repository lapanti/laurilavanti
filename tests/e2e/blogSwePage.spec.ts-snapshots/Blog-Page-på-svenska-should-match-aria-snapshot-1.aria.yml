    - heading "Digital självständighet" [level=2]:
      - link "Digital självständighet":
        - /url: /sv/category/digital-independence/
    - paragraph: Finland och Europa måste kontrollera sin digitala infrastruktur — jag är huvudinitiativtagare till medborgarinitiativet om digital självständighet.
    - list:
      - listitem:
        - 'article "Fullmäktigemotion: digital beredskap"':
          - 'link "Lauri Lavanti ler och tittar in i kameran. Han bär en vit t-shirt med texten Digitaalinen itsenäisyys (Digital självständighet) och ett lejonmotiv ovanför, samt en kavaj. Foto av Erkki Laine. Fullmäktigemotion: digital beredskap"':
            - /url: /sv/blog/59/fullmaktigemotion-starka-kyrkslatt-digital-forsorjningsberedskap/
            - img "Lauri Lavanti ler och tittar in i kameran. Han bär en vit t-shirt med texten Digitaalinen itsenäisyys (Digital självständighet) och ett lejonmotiv ovanför, samt en kavaj. Foto av Erkki Laine."
            - 'heading "Fullmäktigemotion: digital beredskap" [level=2]'
          - 'complementary "Metainformation för inlägget \"Fullmäktigemotion: digital beredskap\""':
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "Digital självständighet":
                  - /url: /sv/category/digital-independence/
              - listitem:
                - link "Fullmäktigeinitiativ":
                  - /url: /sv/category/council-motion/
          - paragraph: Kyrkslätt förlitar sig på digitala system i nästan all sin verksamhet. Motionen föreslår kartläggning av beroenden och övergång till öppna filformat.
      - listitem:
        - article "Digital självständighet byggs steg för steg":
          - 'link "Lauri Lavanti ler och tittar in i kameran. Han bär en vit t-tröja med texten Digitaalinen itsenäisyys och ett lejontryck ovanför, samt en kavaj. Foto: Erkki Laine. Digital självständighet byggs steg för steg"':
            - /url: /sv/blog/53/digital-sjalvstandighet-byggs-steg-for-steg/
            - 'img "Lauri Lavanti ler och tittar in i kameran. Han bär en vit t-tröja med texten Digitaalinen itsenäisyys och ett lejontryck ovanför, samt en kavaj. Foto: Erkki Laine."'
            - heading "Digital självständighet byggs steg för steg" [level=2]
          - complementary "Metainformation för inlägget \"Digital självständighet byggs steg för steg\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Digital självständighet":
                  - /url: /sv/category/digital-independence/
              - listitem:
                - link "Digitalisering":
                  - /url: /sv/category/digitalisation/
          - paragraph: Digital självständighet byggs i varje upphandlingsbeslut. Helsingfors valde finska UpCloud som plattform för kärnsystemet för stadens tjänster.
      - listitem:
        - article "Digital självständighet är en nödvändighet":
          - link "En tecknad bild av en blond kvinna som håller en bärbar dator. Den finska flaggan visas på datorskärmen. En vitskallig örn försöker snappa datorn från kvinnan. Runt bilden står det skrivet \"Digital independence\", \"Digitaalinen itsenäisyys\" och \"Digital självständighet\". Upphovsrätten till bilden tillhör medborgarinitiativet Digital självständighet. Digital självständighet är en nödvändighet":
            - /url: /sv/blog/51/digital-sjalvstandighet-ar-en-nodvandighet/
            - img "En tecknad bild av en blond kvinna som håller en bärbar dator. Den finska flaggan visas på datorskärmen. En vitskallig örn försöker snappa datorn från kvinnan. Runt bilden står det skrivet \"Digital independence\", \"Digitaalinen itsenäisyys\" och \"Digital självständighet\". Upphovsrätten till bilden tillhör medborgarinitiativet Digital självständighet."
            - heading "Digital självständighet är en nödvändighet" [level=2]
          - complementary "Metainformation för inlägget \"Digital självständighet är en nödvändighet\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Digital självständighet":
                  - /url: /sv/category/digital-independence/
              - listitem:
                - link "Digitalisering":
                  - /url: /sv/category/digitalisation/
          - paragraph: Som Rysslands granne har Finland lärt sig att vara beredd. Begreppen försörjningstrygghet och suveränitet har dock inte spridit sig till digitala tjänster.
    - link "Alla inlägg om Digital självständighet →":
      - /url: /sv/category/digital-independence/
    - heading "Kyrkslätt" [level=2]:
      - link "Kyrkslätt":
        - /url: /sv/category/kirkkonummi/
    - paragraph: Texter om Kyrkslätts kommunalpolitik, beslutsfattande och vardag. Lauri Lavanti som kommunfullmäktigeledamot.
    - list:
      - listitem:
        - article "Lähteelä — en gem vid Kyrksländets kust":
          - link "Lauri Lavanti och Miisa Jeremejew, kommunfullmäktigeledamöter (gröna), Kyrksländ Lähteelä — en gem vid Kyrksländets kust":
            - /url: /sv/blog/56/lahteela-en-gemma-vid-kyrkslaendets-kust/
