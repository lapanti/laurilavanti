    - heading "Kyrkslätt" [level=2]
    - paragraph: Jag är kommunfullmäktigeledamot i Kyrkslätt. Det innebär att jag är med och beslutar om kommunens budget, planläggning, serviceavtal och infrastruktur — beslut som direkt formar hur det är att leva här. De flesta av dessa beslut fattas utan större offentlig uppmärksamhet, och det är precis då det spelar roll vem som är i rummet och vad de förstår.
    - paragraph: "De frågor jag driver hårdast lokalt är desamma som jag skriver om nationellt: digitala tjänster som faktiskt fungerar för invånarna snarare än bara kryssar i en upphandlingsruta, planläggning som bygger på Kyrkslätts geografi i stället för att motarbeta den, och kollektivtrafik som förbinder kommunen i stället för att lämna hela stadsdelar beroende av bil."
    - paragraph: "Kyrkslätt är en tvåspråkig kustkommun som växer snabbt i kanten av Helsingforsregionen. Den har verkliga tillgångar — strandlinje, natur, en blandad gemenskap — och verkliga påfrestningar: en intäktsbas som har svårt att hålla jämna steg med behoven och ett järnvägskorridor som spelar stor roll för hur hela regionen utvecklas. Lokalpolitiken här är inte småpolitik."
