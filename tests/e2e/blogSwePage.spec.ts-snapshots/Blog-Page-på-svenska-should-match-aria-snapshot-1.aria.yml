    - heading "Frihet" [level=2]
    - paragraph: Frihet i AI-eran är inget abstrakt. Det är frågan om dina data, din kommunikation och din vardag förblir dina när merparten av infrastrukturen runt dem ägs av någon annan. Integritetsskyddet är grundfallet — men den bredare frågan är om medborgerliga rättigheter överlever en teknik som skalar övervakning till alla, nästan gratis.
    - paragraph: "Jag har under min karriär byggt programvara i miljöer där reglerna kring data tas på allvar — bank, säkerhet, reglerade system. Den erfarenheten gör en sak uppenbar: integritet och medborgerliga rättigheter skyddar sig inte själva. De skyddas av lagar, av upphandlingsbeslut och av människor i riksdagen som kan läsa ett tekniskt förslag och säga om det gör det som påstås."
    - paragraph: Att trygga friheten i AI-eran kräver ärlighet om avvägningarna. Massövervakning, utvidgad användning av biometriska identifierare och automatisk meddelandekontroll är inte neutrala verktyg som väntar på att användas klokt. De omformar förhållandet mellan medborgare och stat. Riksdagens uppgift är att sätta gränserna innan verktygen byggs — inte debattera dem i efterhand.
