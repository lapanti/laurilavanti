    - heading "Ekonomi" [level=2]
    - paragraph: Finlands ekonomi måste fungera under AI-omställningen. Det betyder nya företag, nya jobb och offentliga tjänster som faktiskt använder tekniken — inte köper den som en svart låda. Utan teknisk kompetens i riksdagen fattas beslut om AI-upphandling, datainfrastruktur och arbetslivet av människor som inte vet vad de köper.
    - paragraph: "Jag skriver om ekonomin utifrån vad jag gjort i över ett årtionde: byggt programvara och programvaruteam inom olika branscher. AI förändrar grunden för arbete, konkurrenskraft och offentliga tjänster. Finland kan leda omställningen, men bara om offentliga satsningar riktas mot inhemsk kompetens på ett sätt som faktiskt förstår vad som görs."
    - paragraph: "En fungerande ekonomi i AI-eran är inte en slogan. Det är substans: kompetens som överlever omställningen, företag som kan bygga på finsk och europeisk infrastruktur, och en stat som upphandlar teknik på sina egna villkor."
