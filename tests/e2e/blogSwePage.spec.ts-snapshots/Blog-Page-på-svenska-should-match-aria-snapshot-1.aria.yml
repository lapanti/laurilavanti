    - heading "Digital självständighet" [level=2]
    - paragraph: Finland och Europa måste kontrollera sin egen digitala infrastruktur. Jag är huvudinitiativtagare till medborgarinitiativet om digital självständighet. Med det kräver vi att Finland minskar sitt beroende av ett fåtal utländska leverantörer av digitala tjänster.
    - paragraph: "/Finlands offentliga förvaltning är starkt beroende av exempelvis amerikanska hyperscalers — Amazon, Microsoft och Google\\. Den geopolitiska risken med detta beroende har ökat kraftigt sedan \\d+\\. Finska och europeiska alternativ finns: UpCloud är ett konkret exempel på en högpresterande inhemsk molntjänst som offentliga organisationer kan välja redan idag\\. Jag förespråkar uppdelning av offentlig IT-upphandling, prioritering av öppen källkod och beaktande av krisberedskap\\./"
    - paragraph: Digital självständighet handlar också om dataportabilitet och att undvika inlåsning till leverantörer. Offentliga data som skapats med offentliga medel bör vara portabla och lagras på ett sätt som hindrar utländska stater från att missbruka dem.
