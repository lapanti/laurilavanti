- main:
  - heading "Inlägg" [level=1]
  - img "Lauri Lavanti sitter på en pall och lutar sig mot ett högt bord. Han har på sig en svart kavaj och en blåvit blommig skjorta. I kavajfickan finns en flerfärgad bröstduk. En trappa i bakgrunden."
  - article:
    - paragraph: "AI förändrar allt — arbetet, ekonomin och hur staten betjänar oss. Jag skriver om hur det landar på tre saker som måste fungera: ekonomin, bildningen och friheten. Deras syntes är digital självständighet: ett samhälle som använder tekniken på sina egna villkor."
    - heading "Vad innebär det att leva i AI:s era?" [level=2]
    - paragraph: Jag har över ett årtiondes praktisk erfarenhet av att bygga säker programvara och banktjänster. Med den bakgrunden skriver jag om varför AI inte bara effektiviserar arbetet utan tvingar oss att tänka om hela det sociala skyddsnätet, varför digital självständighet är en förutsättning för ett fritt samhälle, och hur vi kan se till att teknikens vinster når alla — inte bara ett fåtal.
    - heading "Artificiell intelligens" [level=2]
    - paragraph: Jag arbetar med AI-verktyg professionellt som lead developer — och jag har byggt upp hela mitt teams sätt att arbeta med dem. Jag argumenterar utifrån praktisk erfarenhet, inte teori. AI är vår tids mest betydande produktivitetstransformation, och Finland måste engagera sig med det aktivt och kritiskt.
    - paragraph: AI förstärker både förmåga och fördomar. I offentliga tillämpningar — förmånsbeslut, tillståndshantering, prediktiv polisverksamhet — är insatserna för höga för att driftsätta system utan transparens och mänsklig tillsyn. Jag förespråkar revisionsbara algoritmer vid konsekventa beslut, öppen källkod där det är möjligt, och obligatorisk mänsklig granskning av beslut som påverkar individers rättigheter.
    - paragraph: Ju kraftfullare AI blir, desto viktigare blir integritetsskyddet. AI-system är datahungriga; utan starka dataskyddsregler blir de övervakningsinfrastruktur. EU:s AI-förordning är ett steg i rätt riktning, men genomförandet måste vara substantiellt — inte bara bocka av rutor.
