    - heading "Lärande" [level=2]
    - paragraph: Finlands styrka har alltid varit dess människor och deras kunnande. I AI-eran måste bildningen förbli sömlös — från småbarnspedagogiken till arbetslivet — så att ingen lämnas efter i en omställning som redan pågår. Annars samlas AI:s produktivitetsvinster hos en liten grupp medan resten ser sitt arbete förändras utan verktyg att hänga med.
    - paragraph: Utbildning är inte en kostnadspost som trimmas när budgeten stramas åt. Det är den centrala infrastrukturen i hela ekonomin efter AI-omställningen. Nedskärningar i undervisning, bibliotek, yrkesutbildning och vuxenutbildning betalas tillbaka tiofalt när arbetsmarknaden ändras snabbare än människor hinner lära sig nya saker.
    - paragraph: Sömlös bildning betyder att vägen hålls öppen — mellan skolor, mellan jobb, mellan livsfaser. AI gör den vägen oerhört mycket viktigare. Det land som håller vägen öppen för alla får tillgång till hela sitt folks potential. Det är en starkare grund än någon annan konkurrensfördel.
