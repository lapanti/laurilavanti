- main:
  - heading "Inlägg" [level=1]
  - img "Lauri Lavanti sitter på en pall och lutar sig mot ett högt bord. Han har på sig en svart kavaj och en blåvit blommig skjorta. I kavajfickan finns en flerfärgad bröstduk. En trappa i bakgrunden."
  - article:
    - paragraph: "AI förändrar allt — arbetet, ekonomin och hur staten betjänar oss. Jag skriver om hur det landar på tre saker som måste fungera: ekonomin, bildningen och friheten. Deras syntes är digital självständighet: ett samhälle som använder tekniken på sina egna villkor."
    - heading "Vad innebär det att leva i AI:s era?" [level=2]
    - paragraph: Jag har över ett årtiondes praktisk erfarenhet av att bygga säker programvara och banktjänster. Med den bakgrunden skriver jag om varför AI inte bara effektiviserar arbetet utan tvingar oss att tänka om hela det sociala skyddsnätet, varför digital självständighet är en förutsättning för ett fritt samhälle, och hur vi kan se till att teknikens vinster når alla — inte bara ett fåtal.
    - heading "Artificiell intelligens" [level=2]:
      - link "Artificiell intelligens":
        - /url: /sv/category/artificial-intelligence/
    - paragraph: Jag arbetar med AI-verktyg professionellt som lead developer — jag argumenterar utifrån praktisk erfarenhet. Finland måste engagera sig med AI aktivt.
    - list:
      - listitem:
        - article "AI hjälper trygga kommunala tjänster, men det är inte gratis":
          - link "Lauri Lavanti står i en blommig skjorta mot vit bakgrund. AI hjälper trygga kommunala tjänster, men det är inte gratis":
            - /url: /sv/blog/60/ai-hjalper-till-att-sakra-kommunala-tjanster-men-det-kostar/
            - img "Lauri Lavanti står i en blommig skjorta mot vit bakgrund."
            - heading "AI hjälper trygga kommunala tjänster, men det är inte gratis" [level=2]
          - complementary "Metainformation för inlägget \"AI hjälper trygga kommunala tjänster, men det är inte gratis\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Artificiell intelligens":
                  - /url: /sv/category/artificial-intelligence/
              - listitem:
                - link "Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "Digitalisering":
                  - /url: /sv/category/digitalisation/
              - listitem:
                - link "Lärande":
                  - /url: /sv/category/learning/
          - paragraph: I Konnevesi kortade AI handläggningstiden från två månader till dagar. Kyrkslätt är för litet att agera ensamt — men samarbete gör förändring möjlig.
      - listitem:
        - article "AI förändrar vad utvecklare får betalt för":
          - link "En datorskärm med kod. AI förändrar vad utvecklare får betalt för":
            - /url: /sv/blog/57/ai-forandrar-vad-utvecklare-far-betalt-for/
            - img "En datorskärm med kod."
            - heading "AI förändrar vad utvecklare får betalt för" [level=2]
          - complementary "Metainformation för inlägget \"AI förändrar vad utvecklare får betalt för\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Artificiell intelligens":
                  - /url: /sv/category/artificial-intelligence/
              - listitem:
                - link "Digitalisering":
                  - /url: /sv/category/digitalisation/
              - listitem:
                - link "Lärande":
                  - /url: /sv/category/learning/
              - listitem:
                - link "Ekonomi":
                  - /url: /sv/category/economy/
          - paragraph: AI gör på två minuter det som en utvecklare tidigare behövde två veckor på sig för. Priset på kod rasar — men vad ska utvecklare få betalt för i stället?
      - listitem:
        - article /År \d+ är AI-året/:
          - link /Lauri Lavanti stående framför en spegel med en telefon i handen och tar en selfie\. Klädd i svart jacka, vit skjorta och grön slips\. I bakgrunden den ljusa korridoren i Helsingfors universitets huvudbyggnad\. År \d+ är AI-året/:
            - /url: /sv/blog/47/ar-2026-ar-ai-aret/
            - img "Lauri Lavanti stående framför en spegel med en telefon i handen och tar en selfie. Klädd i svart jacka, vit skjorta och grön slips. I bakgrunden den ljusa korridoren i Helsingfors universitets huvudbyggnad."
            - heading /År \d+ är AI-året/ [level=2]
          - complementary /Metainformation för inlägget "År \d+ är AI-året"/:
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Digitalisering":
                  - /url: /sv/category/digitalisation/
              - listitem:
                - link "Artificiell intelligens":
                  - /url: /sv/category/artificial-intelligence/
              - listitem:
                - link "Lärande":
                  - /url: /sv/category/learning/
          - paragraph: AI förändrar samhället — men kanske inte som du tror. De största förändringarna ser vi i privatlivet och i barnens och ungdomarnas vardag.
    - link "Alla inlägg om Artificiell intelligens →":
      - /url: /sv/category/artificial-intelligence/
    - heading "Ekonomi" [level=2]:
      - link "Ekonomi":
        - /url: /sv/category/economy/
    - paragraph: Finlands ekonomi måste fungera under AI-omställningen — nya företag, nya jobb och offentliga tjänster som använder teknik med omdöme.
    - list:
      - listitem:
        - article "De gröna – Marknadsekonomiets sanna försvarare":
          - link /Grönas partikongress i Åbo \d+ De gröna – Marknadsekonomiets sanna försvarare/:
            - /url: /sv/blog/62/de-grona-marknadsekonomiets-sanna-forsvarare/
            - img /Grönas partikongress i Åbo \d+/
            - heading "De gröna – Marknadsekonomiets sanna försvarare" [level=2]
          - complementary "Metainformation för inlägget \"De gröna – Marknadsekonomiets sanna försvarare\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Ekonomi":
                  - /url: /sv/category/economy/
              - listitem:
                - link "De Gröna":
                  - /url: /sv/category/green-party/
              - listitem:
                - link "Nationell politik":
                  - /url: /sv/category/national-politics/
          - paragraph: Marknadsekonomin är det bästa sättet att fördela resurser. De gröna är dess enda sanna försvarare i Finland – riktiga marknader, inte kamrerekonomi.
      - listitem:
        - article "Grön ekonomisk politik kräver en plats vid bordet":
          - link "Lauri Lavanti står i en blommig skjorta mot en blå bakgrund Grön ekonomisk politik kräver en plats vid bordet":
            - /url: /sv/blog/61/gron-ekonomisk-politik-kraver-en-plats-vid-bordet/
            - img "Lauri Lavanti står i en blommig skjorta mot en blå bakgrund"
            - heading "Grön ekonomisk politik kräver en plats vid bordet" [level=2]
          - complementary "Metainformation för inlägget \"Grön ekonomisk politik kräver en plats vid bordet\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Ekonomi":
                  - /url: /sv/category/economy/
              - listitem:
                - link "De Gröna":
                  - /url: /sv/category/green-party/
              - listitem:
                - link "Nationell politik":
                  - /url: /sv/category/national-politics/
          - paragraph: Att lämna skuldbromsavtalet ändrar inte storleken på anpassningen — det tar bort De Grönas möjlighet att påverka hur anpassningen genomförs.
      - listitem:
        - article "Jag röstade mot Västra":
          - link "Tre myntstaplar i olika höjder på vit bakgrund. Bilden illustrerar kommunalt ekonomiskt beslutsfattande. Jag röstade mot Västra":
            - /url: /sv/blog/58/jag-rostade-mot-vastra/
            - img "Tre myntstaplar i olika höjder på vit bakgrund. Bilden illustrerar kommunalt ekonomiskt beslutsfattande."
            - heading "Jag röstade mot Västra" [level=2]
          - complementary "Metainformation för inlägget \"Jag röstade mot Västra\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Ekonomi":
                  - /url: /sv/category/economy/
              - listitem:
                - link "Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "Västra Nyland":
                  - /url: /sv/category/western-uusimaa/
          - paragraph: Jag röstade mot Västra kustsamarbetet. Fullmäktige beslutade annorlunda. Pengarna hör till bildningsservicen, inte ett avtal man inte kan lämna.
    - link "Alla inlägg om Ekonomi →":
      - /url: /sv/category/economy/
    - heading "Lärande" [level=2]:
      - link "Lärande":
        - /url: /sv/category/learning/
    - paragraph: I AI-eran måste bildningen förbli sömlös från småbarnspedagogiken till arbetslivet — så att produktivitetsvinsterna inte samlas hos ett fåtal.
    - list:
      - listitem:
        - article "AI kan inte allt":
          - link "En illustrationsbild för artificiell intelligens, föreställande en maskin som liknar ett mänskligt huvud med olika elektroniska strömmar som flödar in och ut ur den. AI kan inte allt":
            - /url: /sv/blog/44/ai-kan-inte-allt/
            - img "En illustrationsbild för artificiell intelligens, föreställande en maskin som liknar ett mänskligt huvud med olika elektroniska strömmar som flödar in och ut ur den."
            - heading "AI kan inte allt" [level=2]
          - complementary "Metainformation för inlägget \"AI kan inte allt\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Digitalisering":
                  - /url: /sv/category/digitalisation/
              - listitem:
                - link "Artificiell intelligens":
                  - /url: /sv/category/artificial-intelligence/
              - listitem:
                - link "Lärande":
                  - /url: /sv/category/learning/
          - paragraph: AI har presenterats som ett sätt att göra Finlands offentliga tjänster till världens bästa. Det kan ha sin roll i det, men viktigast vore en helhetsbedömning.
      - listitem:
        - article "En kall skörd för Kyrkslätt – svaga beslut":
          - link "Kyrkslätts centrum sett från en hög utsiktspunkt, med solen lågt i bakgrunden. En kall skörd för Kyrkslätt – svaga beslut":
            - /url: /sv/blog/38/en-kall-skord-for-kyrkslätt/
            - img "Kyrkslätts centrum sett från en hög utsiktspunkt, med solen lågt i bakgrunden."
            - heading "En kall skörd för Kyrkslätt – svaga beslut" [level=2]
          - complementary "Metainformation för inlägget \"En kall skörd för Kyrkslätt – svaga beslut\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "Utbildning":
                  - /url: /sv/category/education/
              - listitem:
                - link "Småbarnspedagogik":
                  - /url: /sv/category/early-childhood-education/
              - listitem:
                - link "Lärande":
                  - /url: /sv/category/learning/
          - paragraph: Halvtidsöverläggningen innebar nedskärningar i statsandelar och samfundsskatt. Det inskränker kommunfullmäktiges handlingsutrymme avsevärt.
      - listitem:
        - article "Utbildning är kommunens viktigaste uppgift":
          - link "Ett fotografi av Laajakallio skola. Utbildning är kommunens viktigaste uppgift":
            - /url: /sv/blog/37/utbildning-ar-kommunens-viktigaste-uppgift/
            - img "Ett fotografi av Laajakallio skola."
            - heading "Utbildning är kommunens viktigaste uppgift" [level=2]
          - complementary "Metainformation för inlägget \"Utbildning är kommunens viktigaste uppgift\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link /Kommunalval \d+/:
                  - /url: /sv/category/municipal-elections-2025/
              - listitem:
                - link "Utbildning":
                  - /url: /sv/category/education/
              - listitem:
                - link "Småbarnspedagogik":
                  - /url: /sv/category/early-childhood-education/
              - listitem:
                - link "Lärande":
                  - /url: /sv/category/learning/
          - paragraph: Utbildning är kommunens viktigaste uppgift. Satsningar på utbildning är investeringar som syns långt in i framtiden, utan snabba vinster.
    - link "Alla inlägg om Lärande →":
      - /url: /sv/category/learning/
    - heading "Frihet" [level=2]:
      - link "Frihet":
        - /url: /sv/category/freedom/
    - paragraph: Frihet i AI-eran är frågan om dina data och din kommunikation förblir dina när infrastrukturen skalar övervakning till alla, hela tiden.
    - list:
      - listitem:
        - 'article "Chat control: parlamentet handlade rätt"':
          - 'link "Bild på en japansk skärm bakom vilken ett rum skymtar suddigt. Chat control: parlamentet handlade rätt"':
            - /url: /sv/blog/54/chat-control-parlamentet-handlade-ratt/
            - img "Bild på en japansk skärm bakom vilken ett rum skymtar suddigt."
            - 'heading "Chat control: parlamentet handlade rätt" [level=2]'
          - 'complementary "Metainformation för inlägget \"Chat control: parlamentet handlade rätt\""':
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Integritetsskydd":
                  - /url: /sv/category/privacy/
              - listitem:
                - link "Teknologi":
                  - /url: /sv/category/technology/
              - listitem:
                - link "Digitalisering":
                  - /url: /sv/category/digitalisation/
              - listitem:
                - link "Frihet":
                  - /url: /sv/category/freedom/
          - paragraph: Chat control-lagens förlängning röstades ned i Europaparlamentet. KRP:s siffror är verkliga, men parlamentet handlade ändå rätt — och här är skälet.
      - listitem:
        - article "Användningen av biometriska identifierare i pass får inte utvidgas":
          - link "Ett foto av Atte Harjanne och Lauri Lavanti. Båda bär svart jacka och skjorta. Användningen av biometriska identifierare i pass får inte utvidgas":
            - /url: /sv/blog/48/anvandningen-av-biometriska-identifierare-i-pass-far-inte-utvidgas/
            - img "Ett foto av Atte Harjanne och Lauri Lavanti. Båda bär svart jacka och skjorta."
            - heading "Användningen av biometriska identifierare i pass får inte utvidgas" [level=2]
          - complementary "Metainformation för inlägget \"Användningen av biometriska identifierare i pass får inte utvidgas\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Teknologi":
                  - /url: /sv/category/technology/
              - listitem:
                - link "Integritetsskydd":
                  - /url: /sv/category/privacy/
              - listitem:
                - link "Frihet":
                  - /url: /sv/category/freedom/
          - paragraph: När fingeravtryck infördes i pass skapades ett nationellt biometriskt register i Finland. Nu vill regeringen öppna det för polisens bruk.
      - listitem:
        - article "Grundläggande rättigheter får inte rivas utan grund":
          - link "En bild av lamporna på taket av en polisbil. Grundläggande rättigheter får inte rivas utan grund":
            - /url: /sv/blog/45/grundlaggande-rattigheter-far-inte-rivas-utan-grund/
            - img "En bild av lamporna på taket av en polisbil."
            - heading "Grundläggande rättigheter får inte rivas utan grund" [level=2]
          - complementary "Metainformation för inlägget \"Grundläggande rättigheter får inte rivas utan grund\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Teknologi":
                  - /url: /sv/category/technology/
              - listitem:
                - link "Integritetsskydd":
                  - /url: /sv/category/privacy/
              - listitem:
                - link "Frihet":
                  - /url: /sv/category/freedom/
          - paragraph: Regeringen planerar att utvidga underrättelselagstiftningens metoder mot brottslighet utan individuell misstanke — ett allvarligt hot mot grundrättigheter.
    - link "Alla inlägg om Frihet →":
