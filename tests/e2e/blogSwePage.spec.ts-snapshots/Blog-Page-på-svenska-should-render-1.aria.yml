            - list:
              - listitem:
                - link /#Regionval \d+/:
                  - /url: /sv/category/aluevaalit2022/
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "#Vård- och servicereform":
                  - /url: /sv/category/soteuudistus/
