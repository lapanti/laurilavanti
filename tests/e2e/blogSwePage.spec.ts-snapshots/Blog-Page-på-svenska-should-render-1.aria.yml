              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "#Vård- och servicereform":
                  - /url: /sv/category/soteuudistus/
          - paragraph: "Genom att avskaffa klientavgifterna inom social- och hälsovården sparar vi på byråkratin. Vi kan också åtgärda problem innan de blir betydande. Och viktigast av allt: vi säkerställer att ingen lämnas utan vård av ekonomiska skäl."
      - listitem:
        - article "Social- och hälsovården är välfärdssamhällets hörnsten":
          - link "Porträtt av Lauri Lavanti Social- och hälsovården är välfärdssamhällets hörnsten":
