                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "#Småbarnspedagogik":
                  - /url: /sv/category/varhaiskasvatus/
          - paragraph: Regeringen föreslår olika sparåtgärder för planeringen av småbarnspedagogiken. I praktiken kommer dessa åtgärder dock inte att spara pengar för skattebetalarna — kostnaderna förflyttas bara.
      - listitem:
        - article "VBO-valen berör oss alla":
          - link "Porträtt av Lauri Lavanti, med skog synlig i bakgrunden. VBO-valen berör oss alla":
            - /url: /sv/blog/18/vbo-valen-beror-oss-alla/
            - img "Porträtt av Lauri Lavanti, med skog synlig i bakgrunden."
            - heading "VBO-valen berör oss alla" [level=2]
