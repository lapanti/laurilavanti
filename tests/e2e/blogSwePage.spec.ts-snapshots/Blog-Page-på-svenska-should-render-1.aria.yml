                  - /url: /sv/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /sv/category/maahanmuutto/
          - paragraph: Det finns många missförstånd kring att söka asyl. Vanliga påståenden är att folk med ett visst utseende inte behöver asyl, eller att asylsökande lever på skattebetalarnas bekostnad.
      - listitem:
        - article "Om dem som beviljats asyl":
          - link "En person som springer i en skog. En sjö och en klarstrålande sol syns i bakgrunden. Om dem som beviljats asyl":
            - /url: /sv/blog/30/om-dem-som-beviljats-asyl/
            - img "En person som springer i en skog. En sjö och en klarstrålande sol syns i bakgrunden."
            - heading "Om dem som beviljats asyl" [level=2]
          - complementary "Metainformation för inlägget \"Om dem som beviljats asyl\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regionval \d+/:
                  - /url: /sv/category/aluevaalit2025/
              - listitem:
