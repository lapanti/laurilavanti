            - img "Porträtt av Lauri Lavanti"
            - heading "Social- och hälsovården är välfärdssamhällets hörnsten" [level=2]
          - complementary "Metainformation för inlägget \"Social- och hälsovården är välfärdssamhällets hörnsten\"":
