                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link /#Kommunalval \d+/:
                  - /url: /sv/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /sv/category/maahanmuutto/
          - paragraph: Att beviljas asyl är ingen självklarhet, utan en process definierad i Genèvekonventionen om flyktingar. Vi glömmer också alltför ofta personerna själva, som mestadels flytt sin välbekanta omgivning med livet som insats.
      - listitem:
        - article "Om dem som kom för att studera":
          - link "En laptopskärm med Google öppen och sökningen \"Finland university application\". Om dem som kom för att studera":
            - /url: /sv/blog/29/om-dem-som-kom-for-att-studera/
            - img "En laptopskärm med Google öppen och sökningen \"Finland university application\"."
            - heading "Om dem som kom för att studera" [level=2]
          - complementary "Metainformation för inlägget \"Om dem som kom för att studera\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regionval \d+/:
                  - /url: /sv/category/aluevaalit2025/
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link /#Kommunalval \d+/:
                  - /url: /sv/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /sv/category/maahanmuutto/
          - paragraph: Vi investerar i dem som kommer till Finland från utlandet för att studera, både via integration och via utbildning. I gengäld får vi kvalificerad ung arbetskraft — men vi har fortfarande stora utmaningar med att sysselsätta dem.
      - listitem:
        - article "Om arbetsbaserad invandring":
          - link "Ett rött hus omgivet av träd. Om arbetsbaserad invandring":
            - /url: /sv/blog/28/om-arbetsbaserad-invandring/
            - img "Ett rött hus omgivet av träd."
            - heading "Om arbetsbaserad invandring" [level=2]
          - complementary "Metainformation för inlägget \"Om arbetsbaserad invandring\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regionval \d+/:
                  - /url: /sv/category/aluevaalit2025/
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link /#Kommunalval \d+/:
                  - /url: /sv/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /sv/category/maahanmuutto/
          - paragraph: De som invandrar för arbete har alltid möjligheten att flytta någon annanstans. Genom dem får vi också den eftertraktade arbetskraften som redan är utbildad och fostrad.
      - listitem:
        - article "Är utbildningen under särskilt skydd?":
          - 'link "En triptyk: till vänster Johanna Fleming i ett blåvitt plagg, i mitten Lauri Lavanti i kostym och slips och till höger Paula Oittinen i en mörk tröja. Är utbildningen under särskilt skydd?"':
            - /url: /sv/blog/27/ar-utbildningen-under-sarskilt-skydd/
            - 'img "En triptyk: till vänster Johanna Fleming i ett blåvitt plagg, i mitten Lauri Lavanti i kostym och slips och till höger Paula Oittinen i en mörk tröja."'
            - heading "Är utbildningen under särskilt skydd?" [level=2]
          - complementary "Metainformation för inlägget \"Är utbildningen under särskilt skydd?\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link /#Kommunalval \d+/:
                  - /url: /sv/category/kuntavaalit2025/
              - listitem:
                - link "#Utbildning":
                  - /url: /sv/category/opetus/
          - paragraph: Även om ekonomin behöver balanseras är det falskt att påstå att utbildningen inte skärs ned kraftigt. Indexförhöjningar och några bra lagändringar kompenserar inte för de miljarder som skärs ned från utbildningen.
      - listitem:
        - article "Om familjebaserad invandring":
          - link "Lauri Lavanti pekar på träd för ett barn som han håller i famnen. Om familjebaserad invandring":
            - /url: /sv/blog/26/om-familjebaserad-invandring/
            - img "Lauri Lavanti pekar på träd för ett barn som han håller i famnen."
            - heading "Om familjebaserad invandring" [level=2]
          - complementary "Metainformation för inlägget \"Om familjebaserad invandring\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regionval \d+/:
                  - /url: /sv/category/aluevaalit2025/
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link /#Kommunalval \d+/:
                  - /url: /sv/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /sv/category/maahanmuutto/
          - paragraph: De som invandrar på grund av familjeband är en mångskiftande grupp som omfattar familjemedlemmar till både medborgare och invandrare. De är dock redan längre i sin integration än många andra.
      - listitem:
        - article "Grattis, Finland!":
          - link "En finsk flagga som vajar på en flaggstång. Grattis, Finland!":
            - /url: /sv/blog/25/grattis-finland/
            - img "En finsk flagga som vajar på en flaggstång."
            - heading "Grattis, Finland!" [level=2]
          - complementary "Metainformation för inlägget \"Grattis, Finland!\"":
            - time: /\d+\.\d+\.\d+/
          - paragraph: /Finland fyller \d+ år idag\. Till dess ära är det dags att rehabilitera patriotismens anseende\. Finland är nämligen ett av världens finaste länder, där alla är lika värdefulla\./
      - listitem:
        - article "Invandringsvolymen":
          - link "Vita utomhustrappor som leder till en väg som går till ett hus. Invandringsvolymen":
            - /url: /sv/blog/24/essaer-om-invandring-invandringsvolymen/
            - img "Vita utomhustrappor som leder till en väg som går till ett hus."
            - heading "Invandringsvolymen" [level=2]
          - complementary "Metainformation för inlägget \"Invandringsvolymen\"":
