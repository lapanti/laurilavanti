  - img "Lauri Lavanti sitter på en pall och lutar sig mot ett högt bord. Han har på sig en svart kavaj och en blåvit blommig skjorta. I kavajfickan finns en flerfärgad bröstduk. En trappa i bakgrunden."
  - article:
    - paragraph: Jag skriver om teknik, ekonomi och kommunalpolitik i Kyrkslätt. Jag tror att god politik bygger på kunskap och öppen dialog. Läs mina texter och ta gärna ställning.
    - list:
      - listitem:
        - article "Kyrkslätt är mer jämlikt idag än det var igår":
