                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link /#Kommunalval \d+/:
                  - /url: /sv/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /sv/category/maahanmuutto/
          - paragraph: När man diskuterar invandring utelämnas siffrorna ofta eller är oklara. Verkligheten är dock att Finland bokstavligen har en bråkdel av den invandring som ses i Danmark och Sverige.
      - listitem:
        - article "Om invandringsdebatten":
          - link "En grusväg som leder till ett vitt hus. Om invandringsdebatten":
            - /url: /sv/blog/23/om-invandringsdebatten/
            - img "En grusväg som leder till ett vitt hus."
            - heading "Om invandringsdebatten" [level=2]
          - complementary "Metainformation för inlägget \"Om invandringsdebatten\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regionval \d+/:
                  - /url: /sv/category/aluevaalit2025/
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link /#Kommunalval \d+/:
                  - /url: /sv/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /sv/category/maahanmuutto/
          - paragraph: Invandring har alltför länge varit ett ämne som domineras av dem som ställer sig kritiska till det. Delvis beror det på att det är ett extremt mångfacetterat och komplext fenomen. Nu tar jag tag i det ordentligt.
