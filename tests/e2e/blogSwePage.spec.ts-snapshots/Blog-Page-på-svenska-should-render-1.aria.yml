            - img "Keijukaispuisto-parken i Laajakallio, Kyrkslätt"
            - heading "Närnatur måste värnas" [level=2]
          - complementary "Metainformation för inlägget \"Närnatur måste värnas\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Planläggning":
                  - /url: /sv/category/kaavoitus/
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "#Utbildning":
                  - /url: /sv/category/opetus/
              - listitem:
                - link "#Småbarnspedagogik":
                  - /url: /sv/category/varhaiskasvatus/
          - paragraph: Inte varje skog behöver fällas. Närnatur som är i aktivt bruk i synnerhet bör bevaras och är en viktig del av vår kommun.
      - listitem:
        - article "Hälsan tillhör alla":
          - link "Porträtt av Lauri Lavanti Hälsan tillhör alla":
            - /url: /sv/blog/11/halsan-tillhor-alla/
            - img "Porträtt av Lauri Lavanti"
            - heading "Hälsan tillhör alla" [level=2]
          - complementary "Metainformation för inlägget \"Hälsan tillhör alla\"":
