      - listitem:
        - article "Att spara på barn lönar sig inte":
          - link "Ett litet barn i overall som klättrar på en lekställning med rutschkana och olika klätterredskap. Att spara på barn lönar sig inte":
            - /url: /sv/blog/19/att-spara-pa-barn-lonar-sig-inte/
            - img "Ett litet barn i overall som klättrar på en lekställning med rutschkana och olika klätterredskap."
            - heading "Att spara på barn lönar sig inte" [level=2]
          - complementary "Metainformation för inlägget \"Att spara på barn lönar sig inte\"":
