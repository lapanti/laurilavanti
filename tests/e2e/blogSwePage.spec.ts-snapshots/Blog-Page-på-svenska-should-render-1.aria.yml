              - listitem:
                - link "#Planläggning":
                  - /url: /sv/category/kaavoitus/
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
          - paragraph: En av Kirkkonummis viktigaste dragningskrafter är vår natur. Det deltagarbudgeterande som nyss inletts har återigen visat det.
      - listitem:
        - article "Nytt år, bekant vinterväghal":
          - link "En dåligt plogad gångbana bredvid en omsorgsfullt plogad väg. Nytt år, bekant vinterväghal":
            - /url: /sv/blog/16/nytt-ar-bekant-vintervaghal/
            - img "En dåligt plogad gångbana bredvid en omsorgsfullt plogad väg."
            - heading "Nytt år, bekant vinterväghal" [level=2]
          - complementary "Metainformation för inlägget \"Nytt år, bekant vinterväghal\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Infrastruktur":
                  - /url: /sv/category/infra/
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "#Trafik":
                  - /url: /sv/category/liikenne/
          - paragraph: Kirkkonummis vinterväghållning har återigen visat sig vara lika dålig som tidigare år. Saker kunde vara annorlunda, om vi bara tillsammans bestämde oss för att sträva efter kvalitet.
      - listitem:
        - article "Kommunen måste planera långsiktigt":
          - link "Laajakallio skolbyggnad i Kyrkslätt Kommunen måste planera långsiktigt":
            - /url: /sv/blog/15/kommunen-maste-planera-langsiktigt/
            - img "Laajakallio skolbyggnad i Kyrkslätt"
            - heading "Kommunen måste planera långsiktigt" [level=2]
          - complementary "Metainformation för inlägget \"Kommunen måste planera långsiktigt\"":
            - time: /\d+\.\d+\.\d+/
          - paragraph: Kyrkslätts servicenätsutredning är en bra utgångspunkt för kunskapsbaserad ledning. Nu måste kommunens beslutsfattare besluta vilken slags kommun vi vill bygga framöver.
      - listitem:
        - article "Med ord formar vi verkligheten":
          - link "Porträtt av Lauri Lavanti Med ord formar vi verkligheten":
            - /url: /sv/blog/14/med-ord-formar-vi-verkligheten/
            - img "Porträtt av Lauri Lavanti"
            - heading "Med ord formar vi verkligheten" [level=2]
          - complementary "Metainformation för inlägget \"Med ord formar vi verkligheten\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
          - paragraph: Statsrådets redogörelse om främjande av likabehandling, jämställdhet och icke-diskriminering i det finländska samhället — mer informellt känd som antidiskrimineringsredogörelsen — är ett viktigt steg i hur vårt samhälle förhåller sig till rasism.
      - listitem:
        - article "Förr var det bättre":
          - link "En cykelbana nära Prisma i Kyrkslätt Förr var det bättre":
            - /url: /sv/blog/13/forr-var-det-battre/
            - img "En cykelbana nära Prisma i Kyrkslätt"
            - heading "Förr var det bättre" [level=2]
          - complementary "Metainformation för inlägget \"Förr var det bättre\"":
            - time: /\d+\.\d+\.\d+/
          - paragraph: Det vill säga för lätttrafiken — fotgängare och cyklister. Tänk om vi slutade bygga samhället på privatbilismens villkor?
      - listitem:
        - article "Närnatur måste värnas":
          - link "Keijukaispuisto-parken i Laajakallio, Kyrkslätt Närnatur måste värnas":
