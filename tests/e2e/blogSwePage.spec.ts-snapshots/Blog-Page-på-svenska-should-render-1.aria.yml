            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Planläggning":
                  - /url: /sv/category/kaavoitus/
              - listitem:
                - link "#Kyrkslätt":
                  - /url: /sv/category/kirkkonummi/
              - listitem:
                - link "#Kooperativval":
                  - /url: /sv/category/osuuskauppavaalit/
          - paragraph: Varuboden-Oslas andelslagsval pågår nu. Genom att rösta påverkar du människors arbetsplatser, konsumtionsbeteende och lokala tjänster.
      - listitem:
        - article "Vår natur är vårt trumfkort — år efter år":
          - link "Träd på en klippa, med en sjö i bakgrunden. Vår natur är vårt trumfkort — år efter år":
            - /url: /sv/blog/17/var-natur-ar-vart-trumfkort-ar-efter-ar/
            - img "Träd på en klippa, med en sjö i bakgrunden."
            - heading "Vår natur är vårt trumfkort — år efter år" [level=2]
          - complementary "Metainformation för inlägget \"Vår natur är vårt trumfkort — år efter år\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Infrastruktur":
