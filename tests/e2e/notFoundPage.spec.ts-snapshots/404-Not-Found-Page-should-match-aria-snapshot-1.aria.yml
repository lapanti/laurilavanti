      - listitem:
        - article "Vihreät – Markkinatalouden aito puolustaja":
          - link /Vihreiden puoluekokous Turussa \d+ Vihreät – Markkinatalouden aito puolustaja/:
            - /url: /fi/blog/62/vihreat-markkinatalouden-aito-puolustaja/
            - img /Vihreiden puoluekokous Turussa \d+/
            - heading "Vihreät – Markkinatalouden aito puolustaja" [level=2]
          - complementary "Kirjoituksen \"Vihreät – Markkinatalouden aito puolustaja\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Talous":
                  - /url: /fi/category/economy/
              - listitem:
                - link "Vihreät":
                  - /url: /fi/category/green-party/
              - listitem:
                - link "Kansallinen politiikka":
                  - /url: /fi/category/national-politics/
          - paragraph: Markkinatalous on tehokkain tunnettu tapa jakaa resursseja. Vihreät on sen ainoa aito puolustaja Suomessa – ei kamreritaloutta, vaan aitoja markkinoita.
      - listitem:
        - article "Velkajarrun ulkopuolelta ei tehdä vihreää talouspolitiikkaa":
          - link "Lauri Lavanti seisoo kukkapaita päällään sinistä taustaa vasten Velkajarrun ulkopuolelta ei tehdä vihreää talouspolitiikkaa":
            - /url: /fi/blog/61/velkajarrun-ulkopuolelta-ei-tehda-vihreaa-talouspolitiikkaa/
            - img "Lauri Lavanti seisoo kukkapaita päällään sinistä taustaa vasten"
            - heading "Velkajarrun ulkopuolelta ei tehdä vihreää talouspolitiikkaa" [level=2]
          - complementary "Kirjoituksen \"Velkajarrun ulkopuolelta ei tehdä vihreää talouspolitiikkaa\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Talous":
                  - /url: /fi/category/economy/
              - listitem:
                - link "Vihreät":
                  - /url: /fi/category/green-party/
              - listitem:
                - link "Kansallinen politiikka":
                  - /url: /fi/category/national-politics/
          - paragraph: Velkajarrusopimuksesta poistuminen ei muuta sopeutuksen määrää — se poistaa Vihreiden mahdollisuuden vaikuttaa siihen, miten sopeutus tehdään.
      - listitem:
        - article "Tekoäly auttaa palvelujen turvaamisessa, mutta se ei ole ilmaista":
          - link "Lauri Lavanti seisoo kukkapaita päällään valkoisella taustalla. Tekoäly auttaa palvelujen turvaamisessa, mutta se ei ole ilmaista":
            - /url: /fi/blog/60/tekoaly-auttaa-palvelujen-turvaamisessa-mutta-se-ei-ole-ilmaista/
            - img "Lauri Lavanti seisoo kukkapaita päällään valkoisella taustalla."
            - heading "Tekoäly auttaa palvelujen turvaamisessa, mutta se ei ole ilmaista" [level=2]
          - complementary "Kirjoituksen \"Tekoäly auttaa palvelujen turvaamisessa, mutta se ei ole ilmaista\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Tekoäly":
                  - /url: /fi/category/artificial-intelligence/
              - listitem:
                - link "Kirkkonummi":
                  - /url: /fi/category/kirkkonummi/
              - listitem:
                - link "Digitalisaatio":
                  - /url: /fi/category/digitalisation/
              - listitem:
                - link "Sivistys":
                  - /url: /fi/category/learning/
          - paragraph: Konnevedellä tekoäly lyhensi käsittelyajan kahdesta kuukaudesta päiviin. Kirkkonummi on liian pieni yksin — mutta yhteistyöllä muutos on mahdollinen.
      - listitem:
        - 'article "Valtuustoaloite: Kirkkonummen digitaalisen huoltovarmuuden vahvistaminen"':
          - 'link "Lauri Lavanti hymyilemässä ja katsomassa kameraan. Päällään hänellä on valkoinen t-paita, jossa lukee Digitaalinen itsenäisyys, jonka yllä on leijonakuvio. Lisäksi pikkutakki. Kuvan ottanut Erkki Laine. Valtuustoaloite: Kirkkonummen digitaalisen huoltovarmuuden vahvistaminen"':
            - /url: /fi/blog/59/valtuustoaloite-kirkkonummen-digitaalisen-huoltovarmuuden-vahvistaminen/
            - img "Lauri Lavanti hymyilemässä ja katsomassa kameraan. Päällään hänellä on valkoinen t-paita, jossa lukee Digitaalinen itsenäisyys, jonka yllä on leijonakuvio. Lisäksi pikkutakki. Kuvan ottanut Erkki Laine."
            - 'heading "Valtuustoaloite: Kirkkonummen digitaalisen huoltovarmuuden vahvistaminen" [level=2]'
          - 'complementary "Kirjoituksen \"Valtuustoaloite: Kirkkonummen digitaalisen huoltovarmuuden vahvistaminen\" meta-tiedot"':
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Kirkkonummi":
                  - /url: /fi/category/kirkkonummi/
              - listitem:
                - link "Digitaalinen itsenäisyys":
                  - /url: /fi/category/digital-independence/
              - listitem:
                - link "Valtuustoaloite":
                  - /url: /fi/category/council-motion/
          - paragraph: Kirkkonummi nojaa lähes kaikessa toiminnassaan digitaalisiin järjestelmiin. Aloite esittää riippuvuuksien kartoitusta ja siirtymistä avoimiin tiedostomuotoihin.
      - listitem:
        - article "Äänestin Västraa vastaan":
          - link "Kolme kolikkopinoa eri korkeuksilla valkoisella taustalla. Kuva havainnollistaa kunnan taloudellista päätöksentekoa. Äänestin Västraa vastaan":
            - /url: /fi/blog/58/aanestin-vastraa-vastaan/
            - img "Kolme kolikkopinoa eri korkeuksilla valkoisella taustalla. Kuva havainnollistaa kunnan taloudellista päätöksentekoa."
            - heading "Äänestin Västraa vastaan" [level=2]
          - complementary "Kirjoituksen \"Äänestin Västraa vastaan\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Talous":
                  - /url: /fi/category/economy/
              - listitem:
                - link "Kirkkonummi":
                  - /url: /fi/category/kirkkonummi/
              - listitem:
                - link "Länsi-Uusimaa":
                  - /url: /fi/category/western-uusimaa/
          - paragraph: "Äänestin Västra-rannikkoyhteistyötä vastaan. Valtuusto päätti liittyä. Perusteluni: rahat kuuluvat sivistyspalveluihin, ei sopimukseen josta ei pääse irti."
      - listitem:
        - article "Tekoäly muuttaa kehittäjän palkan perustan":
          - link "Kuvassa tietokoneen näyttö, jossa näkyy koodia. Tekoäly muuttaa kehittäjän palkan perustan":
            - /url: /fi/blog/57/tekoaly-ei-korvaa-koodareita-vaan-muuttaa-sen-mista-heille-maksetaan/
            - img "Kuvassa tietokoneen näyttö, jossa näkyy koodia."
            - heading "Tekoäly muuttaa kehittäjän palkan perustan" [level=2]
          - complementary "Kirjoituksen \"Tekoäly muuttaa kehittäjän palkan perustan\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Tekoäly":
                  - /url: /fi/category/artificial-intelligence/
              - listitem:
                - link "Digitalisaatio":
                  - /url: /fi/category/digitalisation/
              - listitem:
                - link "Sivistys":
                  - /url: /fi/category/learning/
              - listitem:
                - link "Talous":
                  - /url: /fi/category/economy/
          - paragraph: Tekoäly tekee kahdessa minuutissa sen, mihin kehittäjältä meni kaksi viikkoa. Koodin hinta romahtaa — mutta mistä kehittäjille sitten maksetaan?
      - listitem:
        - article "Lähteelä — yhteinen helmi Kirkkonummen rannikolla":
          - link "Lauri Lavanti ja Miisa Jeremejew, kunnanvaltuutettuja (vihr.), Kirkkonummi Lähteelä — yhteinen helmi Kirkkonummen rannikolla":
            - /url: /fi/blog/56/lahteela-yhteinen-helmi-kirkkonummen-rannikolla/
            - img "Lauri Lavanti ja Miisa Jeremejew, kunnanvaltuutettuja (vihr.), Kirkkonummi"
            - heading "Lähteelä — yhteinen helmi Kirkkonummen rannikolla" [level=2]
          - complementary "Kirjoituksen \"Lähteelä — yhteinen helmi Kirkkonummen rannikolla\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Kirkkonummi":
                  - /url: /fi/category/kirkkonummi/
              - listitem:
                - link "Luonto":
                  - /url: /fi/category/nature/
          - paragraph: Kirkkonummi osti Lähteelän rannikkokohteen. Se on yksi harvoista paikoista, jonne pääsee myös ilman omaa venettä — nyt se on pysyvästi kaikkien saavutettavissa.
