      - listitem:
        - article "Kirkkonummi on tänään tasa-arvoisempi kuin eilen":
          - link "Kuvassa on kaksi urosleijonaa savannilla. Toinen istuu ja karjuu, toinen makaa. Kirkkonummi on tänään tasa-arvoisempi kuin eilen":
            - /url: /fi/blog/52/kirkkonummi-on-tanaan-tasa-arvoisempi-kuin-eilen/
            - img "Kuvassa on kaksi urosleijonaa savannilla. Toinen istuu ja karjuu, toinen makaa."
            - heading "Kirkkonummi on tänään tasa-arvoisempi kuin eilen" [level=2]
          - complementary "Kirjoituksen \"Kirkkonummi on tänään tasa-arvoisempi kuin eilen\" meta-tiedot":
