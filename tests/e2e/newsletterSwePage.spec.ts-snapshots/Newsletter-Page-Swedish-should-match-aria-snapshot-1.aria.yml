- main:
  - heading "Nyhetsbrev – teknologi, AI och samhälle" [level=1]
  - img "Lauri Lavanti står med händerna längs sidorna, ett avslappnat leende och blicken mot kameran. Han har på sig en vit skjorta med blå blomstermönster och en mörk kavaj. Bilden togs av Erkki Laine."
  - article:
    - paragraph: Jag skriver om AI, digital självständighet, integritet och teknikens samhällspåverkan. Som ledande mjukvaruutvecklare och diplomingenjör granskar jag ämnena från både ett tekniskt och samhälleligt perspektiv — utan hets och skrämselpropaganda.
    - heading "Aktuella ämnen" [level=2]
    - list:
      - listitem: AI och mjukvaruutveckling — från hantverk till industri
      - listitem: Åldersgränser i sociala medier — hur andra gjort det, hur det borde göras, och om det borde göras alls?
      - listitem: AI:s oundviklighet — är vi aktiva aktörer eller passiva mål?
    - paragraph: Direkt till din inkorg, utan algoritmer emellan.
    - heading "Nyhetsbrev" [level=2]
    - paragraph: Prenumerera och få genomarbetade förklaringar och analyser av de senaste teknologierna och deras påverkan på samhället. Direkt till din inkorg.
    - text: E-post
    - textbox "E-post"
    - button "Prenumerera"
    - paragraph:
      - text: Du kan avsluta prenumerationen när som helst. För mer information, läs vår
