- main:
  - heading "Prenumerera på nyhetsbrevet om ekonomi, bildning och frihet i AI-tidsåldern" [level=1]
  - img "Lauri Lavanti står med händerna längs sidorna, ett avslappnat leende och blicken mot kameran. Han har på sig en vit skjorta med blå blomstermönster och en mörk kavaj. Bilden togs av Erkki Laine."
  - article:
    - paragraph: I mitt nyhetsbrev reflekterar jag över hur teknologi – särskilt artificiell intelligens – förändrar vårt samhälle, vårt arbete och vår vardag. I mina texter behandlar jag till exempel varför digital självständighet är en nödvändighet för samhället, hur AI-drivna förändringar i arbetslivet tvingar oss att förnya oss och vilken framtid vi vill bygga tillsammans.
    - heading "Hur förändrar AI arbete och ekonomi?" [level=2]
    - paragraph: Jag tror att teknologin ska möjliggöra nya lösningar. Därför betonar jag i mitt nyhetsbrev hållbara innovationer och väcker diskussion om hur vi kan utnyttja de möjligheter som teknologin erbjuder. Mitt mål är att erbjuda dig tankeväckande, faktabaserat och lösningsorienterat innehåll.
    - heading "Aktuella ämnen" [level=2]
    - list:
      - listitem: » AI och programvaruutveckling – från hantverk till industri
      - listitem: » Åldersgränser på sociala medier – hur har det gjorts annorstädes, hur bör det göras, och bör det ens göras?
      - listitem: » AI:s oundviklighet – är vi aktiva aktörer eller offer för förändringen
    - paragraph: Prenumerera på mitt nyhetsbrev, så får du aktuella reflektioner direkt till din e-post.
    - heading "Nyhetsbrev" [level=2]
    - paragraph: Prenumerera och få genomarbetade förklaringar och analyser av de senaste teknologierna och deras påverkan på samhället. Direkt till din inkorg.
    - text: E-post
    - textbox "E-post"
    - paragraph:
      - text: Du kan avsluta prenumerationen när som helst. För mer information, läs vår
