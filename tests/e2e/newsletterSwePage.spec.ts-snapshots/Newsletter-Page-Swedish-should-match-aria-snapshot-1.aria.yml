  - heading "Prenumerera på nyhetsbrevet – politiken" [level=1]
  - img "Lauri Lavanti står med händerna längs sidorna, ett avslappnat leende och blicken mot kameran. Han har på sig en vit skjorta med blå blomstermönster och en mörk kavaj. Bilden togs av Erkki Laine."
  - article:
    - paragraph: Teknologin förändrar samhället snabbare än någon hinner följa med. AI, algoritmer, desinformation — varje vecka kommer något nytt, och få har tid att sätta sig in i vad det hela egentligen betyder.
    - paragraph: "I mitt nyhetsbrev tar jag ett ämne i taget och breder ut det: vad som händer, vad det innebär och vad man bör tänka om det. Jag hetsar varken upp eller skräms, utan breder ut mina tankar och situationen på ett begripligt sätt."
    - paragraph: Direkt till din inkorg, utan algoritmer.
    - heading "Nyhetsbrev" [level=2]
    - paragraph: Prenumerera och få genomarbetade förklaringar och analyser av de senaste teknologierna och deras påverkan på samhället. Direkt till din inkorg.
