    - region "Vanliga frågor":
      - heading "Vanliga frågor" [level=2]
      - term: Vad handlar Lauri Lavannis nyhetsbrev om?
      - definition: "Nyhetsbrevet tar upp ett ämne i taget: AI, digital självständighet, integritet och teknikens samhällspåverkan. Perspektivet är sakkunnigt men begripligt."
