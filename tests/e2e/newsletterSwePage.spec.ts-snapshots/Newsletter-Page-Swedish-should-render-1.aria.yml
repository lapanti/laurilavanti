- main:
  - article:
    - heading "Prenumerera på nyhetsbrevet" [level=1]
    - img "Lauri Lavanti står med händerna längs sidorna, ett avslappnat leende och blicken mot kameran. Han har på sig en vit skjorta med blå blomstermönster och en mörk kavaj. Bilden togs av Erkki Laine."
    - paragraph: AI, digitalisering och sociala medier förändrar samhället snabbare än lagstiftarna hinner reagera. Nyheterna rusar förbi, och få har tid att stanna upp och fundera på vad förändringen egentligen betyder i vardagen, arbetslivet eller demokratin.
    - paragraph: I nyhetsbrevet går jag igenom dessa frågor i lugn och ro. Jag erbjuder inga enkla svar och hyllar inte teknologin — men skrämmer inte heller. Jag försöker förklara vad som faktiskt händer och varför det kan vara viktigt just för dig.
    - paragraph: Jag skriver vanligtvis en eller ett par gånger i månaden. Kort, koncist, utan skräppost.
    - heading "Nyhetsbrev" [level=2]
    - paragraph: Prenumerera för att få Lauris tankar—sammanfattade och redo att läsa när det passar dig—direkt till din inkorg.
