- main:
  - article:
    - heading "Suositukset" [level=1]
    - img "Lauri Lavanti seisomassa käytävällä kädet taskuissa, katse kameraan. Päällä tumma puku ja valkoinen kauluspaita."
    - complementary "Suosituksista lyhyesti":
      - heading "Suosituksista lyhyesti" [level=2]
      - list:
        - listitem: » Laurilla on laaja kokemus niin teknologia-alalta kuin kunnallispolitiikasta.
        - listitem: » Lauri toimii kunnanvaltuutettuna Kirkkonummella ja Vihreän valtuustoryhmän puheenjohtajana.
        - listitem: » Lauri on tunnettu rakentavasta yhteistyöstä yli puoluerajojen.
        - listitem: » Työelämässä Lauri työskentelee usein yli osaamis- ja organisaatiorajojen.
        - listitem: » Tältä sivulta löydät suosituksia ihmisiltä, jotka tuntevat Laurin.
    - list:
      - listitem:
        - article:
          - img "Kuva Atte Harjanteesta. Hänellä on päällään valkoinen kauluspaita ja tumma pikkutakki."
          - blockquote:
            - paragraph: Eduskunnassa on iso vaje teknologian ja tietopolitiikan asiantuntijoista. Lauri paikkaisi tätä vajetta isosti!
            - text: Atte Harjanne Kansanedustaja
      - listitem:
        - article:
          - img "Kuva Mari Holopaisesta. Päällään hänellä on vaalea takki."
          - blockquote: Mari Holopainen Kansanedustaja
      - listitem:
        - article:
          - img "Kuva Otso Kivekkäästä. Päällään hänellä on t-paita, jossa lukee Helsinki, sekä pikkutakki. Päässä hattu."
          - blockquote: Otso Kivekäs Toimitusjohtaja, kaupunginvaltuutettu
      - listitem:
        - article:
          - img "Kuva Aki Koikkalaisesta. Päällä valkoinen kauluspaita ja tumma pikkutakki."
          - blockquote:
            - paragraph: Jos kuitenkin äänestät vihreitä, anna äänesi Laurille. Älystä ja osaamisesta on hyötyä ihan joka puolueessa!
            - text: Aki Koikkalainen Toimitusjohtaja
      - listitem:
        - article:
          - img "Kuva Juho Makkosesta. Hänellä on päällään beige neule."
          - blockquote:
            - paragraph: Laurissa vankka osaaminen teknologiasta ja taloudesta yhdistyy vahvaan visioon siitä, miten yhteiskunnasta rakennetaan oikeudenmukaisempi ja parempi paikka kaikille, samalla ympäristöstä huolehtien.
            - text: Juho Makkonen Toimitusjohtaja, Sharetribe Oy
      - listitem:
        - article:
          - img "Kuva Allu Pyhälammista. Hänellä on päällään tumma pikkutakki ja iso kaulahuivi."
          - blockquote:
            - paragraph: Lauri on hyvin nopeasti osoittanut suurta omistautumista ja aktiivisuutta maailman muuttamiselle ja Vihreän politiikan teolle! Häneltä hoituu niin järjestön pyörittäminen, poliittisten teemojen syväosaaminen, vahva ja kestävä sosiaalisen median näkyvyys ja hienot verkostotaidot. Hän on mm. kunnostautunut Suomen digitaalista itsenäisyyttä ajavana moottorina, jolla on aina ihmisen hyvinvointi ja järkevät talousratkaisut toimintansa keskiössä.
            - text: Allu Pyhälammi Vihreiden varapuheenjohtaja
      - listitem:
        - article:
          - img "Kuva Sofia Virrasta. Päällään hänellä on sininen paita ja nahkatakki."
          - blockquote: Sofia Virta Kansanedustaja