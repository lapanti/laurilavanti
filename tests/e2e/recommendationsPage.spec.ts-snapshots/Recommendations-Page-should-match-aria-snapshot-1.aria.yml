- main:
  - heading "Suosituksia ja kokemuksia Laurista" [level=1]
  - img "Lauri Lavanti seisomassa käytävällä kädet taskuissa, katse kameraan. Päällä tumma puku ja valkoinen kauluspaita."
  - article:
    - complementary "Miksi valita Lauri?":
      - heading "Miksi valita Lauri?" [level=2]
      - list:
        - listitem: » Lauri paikkaa eduskunnan teknologia- ja tietopolitiikan osaamisvajetta. Juuri hänen kaltaisiaan asiantuntijoita tarvitaan.
        - listitem: » Lauri on älykäs ja osaava vaikuttaja. Laurin yhteistyökykyä arvostetaan myös työelämässä ja yli puoluerajojen.
        - listitem: » Lauri yhdistää teknologian, talouden ja oikeudenmukaisuuden. Hänellä on visio paremmasta yhteiskunnasta.
        - listitem: » Lauri on Suomen digitaalisen itsenäisyyden ajaja. Hänellä on keskiössä ihmislähtöiset ja taloudellisesti kestävät ratkaisut.
        - listitem: » Tälle sivulle on koottuna Lauria tuntevien suosituksia.
      - button "Lisää"
    - paragraph: Tällä sivulla on muiden ihmisten suosituksia ja kommentteja Lauri Lavannista.
    - heading "Miksi teknologiaosaamista tarvitaan juuri nyt?" [level=2]
    - paragraph: "Suomi on ollut vuosikymmeniä korkean teknologian ja osaamisen mallimaa – Vaisalasta jäänmurtajiin, Nokiaan, Linuxiin ja Supercelliin. Nyt tämä asema on kuitenkin horjumassa, ja tekoäly mullistaa yhteiskuntaa perusteellisesti: se muuttaa työtä, luottamusta digitaalisiin palveluihin sekä ihmisten välisiä yhteyksiä. Tarvitsemme osaamista ja ymmärrystä teknologioista, tekoälystä ja liiketoiminnasta. Minulla on teknologiakoulutus Aalto-yliopistosta ja yli vuosikymmenen kokemus turvallisten ohjelmistojen ja pankkipalvelujen kehittäjänä. Ymmärrän, millä eri tavoilla liiketoimintaa voidaan tehdä sekä kaiken tämän yhteyden yhteiskuntaan ja oikeusvaltioon, joka asettaa teknologialle rajat."
    - paragraph: "Osa näistä rajoista on erityisen arvokkaita: ne suojaavat meidän kaikkien yksityisyyttä ja perusoikeuksia. Yksityisyydensuoja ei ole jarru kehitykselle, vaan se on demokratian edellytys."
    - paragraph: Lue suositukset alta!
    - list:
      - listitem:
        - article:
          - img "Kuva Aki Koikkalaisesta. Päällä valkoinen kauluspaita ja tumma pikkutakki."
          - blockquote:
            - paragraph:
              - emphasis: Jos kuitenkin äänestät vihreitä, anna äänesi Laurille. Älystä ja osaamisesta on hyötyä ihan joka puolueessa!
            - text: Aki Koikkalainen Toimitusjohtaja
      - listitem:
        - article:
          - img "Kuva Juho Makkosesta. Hänellä on päällään beige neule."
          - blockquote:
            - paragraph:
              - emphasis: Laurissa vankka osaaminen teknologiasta ja taloudesta yhdistyy vahvaan visioon siitä, miten yhteiskunnasta rakennetaan oikeudenmukaisempi ja parempi paikka kaikille, samalla ympäristöstä huolehtien.
            - text: Juho Makkonen Toimitusjohtaja, Sharetribe Oy
      - listitem:
        - article:
          - img "Kuva Atte Harjanteesta. Hänellä on päällään valkoinen kauluspaita ja tumma pikkutakki."
          - blockquote:
            - paragraph:
              - emphasis: Eduskunnassa on iso vaje teknologian ja tietopolitiikan asiantuntijoista. Lauri paikkaisi tätä vajetta isosti!
            - text: Atte Harjanne Kansanedustaja
      - listitem:
        - article:
          - img "Kuva Allu Pyhälammista. Hänellä on päällään tumma pikkutakki ja iso kaulahuivi."
          - blockquote:
            - paragraph:
              - emphasis: Lauri on hyvin nopeasti osoittanut suurta omistautumista ja aktiivisuutta maailman muuttamiselle ja Vihreän politiikan teolle! Häneltä hoituu niin järjestön pyörittäminen, poliittisten teemojen syväosaaminen, vahva ja kestävä sosiaalisen median näkyvyys ja hienot verkostotaidot. Hän on mm. kunnostautunut Suomen digitaalista itsenäisyyttä ajavana moottorina, jolla on aina ihmisen hyvinvointi ja järkevät talousratkaisut toimintansa keskiössä.
            - text: Allu Pyhälammi Vihreiden varapuheenjohtaja
      - listitem:
        - article:
          - 'img "Kuva Juhana Karhulasta painimatolla. Hänellä on päällään musta trikoopaita ja pitkä turkisreunainen takki, taustalla vihreät lavavalot. Kuva: FCF Wrestling / Akseli Vaheristo."'
          - blockquote:
            - paragraph:
              - emphasis: Lauri on ennen kaikkea hyvä ihminen joka välittää ihmisistä, ympäristöstä ja Suomesta. Teknologisella asiantuntijuudellaan ja empatiakyvyllään Lauri pystyy taistelemaan teknologiajättien aiheuttamia haittavaikutuksia vastaan aidosti ihmislähtöisestä asemasta. Suomi olisi yksinkertaisesti parempi paikka olla ja asua jos Lauri olisi edustamassa sen kansaa.
            - text: Juhana Karhula Ketteryyden ammattilainen - Suomalaisen showpainin legenda
      - listitem:
        - article:
          - img "Kuva Lauri Nevanperästä. Hänellä on pitkät kammatut hiukset, parta ja silmälasit, päällään musta takki ja vaaleanpunertava t-paita."
          - blockquote:
            - paragraph:
              - emphasis: Tietojärjestelmät ovat yhä enemmän yhteiskunnan perusinfraa. Tekoälymurroksessa ja nykyisessä geopoliittisessa tilanteessa tarvitaan osaajia, jotka ymmärtävät järjestelmien mahdollisuudet ja uhat. Lauri on myös valtavan aikaansaava kaveri.
            - text: Lauri Nevanperä Tampereen kaupunginvaltuutettu, johtava tekoälyinsinööri
      - listitem:
        - article:
          - img "Kuva Kalle Eurosta. Hänellä on silmälasit, harmaa neule ja tumma takki."
          - blockquote:
            - paragraph:
              - emphasis: Laurin kanssa voi puhua yhtä sujuvasti tekoälyn yhteiskunnallisista vaikutuksista kuin siitä, miten markkinatalous pidetään reiluna kaikille. Tällaista yhdistelmää – uteliaisuutta, asiantuntemusta ja oikeudentajua – tarvitaan eduskunnassa.
            - text: Kalle Euro Toiminnanjohtaja
      - listitem:
        - article:
          - img "Kuva Mari Holopaisesta. Päällään hänellä on vaalea takki."
          - blockquote:
            - paragraph:
              - emphasis: Eduskuntaan tarvitaan enemmän ihmisiä, jotka ymmärtävät sekä taloudesta että teknologiasta. Yhtenä Digitaalinen itsenäisyys -kansalaisaloitteen perustajista Lauri tunnistaa, miten Suomen tulisi toimia yhteiskuntaa monin tavoin muokkaavan teknologisen murroksen edessä. Laurilla on vahva analyyttinen ote, kyky hahmottaa laajoja kokonaisuuksia ja taito tehdä monimutkaisistakin asioista ymmärrettäviä. Hän on myös poikkeuksellisen sinnikäs ja työtä pelkäämätön.
            - text: Mari Holopainen Kansanedustaja, kauppatieteiden maisteri