    - heading "Koulutus" [level=2]
    - list:
      - listitem:
        - text: /» Diplomi-insinööri \(informaatioverkostot\) Aalto-yliopisto \(Espoo\) \d+–\d+/
        - list:
          - listitem: "» Laaja pääaine ICT in business — valittu perinteisen sivuaineen sijaan saadakseni enemmän syvyyttä teknologian, liiketoiminnan ja päätöksenteon risteyskohtaan. Ohjelma antoi minulle työkalupakin, jota olen käyttänyt jokaisessa roolissani sen jälkeen: monimutkaisten järjestelmien nopea ymmärtäminen, niiden vaikutuksien hahmottaminen ja teknologian sekä liiketoiminnan välinen tulkkaus."
          - listitem: "» Diplomityö: tapaustutkimus ontologiaeditorin suunnittelusta ja toteutuksesta muotialan asiantuntijoille — tehty Zalandolla, jossa rakensin työkalun."
          - listitem: » Kandidaattivaiheen pääaine käyttökokemus ja käytettävyys, joka opetti katsomaan järjestelmiä ja vaatimuksia käyttäjän silmin järjestelmän teknisyydestä riippumatta.
          - listitem: » Kandidaattivaiheen sivuaine tietoverkkojen sovellukset, joka antoi matalan tason tietotekniikan perusteet, joita olen hyödyntänyt jokaisessa pankki-, vähittäiskauppa- ja alustaroolissani.
          - listitem: "» Kandidaatintyö: droonien (tuolloin vielä \"nelikoptereiden\") käyttö varastonhallinnassa."
      - listitem:
        - text: /» Datanomi Omnia ammattiopisto \(Kirkkonummi\) \d+–\d+/
        - list:
          - listitem: » Datanomi, informaatioverkostot ja -teknologiat, suoritettu osana niin kutsuttua kolmoistutkintoa — täysimittainen lukio, ammatillinen perustutkinto ja ylioppilastutkinto samanaikaisesti.
          - listitem: » Lukiossa painotus matematiikassa ja yhteiskuntaopissa. Ammatillinen osuus kattoi tietoverkot ja -teknologiat.
          - listitem: » Halusin saada valmiin ammatin sekä teknistä syvyyttä ylioppilastutkinnon tarjoamien mahdollisuuksien lisäksi.
      - listitem: /» Ylioppilas Masalan lukio \(Kirkkonummi\) \d+–\d+/