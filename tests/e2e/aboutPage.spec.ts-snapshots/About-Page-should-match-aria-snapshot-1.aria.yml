- main:
  - heading "Tekoälyosaaminen kuuluu päätöksentekoon" [level=1]
  - img "Lauri Lavanti istumassa tuolilla ikkunan edessä, katse kameraan, hymyillen. Hänellä on päällään valkoinen kauluspaita, jossa on sinisiä kukkakuvioita, sekä tumma pikkutakki. Kuvan otti Juha Jantunen."
  - article:
    - complementary "Faktoja Laurista":
      - heading "Lauri lyhyesti" [level=2]
      - list:
        - listitem: » Yhdistää käytännön teknologiaosaamisen talousajatteluun ja yhteiskunnalliseen vastuuseen.
        - listitem: » Yli vuosikymmenen kokemus turvallisten ohjelmistojen kehittämisestä, johtava ohjelmistokehittäjä pankissa.
        - listitem: » Kunnanvaltuutettu Kirkkonummella, Vihreän valtuustoryhmän puheenjohtaja.
        - listitem: » Informaatioverkostojen diplomi-insinööri Aalto-yliopistosta.
        - listitem: » Ajaa digitaalista itsenäisyyttä, yksityisyyden suojaa ja tekoälyn järkevää käyttöä.
        - listitem: » Neljä lasta.
      - button "Lisää"
    - paragraph: Lauri Lavanti rakentaa ohjelmistoja pankissa ja tekee päätöksiä kunnanvaltuustossa. Hänen näkemyksensä teknologiasta ei pohjaa hypeen tai sivusta katsomiseen, vaan käytännön kokemukseen ja osaamiseen.
    - paragraph: "Hän on johtava ohjelmistokehittäjä, Kirkkonummen kunnanvaltuutettu sekä Vihreän valtuustoryhmän puheenjohtaja. Hän on Aalto-yliopistosta valmistunut diplomi-insinööri ja keskittyy tekoälyyn, talouteen, yrittäjyyteen sekä digitaaliseen itsenäisyyteen. Digitaalinen itsenäisyys, yksityisyyden suoja ja tekoälyn vastuullinen käyttöönotto ovat osa samaa kokonaisuutta: miten rakennamme teknologista kehitystä, joka on sekä kilpailukykyistä että kestävää."
    - paragraph:
      - text: Laurista on myös
      - link "Wikipedia-artikkeli":
        - /url: https://fi.wikipedia.org/wiki/Lauri_Lavanti
      - text: .
    - heading "Teknologiaosaaja, joka yhdistää kilpailukyvyn ja yksityisyyden suojan" [level=2]
    - paragraph: Toimin johtavana ohjelmistokehittäjänä ja vastaan tiimimme palveluiden teknisistä ratkaisuista. Työni keskiössä ovat vaativien kokonaisuuksien suunnittelu, kehittäminen ja ylläpito. Johdan teknisiä linjauksia, rakennan tiimin tekoälytyökaluja ja käyn aktiivista vuoropuhelua sidosryhmien kanssa, jotta ratkaisut vastaavat todellisia tarpeita ja kestävät aikaa.
    - paragraph: Digitalisaatio ei ole minulle vain tekninen kysymys, vaan myös yhteiskunnallinen ja eettinen. Huolehdin siitä, että ratkaisut eivät ole toimivia vain tänään, vaan myös turvallisia ja ylläpidettäviä huomenna. Teknologian tulee olla turvallista, toimivaa ja palvella ihmisiä.
    - paragraph: Suomi on ollut korkean teknologian mallimaa vuosikymmeniä. Tekoäly muuttaa työtä, palveluita ja luottamusta digitaalisiin järjestelmiin. Tarvitsemme päättäviin asemiin ihmisiä, jotka ymmärtävät teknologiaa käytännön tasolla.
    - heading "Miksi olen mukana politiikassa?" [level=2]
    - paragraph: Politiikassa keskityn erityisesti tekoälyyn, talouteen ja digitalisaatioon – sekä siihen, miten Suomi pysyy kilpailukykyisenä samalla kun varmistamme yksityisyyden suojan ja digitaalisen itsenäisyyden. Yhteiskunta digitalisoituu jatkuvasti, mutta julkishallinto ja päätöksenteko eivät usein pysy kehityksen tahdissa. Sama haaste koskee koko Suomea.
    - paragraph: Tärkeimmät luottamustehtäväni ovat Kirkkonummen kunnanvaltuutettuna ja Vihreän valtuustoryhmän puheenjohtajana toimiminen.
    - paragraph: Tarvitsemme parempaa ymmärrystä teknologian mahdollisuuksista ja riskeistä sekä rohkeutta panostaa koulutukseen ja korkean tuottavuuden teknologiseen kehitykseen. On entistäkin tärkeämpää, ettei Suomi jää jälkeen osaamisessa tai kilpailukyvyssä.
    - heading "Digitaalinen itsenäisyys ja kansalaistoiminta" [level=2]
    - paragraph: Olen Digitaalinen itsenäisyys -kansalaisaloitteen alullepanija ja pääyhteyshenkilö. Aloitteemme vaatii, että julkishallinnon kriittiset digitaaliset palvelut ja tiedot pysyvät suomalaisten ja eurooppalaisten toimijoiden käsissä – EU/ETA-alueen palvelimilla.
    - paragraph: Digitaalinen itsenäisyys tukee eurooppalaista teknologista kehitystä, vähentää riippuvuutta yksittäisistä toimittajista ja luo paremmat edellytykset kotimaiselle ohjelmistokehitykselle. Se ei ole ideologiaa, vaan käytännön edellytys toimivalle yhteiskunnalle – ja se vahvistaa myös demokratiaa ja kansalaisten oikeuksia, luoden samalla markkinoita uudelle yritystoiminnalle.
    - heading "Monialaisuus ja laaja-alainen näkemys" [level=2]
    - paragraph: Olen koulutukseltani informaatioverkostojen diplomi-insinööri. Koulutusohjelma rakentuu tietotekniikan päälle, mutta laajentuu tekniikasta muun muassa estetiikkaan ja filosofiaan. Koulutus on opettanut katsomaan järjestelmiä sekä teknisinä että inhimillisinä kokonaisuuksina.
    - paragraph: Monialaisuus on antanut minulle valmiudet toimia sujuvasti sillanrakentajana rakentamassa yhteistä ymmärrystä eri ammattiryhmien välille. Tarkastelen teknologiaa myös aina merkitysten, vaikutusten ja vastuullisuuden näkökulmasta. Käytännössä se tarkoittaa, että pystyn puhumaan sekä teknisten asiantuntijoiden että liiketoiminnan edustajien kanssa – ja varmistamaan, että ne ymmärtävät toisiaan.
    - heading "Kotona ja vapaalla" [level=2]
    - paragraph: Vapaa-ajallani keskiössä ovat neljä lastani. Arki koostuu harrastuksista, retkistä ja yhteisistä hetkistä. Vanhemmuus opettaa minulle paljon tunnetaidoista, vuorovaikutuksesta sekä jatkuvan harjoittelun ja kehittymisen tärkeydestä.
    - paragraph: Lautapelit, videopelit, kirjallisuus ja joukkueurheilu ovat kulkeneet mukanani pitkään. Vaikka ruuhkavuodet rajaavat aikaa, pidän tärkeänä säilyttää tilaa myös näille kiinnostuksen kohteille, ja olenkin korvannut joukkueurheilua aktiivisella lenkkeilyllä. Yksi rakkaimpia harrastuksiani on ollut amerikkalainen jalkapallo, jossa pelasin puolustuksen linjamiestä sekä tukimiestä Aalto Predatorsissa ja Helsinki Wolverinesissa. Sain myös kunnian edustaa Suomea opiskelijamaajoukkueessa, muun muassa kaikkien aikojen ensimmäisissä yliopistotason MM-kisoissa Uppsalassa.
