    - region "Usein kysytyt kysymykset":
      - heading "Usein kysytyt kysymykset" [level=2]
      - term: Mikä on Lauri Lavannin tausta?
      - definition: Lauri Lavanti on johtava ohjelmistokehittäjä pankissa ja diplomi-insinööri Aalto-yliopistosta. Hän on myös Kirkkonummen kunnanvaltuutettu ja Vihreän valtuustoryhmän puheenjohtaja.
      - term: Mikä on Lauri Lavannin kanta yrittäjyyteen?
      - definition: Lauri Lavanti ajaa yrittäjyyttä helpottavaa lainsäädäntöä ja haluaa vähentää byrokratiaa pk-yrityksiltä. Hän uskoo, että kilpailukykyinen Suomi tarvitsee kasvuhaluisia yrittäjiä ja selkeitä digitaalisia toimintaedellytyksiä.
      - term: Miten Vihreät tukevat pienyrittäjiä?
      - definition: Vihreät haluavat keventää pienyrittäjien hallinnollista taakkaa ja kehittää digitaalisia palveluita, jotka helpottavat yritystoimintaa. Lauri Lavanti ajaa käytännönläheisiä uudistuksia, jotka parantavat pk-yritysten toimintaympäristöä.
      - term: Mihin Lauri Lavanti erikoistuu politiikassa?
      - definition: Lauri Lavanti erikoistuu digitalisaatioon, yksityisyyden suojaan ja tekoälyn hallittuun käyttöönottoon. Hän tarkastelee teknologiaa sekä teknisinä kokonaisuuksina että niiden yhteiskunnallisten vaikutusten kautta.