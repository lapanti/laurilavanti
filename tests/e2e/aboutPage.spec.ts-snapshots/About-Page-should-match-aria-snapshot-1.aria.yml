    - heading "Luottamustoimet" [level=2]
    - list:
      - listitem:
        - text: /» Kunnanvaltuutettu Kirkkonummen kunta \d+–/
        - list:
          - listitem: » Valtuustossa päätämme kunnan strategian, talousarvion eli budjetin sekä päätämme kriittisistä ja suuremmista asioista, kuten koulurakennuksista.
      - listitem:
        - text: /» Vihreän valtuustoryhmän puheenjohtaja Kirkkonummen kunta \d+–/
        - list:
          - listitem: » Vastuussa ryhmän kantojen koordinoinnista ja työn johtamisesta valtuustossa.
      - listitem:
        - text: /» Kuntakehityslautakunnan jäsen Kirkkonummen kunta \d+–/
        - list:
          - listitem: » Kuntakehityslautakunta päättää kunnan maankäytöstä ja kaavoituksesta sekä tieinfran ylläpidosta.
      - listitem:
        - text: /» Puheenjohtaja Kirkkonummen Vihreät \d+/
        - list:
          - listitem: /» Johdin Kirkkonummen Vihreät läpi vuoden \d+ kuntavaalien — vakiinnuttaen asemamme Kirkkonummen kolmanneksi suurimpana puolueena ja saaden merkittävästi uusia jäseniä\./
          - listitem: » Rakensin ja johdin ehdokaslistaa; tein tiivistä yhteistyötä vaalipäällikön kanssa strategiassa ja toteutuksessa.
          - listitem: » Kehitin organisaatiota ja toimintatapoja vähemmän riippuvaiseksi yksittäisistä ihmisistä.
      - listitem: /» Toimitilapalvelujen lautakunnan varajäsen Kirkkonummen kunta \d+–\d+/
      - listitem: /» Hallituksen varajäsen Kirkkonummen Vihreät \d+–\d+/
      - listitem: /» Länsi-Uudenmaan pelastuslaitos -liikelaitoksen johtokunnan varajäsen Länsi-Uudenmaan hyvinvointialue \d+–\d+/
      - listitem: /» Suomenkielisen kasvatus- ja koulutuslautakunnan varajäsen Kirkkonummen kunta \d+–\d+/
      - listitem: /» Perusturvajaoston jäsen Kirkkonummen kunta \d+–\d+/
      - listitem:
        - text: /» KV-kapteeni Informaatioverkostojen kilta Athene \d+/
        - list:
          - listitem: » Ensimmäinen Athenen hallituksen jäsen, joka vastasi kansainvälisistä opiskelijoista — rooli oli uusi, koska koulutusohjelmamme oli juuri avautunut maisteritason kansainvälisille opiskelijoille.
          - listitem: » Rakensin killan sisäisiä käytäntöjä kansainvälisten opiskelijoiden tukemiseksi.
          - listitem: » Koordinoin työtä kansainvälisten palveluiden yhdenmukaistamiseksi Aallon teknisten koulutusohjelmien kiltojen välillä.
      - listitem:
        - text: /» Kapteeni Aalto Predators \d+–\d+/
        - list:
          - listitem: » Rakensin joukkuehenkeä, toimintatapojamme sekä johdin esimerkillä.
      - listitem:
        - text: /» Hallituksen puheenjohtaja Aalto Predators \d+–\d+/
        - list:
          - listitem: » Johdatin joukkueen sarjan toisiksi viimeiseltä paikalta yliopiston mestaruuteen kauteni aikana.
          - listitem: » Aloitin otteluiden suoratoiston — lähetys trendasi Redditissä ja johti yhden selostajamme haastatteluun yhdysvaltalaisessa aamuradio-ohjelmassa.
          - listitem: » Kehitin rekrytointia kilpailullisten tulosten ohella.
      - listitem:
        - text: /» Hallituksen jäsen, sihteeri ja viestintävastaava Aalto Predators \d+/
        - list:
          - listitem: » Rakensin joukkueen ulkoisen viestinnän tyhjästä — otteluraportit, sosiaalisen median sekä nettisivut.
          - listitem: » Hoidin hallinnon ja pöytäkirjat sihteerinä.
      - listitem:
        - text: /» Nuorisovaltuuston hallituksen puheenjohtaja Kirkkonummen kunta \d+/
        - list:
          - listitem: » Johdin hallituksen päätöksentekoa, mukaan lukien Kirkkonummen ensimmäisen (ja Suomen kolmannen) laillisen graffitiseinän avaamisen.
    - heading "Työkokemus" [level=2]
    - list:
      - listitem:
        - text: /» Lead developer OP \(Helsinki\) \d+–/
        - list:
          - listitem: "» Vastaan tiimin palveluiden teknisestä suunnasta: arkkitehtuurista, keskeisistä teknologiavalinnoista ja markkinoilletulonopeuden sekä pitkän aikavälin ylläpidettävyyden välisistä kompromisseista."
          - listitem: » Johdan tiimin teknistä päätöksentekoprosessia ja toimintatapoja — mukaan lukien uusien teknologioiden (tekoäly/ML-työkalut, observability, tietoturva) arviointia ennen käyttöönottoa.
          - listitem: » Rakennan tiimin pitkän aikavälin osaamista ja visiota, jotta tiimi pysyy elinvoimaisena vaatimusten muuttuessa.
          - listitem: » Kehitän tiimin päivittäisessä käytössä olevia tekoälytyökaluja.
