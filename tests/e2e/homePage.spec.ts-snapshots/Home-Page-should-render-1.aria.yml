          - paragraph: Kun sormenjäljet tuotiin passeihin, luotiin Suomessa sähköinen rekisteri johon ne tallennetaan. Sen piti olla vain henkilöllisyyden todistamista varten, mutta nyt hallitus suunnittelee antavansa polii
      - listitem:
