  - article:
    - paragraph: Olen Lauri Lavanti – Kirkkonummen kunnanvaltuutettu Vihreistä, johtava ohjelmistokehittäjä ja diplomi-insinööri. Yhdistän IT-osaamisen, talousajattelun ja paikallispoliittisen kokemuksen, koska digiajan hyvä kunta tarvitsee kaikkia kolmea. Löydät ajatuksiani täältä blogeista – tai tilaat uutiskirjeen, jos haluat ne suoraan sähköpostiisi.
    - heading "Uutiskirje" [level=2]
    - paragraph: Tilaa ja saat pureskeltuja selityksiä ja analyysejä tuoreimmista teknologioista ja niiden vaikutuksista yhteiskuntaan. Suoraan sähköpostiisi.
