          - paragraph: Tänä vuonna tulemme näkemään sen, miten tekoäly vaikuttaa yhteiskuntaamme ei enää pelkästään uutena työkaluna vaan osana yhteiskunnan rakenteita. Parhaillaan se on meille mahdollisuus.
