          - paragraph: Kirkkonummen kunnnavaltuusto hyväksyi 9.3. aloitteeni Pride-liputuksen aloittamisesta Kirkkonummella, kahdesti vuodessa!
      - listitem:
        - article "Digitaalinen itsenäisyys on välttämättömyys":
          - link "Piirretty kuva, jossa vaaleahiuksinen nainen pitää käsissään kannettavaa tietokonetta. Tietokoneen ruudussa on Suomen lippu. Tietokonetta yrittää riistää naiselta valkopäämerikotka. Kuvan ympärillä lukee \"Digital independence\", \"Digitaalinen itsenäisyys\" ja \"Digital självständighet\". Tekijänoikeudet kuvaan ovat Digitaalinen itsenäisyys -kansalaisaloitteella. Digitaalinen itsenäisyys on välttämättömyys":
            - /url: /fi/blog/51/digitaalinen-itsenaisyys-on-valttamattomyys/
            - img "Piirretty kuva, jossa vaaleahiuksinen nainen pitää käsissään kannettavaa tietokonetta. Tietokoneen ruudussa on Suomen lippu. Tietokonetta yrittää riistää naiselta valkopäämerikotka. Kuvan ympärillä lukee \"Digital independence\", \"Digitaalinen itsenäisyys\" ja \"Digital självständighet\". Tekijänoikeudet kuvaan ovat Digitaalinen itsenäisyys -kansalaisaloitteella."
            - heading "Digitaalinen itsenäisyys on välttämättömyys" [level=2]
          - complementary "Kirjoituksen \"Digitaalinen itsenäisyys on välttämättömyys\" meta-tiedot":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Digitaalinen itsenäisyys":
                  - /url: /fi/category/digitaalinen-itsenaisyys/
              - listitem:
                - link "#Digitalisaatio":
                  - /url: /fi/category/digitalisaatio/
          - paragraph: Venäjän naapurina Suomi on oppinut varautumaan. Kuitenkaan käsitteet huoltovarmuudesta ja suvereniteetista eivät ole levinneet digitaalisiin palveluihin.
      - listitem:
        - article "Länsirata nosti esiin ongelmia Kirkkonummen päätöksenteossa":
          - link "Lauri Lavanti nojaamassa korkeaan pöytään. Päällään hänellä on musta bleiseri ja sinivalkoinen kukkakuvioinen kauluspaita. Bleiserin taskussa on monivärinen taskuliina. Taustalla ikkunoita. Länsirata nosti esiin ongelmia Kirkkonummen päätöksenteossa":
            - /url: /fi/blog/50/lansirata-paatos-nosti-esiin-ongelmia-kirkkonummen-pitkajanteisessa-strategisessa-kehittamisessa/
            - img "Lauri Lavanti nojaamassa korkeaan pöytään. Päällään hänellä on musta bleiseri ja sinivalkoinen kukkakuvioinen kauluspaita. Bleiserin taskussa on monivärinen taskuliina. Taustalla ikkunoita."
