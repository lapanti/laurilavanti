    - region "Usein kysytyt kysymykset":
      - heading "Usein kysytyt kysymykset" [level=2]
      - term: Mihin puolueeseen Lauri Lavanti kuuluu?
      - definition: Lauri Lavanti kuuluu Vihreisiin (Vihreä liitto) ja toimii Kirkkonummen kunnanvaltuutettuna sekä Vihreän valtuustoryhmän puheenjohtajana.
      - term: Mikä on Lauri Lavannin tärkein politiikka-alue?
      - definition: Lauri Lavannin tärkein politiikka-alue on digitalisaatio ja sen vaikutukset talouteen, yksityisyyteen ja kilpailukykyyn. Hän yhdistää teknisen asiantuntemuksen talousajatteluun.
      - term: Mitä Lauri Lavanti tekee työkseen?
      - definition: Lauri Lavanti työskentelee johtavana ohjelmistokehittäjänä pankissa ja on koulutukseltaan diplomi-insinööri Aalto-yliopistosta. Hän on erikoistunut digitalisaatioon, yksityisyyden suojaan ja tekoälyn vastuulliseen käyttöönottoon.
      - term: Miten Lauri Lavanti yhdistää teknologian ja politiikan?
      - definition: Lauri Lavanti tuo politiikkaan käytännön IT-asiantuntemuksen ja tarkastelee päätöksentekoa sekä teknisinä että yhteiskunnallisina kokonaisuuksina. Hänen tavoitteenaan on, että julkishallinto pysyy teknologisen kehityksen tahdissa.