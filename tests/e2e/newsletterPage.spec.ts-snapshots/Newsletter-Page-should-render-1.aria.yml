    - heading "Tilaa uutiskirje" [level=1]
    - img "Lauri Lavanti seisoo kädet sivuilla rento hymy kasvoillaan ja katsoo kameraan. Hänellä on päällään valkoinen kauluspaita sinisillä kukkakuvioilla ja tumma pikkutakki. Kuvan otti Erkki Laine."
    - paragraph: Tekoäly, digitalisaatio ja sosiaalinen media muuttavat yhteiskuntaa nopeammin kuin lainsäätäjät ehtivät reagoida. Uutiset ryntäilevät ohi, ja harvalla on aikaa pysähtyä miettimään, mitä muutos oikeasti tarkoittaa arjessa, työssä tai demokratiassa.
    - paragraph: Uutiskirjeessä käyn läpi näitä kysymyksiä rauhassa. En tarjoa helppoja vastauksia enkä hypetä teknologiaa — mutta en myöskään pelottele. Yritän selittää, mitä oikeasti tapahtuu ja miksi se saattaa juuri sinulle olla tärkeää.
    - paragraph: Kirjoitan tyypillisesti kerran tai pari kuussa. Lyhyesti, ytimekkäästi, ilman roskapostia.
    - heading "Uutiskirje" [level=2]
    - paragraph: Tilaa Laurin ajatuksia pureksittuna ja rauhassa luettavaksi suoraan sähköpostiisi.
