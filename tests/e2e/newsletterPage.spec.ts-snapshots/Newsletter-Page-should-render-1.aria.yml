    - heading "Tilaa uutiskirje" [level=1]
    - img "Lauri Lavanti seisoo kädet sivuilla rento hymy kasvoillaan ja katsoo kameraan. Hänellä on päällään valkoinen kauluspaita sinisillä kukkakuvioilla ja tumma pikkutakki. Kuvan otti Erkki Laine."
    - paragraph: Teknologia muuttaa yhteiskuntaa nopeammin kuin kukaan ehtii seurata. Tekoäly, algoritmit, disinformaatio — joka viikolla tulee jotain uutta, ja harvalla on aikaa perehtyä siihen, mitä se kaikki oikeasti tarkoittaa.
    - paragraph: "Uutiskirjeessäni käsittelen yhden aiheen kerrallaan ja avaan sen auki: mitä tapahtuu, mitä se merkitsee, ja mitä siitä pitäisi ajatella. En hypetä enkä pelottele, vaan puran ajatuksiani ja tilannetta auki ymmärrettävässä muodossa."
    - paragraph: Suoraan sähköpostiisi, ilman algoritmeja.
    - heading "Uutiskirje" [level=2]
    - paragraph: Tilaa ja saat pureskeltuja selityksiä ja analyysejä tuoreimmista teknologioista ja niiden vaikutuksista yhteiskuntaan. Suoraan sähköpostiisi.
