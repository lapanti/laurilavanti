  - img "Lauri Lavanti seisoo kädet sivuilla rento hymy kasvoillaan ja katsoo kameraan. Hänellä on päällään valkoinen kauluspaita sinisillä kukkakuvioilla ja tumma pikkutakki. Kuvan otti Erkki Laine."
  - article:
    - paragraph: Kirjoitan uutiskirjeessä tekoälystä, digitaalisesta itsenäisyydestä, yksityisyyden suojasta ja teknologian vaikutuksista yhteiskuntaan. Johtavana ohjelmistokehittäjänä ja diplomi-insinöörinä tarkastelen aiheita sekä teknisestä että yhteiskunnallisesta näkökulmasta — ilman hypetystä ja pelottelua.
