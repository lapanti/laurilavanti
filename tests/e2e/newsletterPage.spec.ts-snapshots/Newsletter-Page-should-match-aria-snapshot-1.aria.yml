- main:
  - heading "Tilaa uutiskirje taloudesta, sivistyksestä ja vapaudesta tekoälyn aikakaudella" [level=1]
  - img "Lauri Lavanti seisoo kädet sivuilla rento hymy kasvoillaan ja katsoo kameraan. Hänellä on päällään valkoinen kauluspaita sinisillä kukkakuvioilla ja tumma pikkutakki. Kuvan otti Erkki Laine."
  - article:
    - paragraph: Uutiskirjeessäni pohdin, miten teknologia, erityisesti tekoäly, muuttaa yhteiskuntaamme, työtämme ja arkeamme. Kirjoituksissani käsittelen esimerkiksi sitä, miksi digitaalinen itsenäisyys on välttämättömyys yhteiskunnalle, miten tekoälyn aiheuttama työn muutos pakottaa meidät uudistumaan ja millaista tulevaisuutta haluamme rakentaa yhdessä.
    - heading "Miten tekoäly muuttaa työtä ja taloutta?" [level=2]
    - paragraph: Uskon, että teknologian tulee mahdollistaa uusia ratkaisuja. Siksi uutiskirjeessäni korostan kestäviä innovaatioita ja herätän keskustelua siitä, miten voimme hyödyntää teknologian tarjoamia mahdollisuuksia. Tavoitteenani on tarjota sinulle ajatuksia herättävää, faktoihin perustuvaa ja ratkaisulähtöistä sisältöä.
    - heading "Viimeaikaisia aiheita" [level=2]
    - list:
      - listitem: » Tekoäly ja ohjelmistokehitys — käsityöstä teollisuudeksi
      - listitem: » Ikärajat someen — miten muualla on tehty, miten pitäisi tehdä, ja pitäisikö ollenkaan?
      - listitem: » Tekoälyn väistämättömyys — olemmeko aktiivisia toimijoita vai muutosten kohde
    - paragraph: Tilaa uutiskirjeeni, niin saat sähköpostiisi ajankohtaisia pohdintoja suoraan.
    - heading "Tilaa uutiskirje" [level=2]
    - paragraph: Tilaamalla uutiskirjeeni saat sähköpostiisi analyysejä tuoreimmista kehityskuluista tekoälyn ja teknologian saralla sekä arvioita niiden vaikutuksista yhteiskuntaan.
    - text: Sähköposti
