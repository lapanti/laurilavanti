                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Education":
                  - /url: /en/category/opetus/
          - paragraph: While the economy does need to be balanced, it is false to claim that education is not being cut heavily. Index increases and a few good legislative reforms do not make up for the billions being cut from education.
      - listitem:
        - article "On family-based immigration":
          - link "Lauri Lavanti pointing out trees to a child he is holding in his arms. On family-based immigration":
            - /url: /en/blog/26/on-family-based-immigration/
            - img "Lauri Lavanti pointing out trees to a child he is holding in his arms."
            - heading "On family-based immigration" [level=2]
          - complementary "Meta information for post \"On family-based immigration\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /en/category/maahanmuutto/
          - paragraph: Those who immigrate on the basis of family ties are a diverse group, including family members of both citizens and immigrants. They are, however, already further along in integration than many others.
      - listitem:
        - article "Congratulations, Finland!":
          - link "A Finnish flag flying on a flagpole. Congratulations, Finland!":
            - /url: /en/blog/25/congratulations-finland/
            - img "A Finnish flag flying on a flagpole."
            - heading "Congratulations, Finland!" [level=2]
          - complementary "Meta information for post \"Congratulations, Finland!\"":
            - time: /\d+\.\d+\.\d+/
          - paragraph: /Finland turns \d+ today\. In honour of that, it is time to rehabilitate the reputation of patriotism\. Finland is one of the finest countries in the world, where everyone is equally valued\./
      - listitem:
        - article "The scale of immigration":
          - link "White outdoor steps leading to a path that goes to a house. The scale of immigration":
            - /url: /en/blog/24/essays-on-immigration-the-scale-of-immigration/
            - img "White outdoor steps leading to a path that goes to a house."
            - heading "The scale of immigration" [level=2]
          - complementary "Meta information for post \"The scale of immigration\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /en/category/maahanmuutto/
          - paragraph: When discussing immigration, the numbers are often left unmentioned or are unclear. The reality, however, is that Finland has literally a fraction of the immigration seen in Denmark and Sweden.
      - listitem:
        - article "On the immigration debate":
          - link "A gravel path leading to a white house. On the immigration debate":
            - /url: /en/blog/23/on-the-immigration-debate/
            - img "A gravel path leading to a white house."
            - heading "On the immigration debate" [level=2]
          - complementary "Meta information for post \"On the immigration debate\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /en/category/maahanmuutto/
          - paragraph: Immigration has for too long been a topic dominated by those who are critical of it. Partly this is because it is an extremely diverse and complex phenomenon. I will now address it properly.
      - listitem:
        - article "One step forward, two steps back":
          - link "Lauri Lavanti pushing a pram on a gravel path, a child walking beside him and houses in the background. One step forward, two steps back":
            - /url: /en/blog/22/one-step-forward-two-steps-back/
            - img "Lauri Lavanti pushing a pram on a gravel path, a child walking beside him and houses in the background."
            - heading "One step forward, two steps back" [level=2]
          - complementary "Meta information for post \"One step forward, two steps back\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Education":
                  - /url: /en/category/opetus/
          - paragraph: /The government is making sensible and necessary reforms to upper secondary education\. However, they do not compensate for the approximately €\d+ million in cuts to vocational education and training\./
      - listitem:
        - article "Responsibility lies with us adults":
          - link "A view from the shore at Wohls Gård. The image shows a sandy path to the waterfront lined with a few white benches. Two benches have people sitting on them, and a child is walking along the sandy path. Responsibility lies with us adults":
            - /url: /en/blog/21/responsibility-lies-with-us-adults/
            - img "A view from the shore at Wohls Gård. The image shows a sandy path to the waterfront lined with a few white benches. Two benches have people sitting on them, and a child is walking along the sandy path."
            - heading "Responsibility lies with us adults" [level=2]
          - complementary "Meta information for post \"Responsibility lies with us adults\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Western Uusimaa":
                  - /url: /en/category/lansi-uusimaa/
          - paragraph: /The 21st century, and the \d+[hmsp]+ in particular, has been a flood of crises and bad news\. At the same time, public debate too often speaks of things negatively or blames young people for behaving badly\./
      - listitem:
        - article /Municipal and regional elections \d+/:
          - link /Lauri Lavanti in outdoor clothing in a forest, leaning against a tree and looking up its trunk\. Municipal and regional elections \d+/:
            - /url: /en/blog/20/municipal-and-regional-elections-2025/
            - img "Lauri Lavanti in outdoor clothing in a forest, leaning against a tree and looking up its trunk."
            - heading /Municipal and regional elections \d+/ [level=2]
          - complementary /Meta information for post "Municipal and regional elections \d+"/:
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Western Uusimaa":
                  - /url: /en/category/lansi-uusimaa/
          - paragraph: /I am standing for election for a growing and sustainable Kirkkonummi in the \d+ municipal elections\. I am also standing in the regional elections in Western Uusimaa\. Most important to me is caring for the opportunities of children and young people\./
      - listitem:
        - article "Saving on children does not pay":
          - link "A small child in overalls climbing on a play structure with a slide and various climbing frames. Saving on children does not pay":
            - /url: /en/blog/19/saving-on-children-does-not-pay/
            - img "A small child in overalls climbing on a play structure with a slide and various climbing frames."
            - heading "Saving on children does not pay" [level=2]
          - complementary "Meta information for post \"Saving on children does not pay\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Early childhood education":
                  - /url: /en/category/varhaiskasvatus/
          - paragraph: The government is proposing various savings measures to early childhood education planning. In practice, however, these measures will not save taxpayers money — the costs are simply shifted.
      - listitem:
        - article "The VBO elections affect us all":
          - link "Portrait of Lauri Lavanti, with forest visible in the background. The VBO elections affect us all":
            - /url: /en/blog/18/vbo-elections-affect-us-all/
            - img "Portrait of Lauri Lavanti, with forest visible in the background."
            - heading "The VBO elections affect us all" [level=2]
          - complementary "Meta information for post \"The VBO elections affect us all\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Urban planning":
                  - /url: /en/category/kaavoitus/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Co-op elections":
                  - /url: /en/category/osuuskauppavaalit/
          - paragraph: The Varuboden-Osla co-op elections are now under way. By voting you influence people's jobs, consumer behaviour and local services.
      - listitem:
        - article "Our nature is our trump card — year after year":
          - link "Trees on a rocky outcrop, with a lake in the background. Our nature is our trump card — year after year":
            - /url: /en/blog/17/our-nature-is-our-trump-card-year-after-year/
            - img "Trees on a rocky outcrop, with a lake in the background."
            - heading "Our nature is our trump card — year after year" [level=2]
          - complementary "Meta information for post \"Our nature is our trump card — year after year\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Infrastructure":
                  - /url: /en/category/infra/
              - listitem:
                - link "#Urban planning":
                  - /url: /en/category/kaavoitus/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
          - paragraph: One of Kirkkonummi's greatest attractions is our nature. The participatory budgeting that has just begun has shown this once again.
      - listitem:
        - article "New year, familiar winter maintenance":
          - link "A poorly ploughed pavement beside a carefully ploughed road. New year, familiar winter maintenance":
            - /url: /en/blog/16/new-year-familiar-winter-maintenance/
            - img "A poorly ploughed pavement beside a carefully ploughed road."
            - heading "New year, familiar winter maintenance" [level=2]
          - complementary "Meta information for post \"New year, familiar winter maintenance\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Infrastructure":
                  - /url: /en/category/infra/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Transport":
                  - /url: /en/category/liikenne/
          - paragraph: Kirkkonummi's winter road maintenance has once again proved as poor as in previous years. Things could be different, if we simply decided together to aim for quality.
      - listitem:
        - article "The municipality must plan for the long term":
          - link "Laajakallio school building in Kirkkonummi The municipality must plan for the long term":
            - /url: /en/blog/15/the-municipality-must-plan-for-the-long-term/
            - img "Laajakallio school building in Kirkkonummi"
            - heading "The municipality must plan for the long term" [level=2]
          - complementary "Meta information for post \"The municipality must plan for the long term\"":
            - time: /\d+\.\d+\.\d+/
          - paragraph: Kirkkonummi's service network survey is a good starting point for evidence-based management. Now the municipality's decision-makers need to decide what kind of municipality we want to build going forward.
      - listitem:
        - article "With words we shape reality":
          - link "Portrait of Lauri Lavanti With words we shape reality":
            - /url: /en/blog/14/with-words-we-shape-reality/
            - img "Portrait of Lauri Lavanti"
            - heading "With words we shape reality" [level=2]
          - complementary "Meta information for post \"With words we shape reality\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
          - paragraph: The Government's communication on promoting equality, gender equality and non-discrimination in Finnish society — more colloquially known as the anti-racism communication — is an important step in how our society addresses racism.
      - listitem:
        - article "Things were better before":
          - link "A cycling lane near Prisma in Kirkkonummi Things were better before":
            - /url: /en/blog/13/things-were-better-before/
            - img "A cycling lane near Prisma in Kirkkonummi"
            - heading "Things were better before" [level=2]
          - complementary "Meta information for post \"Things were better before\"":
            - time: /\d+\.\d+\.\d+/
          - paragraph: That is, for light traffic — pedestrians and cyclists. What if we stopped building society on the terms of private car use?
      - listitem:
        - article "Local nature must be cherished":
          - link "Keijukaispuisto park in Laajakallio, Kirkkonummi Local nature must be cherished":
            - /url: /en/blog/12/local-nature-must-be-cherished/
            - img "Keijukaispuisto park in Laajakallio, Kirkkonummi"
            - heading "Local nature must be cherished" [level=2]
          - complementary "Meta information for post \"Local nature must be cherished\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Urban planning":
                  - /url: /en/category/kaavoitus/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Education":
                  - /url: /en/category/opetus/
              - listitem:
                - link "#Early childhood education":
                  - /url: /en/category/varhaiskasvatus/
          - paragraph: Not every forest needs to be felled. Local nature that is in active use in particular must be preserved, and it is an important part of our municipality.
      - listitem:
        - article "Health belongs to everyone":
          - link "Portrait of Lauri Lavanti Health belongs to everyone":
            - /url: /en/blog/11/health-belongs-to-everyone/
            - img "Portrait of Lauri Lavanti"
            - heading "Health belongs to everyone" [level=2]
          - complementary "Meta information for post \"Health belongs to everyone\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2022/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Social & health reform":
                  - /url: /en/category/soteuudistus/
          - paragraph: By abolishing client fees in social and health care, we save on bureaucracy. We also get to address problems before they become significant. And most importantly, we ensure that no one is left without care for financial reasons.
      - listitem:
        - article "Sote is the cornerstone of the welfare society":
          - link "Portrait of Lauri Lavanti Sote is the cornerstone of the welfare society":
            - /url: /en/blog/10/sote-is-the-cornerstone-of-the-welfare-society/
            - img "Portrait of Lauri Lavanti"
            - heading "Sote is the cornerstone of the welfare society" [level=2]
          - complementary "Meta information for post \"Sote is the cornerstone of the welfare society\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2022/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Social & health reform":
                  - /url: /en/category/soteuudistus/
          - paragraph: Social and health care is expensive. There is no getting around it. But if we do not have a well-functioning social and health care system, can we still call our country a welfare state?
      - listitem:
        - article "What if there were no health centre?":
          - 'link "A road sign reading \"Sosiaali- ja terveyskeskus\" (Social and health centre) and below it the same text in Swedish: \"Social- och hälsocentral\". What if there were no health centre?"':
            - /url: /en/blog/9/what-if-there-were-no-health-centre/
            - 'img "A road sign reading \"Sosiaali- ja terveyskeskus\" (Social and health centre) and below it the same text in Swedish: \"Social- och hälsocentral\"."'
            - heading "What if there were no health centre?" [level=2]
          - complementary "Meta information for post \"What if there were no health centre?\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2022/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Social & health reform":
                  - /url: /en/category/soteuudistus/
          - paragraph: What if Jorvi A&E were the only emergency service for all of Western Uusimaa? What if you always had to queue for hours at Jorvi?
      - listitem:
        - article "The welfare committee — what is it?":
          - link "Lauri Lavanti in front of the Kirkkonummi municipal building. The welfare committee — what is it?":
            - /url: /en/blog/8/the-welfare-committee-what-is-it/
            - img "Lauri Lavanti in front of the Kirkkonummi municipal building."
            - heading "The welfare committee — what is it?" [level=2]
          - complementary "Meta information for post \"The welfare committee — what is it?\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Basic welfare":
                  - /url: /en/category/perustuva/
          - paragraph: The welfare committee responds to residents' appeals in matters related to basic welfare. Although the content of meetings is subject to privacy protection, there is much to learn from these cases.
      - listitem:
        - article "Standing for the regional elections":
          - link "Lauri Lavanti standing in front of a field, with forest in the background. Standing for the regional elections":
            - /url: /en/blog/7/standing-for-the-regional-elections/
            - img "Lauri Lavanti standing in front of a field, with forest in the background."
            - heading "Standing for the regional elections" [level=2]
          - complementary "Meta information for post \"Standing for the regional elections\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2022/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Social & health reform":
                  - /url: /en/category/soteuudistus/
          - paragraph: In the social and health care reform, what matters most is ensuring local services remain close to people, keeping health care as a public service, looking after the wellbeing and adequacy of care staff, and solving the nursing shortage.
      - listitem:
        - article "Kindergartens need teachers":
          - link "Lauri Lavanti playing with his daughter in Moomin World. Kindergartens need teachers":
            - /url: /en/blog/6/kindergartens-need-teachers/
            - img "Lauri Lavanti playing with his daughter in Moomin World."
            - heading "Kindergartens need teachers" [level=2]
          - complementary "Meta information for post \"Kindergartens need teachers\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Early childhood education":
                  - /url: /en/category/varhaiskasvatus/
          - paragraph: There is a glaring shortage of early childhood education teachers in kindergartens. Kirkkonummi now has an opportunity to build a new kind of working environment and make it a trump card for recruiting new teachers and retaining existing ones.
      - listitem:
        - article "Well planned is half done, but…":
          - link "Winellska skolan building in Kirkkonummi. Well planned is half done, but…":
            - /url: /en/blog/5/well-planned-is-half-done-but/
            - img "Winellska skolan building in Kirkkonummi."
            - heading "Well planned is half done, but…" [level=2]
          - complementary "Meta information for post \"Well planned is half done, but…\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Education":
                  - /url: /en/category/opetus/
          - paragraph: The project plan for Gesterby school centre has been sent back from the municipal board for further preparation three times. The project has been investigated and planned for 6 years already, but a new building hasn't even been approved yet.
      - listitem:
        - article "The adequacy of early childhood education must not be compromised":
          - link "Laajakallio kindergarten building in winter. The adequacy of early childhood education must not be compromised":
            - /url: /en/blog/4/the-adequacy-of-early-childhood-education-must-not-be-compromised/
            - img "Laajakallio kindergarten building in winter."
            - heading "The adequacy of early childhood education must not be compromised" [level=2]
          - complementary "Meta information for post \"The adequacy of early childhood education must not be compromised\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Urban planning":
                  - /url: /en/category/kaavoitus/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Early childhood education":
                  - /url: /en/category/varhaiskasvatus/
          - paragraph: The Centre area already has a shortage of day care places. With new zoning plans the need will only grow, and Jokirinne is not the answer. The municipality must ensure adequate early childhood education places.
      - listitem:
        - article "Early childhood education club activities — in the best interests of children":
          - link "Several children's books on a bookshelf. Early childhood education club activities — in the best interests of children":
            - /url: /en/blog/3/early-childhood-education-club-activities/
            - img "Several children's books on a bookshelf."
            - heading "Early childhood education club activities — in the best interests of children" [level=2]
          - complementary "Meta information for post \"Early childhood education club activities — in the best interests of children\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Early childhood education":
                  - /url: /en/category/varhaiskasvatus/
          - paragraph: At the same time as the municipal council decided to abolish the municipal supplement for home care of children under 2, the early childhood education club activities operating in Kirkkonummi were also discontinued.
      - listitem:
        - article "The Kirkkonummi supplement is your benefit too":
          - link "Duplo bricks in a box on top of an automaton. The Kirkkonummi supplement is your benefit too":
            - /url: /en/blog/2/the-kirkkonummi-supplement-is-your-benefit-too/
            - img "Duplo bricks in a box on top of an automaton."
            - heading "The Kirkkonummi supplement is your benefit too" [level=2]
          - complementary "Meta information for post \"The Kirkkonummi supplement is your benefit too\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Early childhood education":
                  - /url: /en/category/varhaiskasvatus/
          - paragraph: The Kirkkonummi supplement benefits not only the families who receive it, but the whole municipality. By offering families with children good services and incentives to move to Kirkkonummi, we keep our municipality vital.
      - listitem:
        - article "Home care allowance supplement — a small cost, a big difference":
          - link "A knitted soft toy, with various children's toys in the background. Home care allowance supplement — a small cost, a big difference":
            - /url: /en/blog/1/home-care-allowance-supplement/
            - img "A knitted soft toy, with various children's toys in the background."
            - heading "Home care allowance supplement — a small cost, a big difference" [level=2]
          - complementary "Meta information for post \"Home care allowance supplement — a small cost, a big difference\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Early childhood education":
                  - /url: /en/category/varhaiskasvatus/
          - paragraph: /Just before Christmas, Kirkkonummi's municipal council decided to abolish the municipal supplement to the home care allowance, the so-called Kirkkonummi supplement\. The supplement was paid at €\d+ per month per child under 2 in home care\./