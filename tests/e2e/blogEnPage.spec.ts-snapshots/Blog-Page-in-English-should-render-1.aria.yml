                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Western railway":
                  - /url: /en/category/lansirata/
          - paragraph: In making the Western Rail Link decision, the ability of decision-makers to make strategically important, forward-looking decisions for the whole municipality was tested.
      - listitem:
        - article "Lyyra, the House of Culture, opens new possibilities and points the way for Kirkkonummi's future":
          - link "An image of Kirkkonummi's new upper secondary school campus, the House of Culture Lyyra, still under construction. Lyyra, the House of Culture, opens new possibilities and points the way for Kirkkonummi's future":
            - /url: /en/blog/49/lyyra-the-house-of-culture-opens-new-possibilities-and-points-the-way/
            - img "An image of Kirkkonummi's new upper secondary school campus, the House of Culture Lyyra, still under construction."
            - heading "Lyyra, the House of Culture, opens new possibilities and points the way for Kirkkonummi's future" [level=2]
          - complementary "Meta information for post \"Lyyra, the House of Culture, opens new possibilities and points the way for Kirkkonummi's future\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Culture & education":
                  - /url: /en/category/sivistys/
          - paragraph: The renovation of Kirkkonummi's centre, in which the cluster of culture formed by Fyyri, Lyyra and Rovastinpuisto is being built, creates conditions for growth in the municipality for decades to come.
      - listitem:
        - article "The use of biometric identifiers in passports must not be expanded":
          - link "A photo of Atte Harjanne and Lauri Lavanti. Both are wearing a black jacket and shirt. The use of biometric identifiers in passports must not be expanded":
            - /url: /en/blog/48/the-use-of-biometric-identifiers-in-passports-must-not-be-expanded/
            - img "A photo of Atte Harjanne and Lauri Lavanti. Both are wearing a black jacket and shirt."
            - heading "The use of biometric identifiers in passports must not be expanded" [level=2]
          - complementary "Meta information for post \"The use of biometric identifiers in passports must not be expanded\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Technology":
                  - /url: /en/category/teknologia/
              - listitem:
                - link "#Privacy":
                  - /url: /en/category/yksityisyydensuoja/
          - paragraph: When fingerprints were introduced in passports, an electronic register was created in Finland in which they are stored. It was only meant to be for proving identity, but now the government plans to grant the police access to it.
      - listitem:
        - article /\d+ is the year of AI/:
          - link /Lauri Lavanti standing in front of a mirror with a phone in his hand, taking a selfie\. Wearing a black jacket, white shirt and green tie\. In the background, the light corridor of the main building of the University of Helsinki\. \d+ is the year of AI/:
            - /url: /en/blog/47/2026-is-the-year-of-ai/
            - img "Lauri Lavanti standing in front of a mirror with a phone in his hand, taking a selfie. Wearing a black jacket, white shirt and green tie. In the background, the light corridor of the main building of the University of Helsinki."
            - heading /\d+ is the year of AI/ [level=2]
          - complementary /Meta information for post "\d+ is the year of AI"/:
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Digitalisation":
                  - /url: /en/category/digitalisaatio/
              - listitem:
                - link "#Artificial intelligence":
                  - /url: /en/category/tekoaly/
          - paragraph: This year we will see how AI affects our society no longer merely as a new tool but as part of society's structures. Right now it is an opportunity for us.
      - listitem:
        - article "I voted for the Western Rail Link":
          - link /A visualisation by Länsirata Oy of what the Veikkola railway station could look like\. The image shows tracks, platforms and a pedestrian overpass\. Taken from https:\/\/lansirata\.sitowise\.com\/\?link=Pysm6# on 8 December \d+\. I voted for the Western Rail Link/:
            - /url: /en/blog/46/i-voted-for-the-western-rail-link/
            - img /A visualisation by Länsirata Oy of what the Veikkola railway station could look like\. The image shows tracks, platforms and a pedestrian overpass\. Taken from https:\/\/lansirata\.sitowise\.com\/\?link=Pysm6# on 8 December \d+\./
            - heading "I voted for the Western Rail Link" [level=2]
          - complementary "Meta information for post \"I voted for the Western Rail Link\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Infrastructure":
                  - /url: /en/category/infra/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Western railway":
                  - /url: /en/category/lansirata/
          - paragraph: I voted for the Western Rail Link. As this is an extremely significant decision that will affect Kirkkonummi for decades if not centuries, I feel it is my duty to justify my decision comprehensively.
      - listitem:
        - article "Fundamental rights must not be dismantled without justification":
          - link "An image of the lights on the roof of a police car. Fundamental rights must not be dismantled without justification":
            - /url: /en/blog/45/fundamental-rights-must-not-be-dismantled-without-justification/
            - img "An image of the lights on the roof of a police car."
            - heading "Fundamental rights must not be dismantled without justification" [level=2]
          - complementary "Meta information for post \"Fundamental rights must not be dismantled without justification\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Technology":
                  - /url: /en/category/teknologia/
              - listitem:
                - link "#Privacy":
                  - /url: /en/category/yksityisyydensuoja/
          - paragraph: The government plans to expand the use of intelligence legislation methods to combat crime. Particularly concerning is the plan to breach fundamental rights by means of the emergency constitutional amendment procedure.
      - listitem:
        - article "AI cannot do everything":
          - link "An illustrative image for artificial intelligence, depicting a machine resembling a human head with various electronic currents flowing in and out of it. AI cannot do everything":
            - /url: /en/blog/44/ai-cannot-do-everything/
            - img "An illustrative image for artificial intelligence, depicting a machine resembling a human head with various electronic currents flowing in and out of it."
            - heading "AI cannot do everything" [level=2]
          - complementary "Meta information for post \"AI cannot do everything\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Digitalisation":
                  - /url: /en/category/digitalisaatio/
              - listitem:
                - link "#Artificial intelligence":
                  - /url: /en/category/tekoaly/
          - paragraph: AI has been presented as a means of making Finland's public services the best in the world. It may indeed have its own role in that, but the most important thing would be a comprehensive evaluation.
      - listitem:
        - article "Who decides what we talk about?":
          - link "A phone with the Facebook app open waiting for login credentials, and the text \"Social media\" made from Scrabble tiles. Who decides what we talk about?":
            - /url: /en/blog/43/who-decides-what-we-talk-about/
            - img "A phone with the Facebook app open waiting for login credentials, and the text \"Social media\" made from Scrabble tiles."
            - heading "Who decides what we talk about?" [level=2]
          - complementary "Meta information for post \"Who decides what we talk about?\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Social media":
                  - /url: /en/category/sosiaalinen-media/
              - listitem:
                - link "#Technology":
                  - /url: /en/category/teknologia/
          - paragraph: Are we prepared for our conversations to be steered by foreign large corporations? There are no guarantees that algorithms would not be used deliberately.
      - listitem:
        - article "Myths about immigration":
          - link "Lauri Lavanti in outdoor clothing in a forest, leaning against a tree and looking up its trunk. Myths about immigration":
            - /url: /en/blog/42/myths-about-immigration/
            - img "Lauri Lavanti in outdoor clothing in a forest, leaning against a tree and looking up its trunk."
            - heading "Myths about immigration" [level=2]
          - complementary "Meta information for post \"Myths about immigration\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Immigration":
                  - /url: /en/category/maahanmuutto/
              - listitem:
                - link "#Equality & equity":
                  - /url: /en/category/tasa-arvo-ja-yhdenvertaisuus/
          - paragraph: Immigration is surrounded by many extremely persistent myths. Those who are critical or hostile towards immigration in particular enjoy reinforcing them.
      - listitem:
        - article "Public transport cannot keep getting more expensive":
          - link "Ronja Karkinen and Lauri Lavanti at a railway station. On the right, the text \"Public transport cannot keep getting more expensive\". Public transport cannot keep getting more expensive":
            - /url: /en/blog/41/public-transport-cannot-keep-getting-more-expensive/
            - img "Ronja Karkinen and Lauri Lavanti at a railway station. On the right, the text \"Public transport cannot keep getting more expensive\"."
            - heading "Public transport cannot keep getting more expensive" [level=2]
          - complementary "Meta information for post \"Public transport cannot keep getting more expensive\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Infrastructure":
                  - /url: /en/category/infra/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Transport":
                  - /url: /en/category/liikenne/
          - paragraph: HSL, the joint municipal authority responsible for public transport in the Helsinki metropolitan area, is planning significant fare increases for buses and trains in the coming years.
      - listitem:
        - article "Everyone has the right to be proud of their existence":
          - link "Two male lions on a savannah. One is sitting and roaring, the other is lying down. Everyone has the right to be proud of their existence":
            - /url: /en/blog/40/everyone-has-the-right-to-be-proud-of-their-existence/
            - img "Two male lions on a savannah. One is sitting and roaring, the other is lying down."
            - heading "Everyone has the right to be proud of their existence" [level=2]
          - complementary "Meta information for post \"Everyone has the right to be proud of their existence\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Equality & equity":
                  - /url: /en/category/tasa-arvo-ja-yhdenvertaisuus/
          - paragraph: Pride. Just reading that one word provokes a reaction in most people who see it. Some find it irritating. In some it awakens great anger. In others it may awaken frustration or indifference.
      - listitem:
        - 'article "Council initiative: annual Pride flag flying in Kirkkonummi"':
          - 'link "Several flagpoles with rainbow flags flying from them. Council initiative: annual Pride flag flying in Kirkkonummi"':
            - /url: /en/blog/39/council-initiative-annual-pride-flag-flying-in-kirkkonummi/
            - img "Several flagpoles with rainbow flags flying from them."
            - 'heading "Council initiative: annual Pride flag flying in Kirkkonummi" [level=2]'
          - 'complementary "Meta information for post \"Council initiative: annual Pride flag flying in Kirkkonummi\""':
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Equality & equity":
                  - /url: /en/category/tasa-arvo-ja-yhdenvertaisuus/
              - listitem:
                - link "#Council motion":
                  - /url: /en/category/valtuustoaloite/
          - paragraph: According to Kirkkonummi's municipal strategy, the municipality promotes equality and equal treatment. Words alone are not enough — actions are needed too, and Pride flag flying is an affordable and easy action.
      - listitem:
        - article "A cold harvest for Kirkkonummi":
          - link "Kirkkonummi's town centre from a high vantage point, with the sun low in the background. A cold harvest for Kirkkonummi":
            - /url: /en/blog/38/a-cold-harvest-for-kirkkonummi/
            - img "Kirkkonummi's town centre from a high vantage point, with the sun low in the background."
            - heading "A cold harvest for Kirkkonummi" [level=2]
          - complementary "Meta information for post \"A cold harvest for Kirkkonummi\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "#Education":
                  - /url: /en/category/opetus/
              - listitem:
                - link "#Early childhood education":
                  - /url: /en/category/varhaiskasvatus/
          - paragraph: The government's mid-term budget session was a cold shower for newly elected municipal decision-makers. Cuts to state subsidies and corporate tax narrow the room for manoeuvre and increase pressure on municipalities.
      - listitem:
        - article "Education is the municipality's most important task":
          - link "A photograph of Laajakallio school. Education is the municipality's most important task":
            - /url: /en/blog/37/education-is-the-municipalitys-most-important-task/
            - img "A photograph of Laajakallio school."
            - heading "Education is the municipality's most important task" [level=2]
          - complementary "Meta information for post \"Education is the municipality's most important task\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Education":
                  - /url: /en/category/opetus/
              - listitem:
                - link "#Early childhood education":
                  - /url: /en/category/varhaiskasvatus/
          - paragraph: The most important topic in the municipal elections is education. Investments in education are the kind that show far into the future, and there are no quick wins to be had there.
      - listitem:
        - article "An absolute no to upper secondary tuition fees":
          - link "A gravel path leading to a white house. An absolute no to upper secondary tuition fees":
            - /url: /en/blog/36/an-absolute-no-to-upper-secondary-tuition-fees/
            - img "A gravel path leading to a white house."
            - heading "An absolute no to upper secondary tuition fees" [level=2]
          - complementary "Meta information for post \"An absolute no to upper secondary tuition fees\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Western Uusimaa":
                  - /url: /en/category/lansi-uusimaa/
          - paragraph: The government believes we should place young people studying at upper secondary level in an unequal position based on whether or not they hold EU citizenship.
      - listitem:
        - article "A growing municipality needs a vibrant centre":
          - link "Kirkkonummi's railway and bus station, with the multi-storey car park visible beside it. A growing municipality needs a vibrant centre":
            - /url: /en/blog/35/a-growing-municipality-needs-a-vibrant-centre/
            - img "Kirkkonummi's railway and bus station, with the multi-storey car park visible beside it."
            - heading "A growing municipality needs a vibrant centre" [level=2]
          - complementary "Meta information for post \"A growing municipality needs a vibrant centre\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Western Uusimaa":
                  - /url: /en/category/lansi-uusimaa/
          - paragraph: The renovation of Kirkkonummi's centre is a golden opportunity for the municipality to make the best possible Kirkkonummi. The more pleasant and vibrant a municipality's centre, the better the municipality does.
      - listitem:
        - article "Assumption is not worth knowledge":
          - link "Lauri Lavanti pointing out trees to a child he is holding in his arms. Assumption is not worth knowledge":
            - /url: /en/blog/34/assumption-is-not-worth-knowledge/
            - img "Lauri Lavanti pointing out trees to a child he is holding in his arms."
            - heading "Assumption is not worth knowledge" [level=2]
          - complementary "Meta information for post \"Assumption is not worth knowledge\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Western Uusimaa":
                  - /url: /en/category/lansi-uusimaa/
          - paragraph: Before elections, parties like to market themselves especially through various images. It is worth, however, challenging candidates on what these images are based on and how things really stand.
      - listitem:
        - article "Municipal elections decide everyday matters":
          - link "White outdoor steps leading to a path that goes to a house. Municipal elections decide everyday matters":
            - /url: /en/blog/33/municipal-elections-decide-everyday-matters/
            - img "White outdoor steps leading to a path that goes to a house."
            - heading "Municipal elections decide everyday matters" [level=2]
          - complementary "Meta information for post \"Municipal elections decide everyday matters\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
          - paragraph: Municipal elections can feel difficult, dull or complicated. Local politics may feel unfamiliar and strange. In the end, though, they are about the everyday matters that affect all of us.
      - listitem:
        - article "Together we are stronger":
          - link "A view from the shore at Wohls Gård. The image shows a sandy path to the waterfront lined with a few white benches. Two benches have people sitting on them, and a child is walking along the sandy path. Together we are stronger":
            - /url: /en/blog/32/together-we-are-stronger/
            - img "A view from the shore at Wohls Gård. The image shows a sandy path to the waterfront lined with a few white benches. Two benches have people sitting on them, and a child is walking along the sandy path."
            - heading "Together we are stronger" [level=2]
          - complementary "Meta information for post \"Together we are stronger\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /en/category/maahanmuutto/
          - paragraph: Growing polarisation and inequality-driving politics are needlessly splitting our small nation apart. Historically, we have done so well precisely because we have come together in difficult moments.
      - listitem:
        - article "On asylum seekers":
          - link "A gravel path leading to a white house. On asylum seekers":
            - /url: /en/blog/31/on-asylum-seekers/
            - img "A gravel path leading to a white house."
            - heading "On asylum seekers" [level=2]
          - complementary "Meta information for post \"On asylum seekers\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /en/category/maahanmuutto/
          - paragraph: There are many misunderstandings around seeking asylum. Commonly heard claims are that people of a certain appearance do not need asylum, or that asylum seekers live at the expense of taxpayers.
      - listitem:
        - article "On those granted asylum":
          - link "A person running in a forest. A lake and a brightly shining sun are visible in the background. On those granted asylum":
            - /url: /en/blog/30/on-those-granted-asylum/
            - img "A person running in a forest. A lake and a brightly shining sun are visible in the background."
            - heading "On those granted asylum" [level=2]
          - complementary "Meta information for post \"On those granted asylum\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /en/category/maahanmuutto/
          - paragraph: Being granted asylum is not a given — it is a process defined in the Geneva Refugee Convention. We also too often forget the people themselves, who have mostly fled their familiar surroundings at risk to their lives.
      - listitem:
        - article "On those who came to study":
          - link "A laptop screen with Google open and the search \"Finland university application\". On those who came to study":
            - /url: /en/blog/29/on-those-who-came-to-study/
            - img "A laptop screen with Google open and the search \"Finland university application\"."
            - heading "On those who came to study" [level=2]
          - complementary "Meta information for post \"On those who came to study\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /en/category/maahanmuutto/
          - paragraph: We invest in those who come to Finland from abroad to study, both through integration and through education. In return we get skilled young labour — yet we still face major challenges in employing them.
      - listitem:
        - article "On labour-based immigration":
          - link "A red house surrounded by trees. On labour-based immigration":
            - /url: /en/blog/28/on-labour-based-immigration/
            - img "A red house surrounded by trees."
            - heading "On labour-based immigration" [level=2]
          - complementary "Meta information for post \"On labour-based immigration\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link /#Regional elections \d+/:
                  - /url: /en/category/aluevaalit2025/
              - listitem:
                - link "#Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link /#Municipal elections \d+/:
                  - /url: /en/category/kuntavaalit2025/
              - listitem:
                - link "#Immigration":
                  - /url: /en/category/maahanmuutto/
          - paragraph: Those who immigrate for work always have the alternative of moving somewhere else. Through them we also gain the skilled labour we need — already trained and educated.
