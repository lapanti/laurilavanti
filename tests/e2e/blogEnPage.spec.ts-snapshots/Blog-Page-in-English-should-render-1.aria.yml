            - /url: /en/blog/50/the-western-rail-link-decision-revealed-problems-in-kirkkonummis-long-term-strategic-development/
            - img "Lauri Lavanti leaning against a tall table. He is wearing a black blazer and a blue-and-white floral-patterned shirt. There is a multicoloured pocket square in the blazer pocket. Windows in the background."
            - heading "The Western Rail Link decision revealed problems in Kirkkonummi's long-term strategic development" [level=2]
          - complementary "Meta information for post \"The Western Rail Link decision revealed problems in Kirkkonummi's long-term strategic development\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Infrastructure":
                  - /url: /en/category/infra/
