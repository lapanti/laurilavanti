          - complementary "Meta information for post \"Who decides what we talk about?\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Social media":
                  - /url: /en/category/sosiaalinen-media/
              - listitem:
                - link "#Technology":
                  - /url: /en/category/teknologia/
          - paragraph: Are we prepared for our conversations to be steered by foreign large corporations? There are no guarantees that algorithms would not be used deliberately.
      - listitem:
