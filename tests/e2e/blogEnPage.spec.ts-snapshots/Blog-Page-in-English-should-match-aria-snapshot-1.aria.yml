    - heading "Freedom" [level=2]
    - paragraph: Freedom in the AI era is not abstract. It is whether your data, your communications and your ordinary life remain yours when most of the infrastructure around them is owned by someone else. Privacy is the basic case — but the broader question is whether civil liberties survive technology that scales surveillance to everyone, almost for free.
    - paragraph: "I have spent my career building software in environments where the rules around data were taken seriously — banking, security, regulated systems. That experience makes one thing obvious: privacy and civil liberties don't protect themselves. They are protected by laws, by procurement choices, and by people in parliament who can read a technical proposal and tell whether it does what it claims."
    - paragraph: Securing freedom in the AI era means being honest about the trade-offs. Mass surveillance, expanding the use of biometric identifiers, and chat scanning are not neutral tools waiting to be used wisely. They reshape the relationship between citizens and the state. The job of parliament is to set limits before the tools are built — not to debate them after the fact.
