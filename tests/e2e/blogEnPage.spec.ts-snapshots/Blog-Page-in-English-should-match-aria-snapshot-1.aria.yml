    - heading "Digital independence" [level=2]:
      - link "Digital independence":
        - /url: /en/category/digital-independence/
    - paragraph: Finland and Europe must control their own digital infrastructure. I authored the citizens' initiative calling for reduced dependency on foreign cloud providers.
    - list:
      - listitem:
        - 'article "Council initiative: digital resilience"':
          - 'link "Lauri Lavanti smiling and looking at the camera. He is wearing a white t-shirt that reads Digitaalinen itsenäisyys (Digital independence) with a lion motif above it, and a blazer. Photo by Erkki Laine. Council initiative: digital resilience"':
            - /url: /en/blog/59/council-initiative-strengthening-kirkkonummis-digital-resilience/
            - img "Lauri Lavanti smiling and looking at the camera. He is wearing a white t-shirt that reads Digitaalinen itsenäisyys (Digital independence) with a lion motif above it, and a blazer. Photo by Erkki Laine."
            - 'heading "Council initiative: digital resilience" [level=2]'
          - 'complementary "Meta information for post \"Council initiative: digital resilience\""':
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "Digital independence":
                  - /url: /en/category/digital-independence/
              - listitem:
                - link "Council motion":
                  - /url: /en/category/council-motion/
          - paragraph: Kirkkonummi relies on digital systems for nearly all its operations. This initiative calls for mapping dependencies and switching to open file formats.
      - listitem:
        - article "Digital independence is built one step at a time":
          - link "Lauri Lavanti smiling and looking at the camera. He is wearing a white t-shirt reading Digitaalinen itsenäisyys with a lion emblem above it, and a blazer. Photo by Erkki Laine. Digital independence is built one step at a time":
            - /url: /en/blog/53/digital-independence-is-built-one-step-at-a-time/
            - img "Lauri Lavanti smiling and looking at the camera. He is wearing a white t-shirt reading Digitaalinen itsenäisyys with a lion emblem above it, and a blazer. Photo by Erkki Laine."
            - heading "Digital independence is built one step at a time" [level=2]
          - complementary "Meta information for post \"Digital independence is built one step at a time\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Digital independence":
                  - /url: /en/category/digital-independence/
              - listitem:
                - link "Digitalisation":
                  - /url: /en/category/digitalisation/
          - paragraph: Digital independence is built in every procurement decision. Helsinki chose Finnish UpCloud as the platform for its core public services system.
      - listitem:
        - article "Digital independence is a necessity":
          - link "A cartoon image showing a blonde woman holding a laptop computer. The Finnish flag is displayed on the computer screen. A bald eagle is attempting to snatch the computer from the woman. The image is surrounded by text that reads 'Digital independence', 'Digitaalinen itsenäisyys' and 'Digital självständighet'. Copyright for the image belongs to the Digital Independence citizens' initiative. Digital independence is a necessity":
            - /url: /en/blog/51/digital-independence-is-a-necessity/
            - img "A cartoon image showing a blonde woman holding a laptop computer. The Finnish flag is displayed on the computer screen. A bald eagle is attempting to snatch the computer from the woman. The image is surrounded by text that reads 'Digital independence', 'Digitaalinen itsenäisyys' and 'Digital självständighet'. Copyright for the image belongs to the Digital Independence citizens' initiative."
            - heading "Digital independence is a necessity" [level=2]
          - complementary "Meta information for post \"Digital independence is a necessity\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Digital independence":
                  - /url: /en/category/digital-independence/
              - listitem:
                - link "Digitalisation":
                  - /url: /en/category/digitalisation/
          - paragraph: Finland's digital services depend on US platforms. As the US becomes unreliable, digital sovereignty is no longer optional — it is a necessity.
