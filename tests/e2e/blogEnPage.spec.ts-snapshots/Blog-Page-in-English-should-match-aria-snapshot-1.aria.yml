- main:
  - heading "Writing" [level=1]
  - img "Lauri Lavanti sitting on a stool leaning against a tall table. He is wearing a black blazer and a blue-and-white floral shirt. In the blazer pocket is a multicoloured pocket square. A staircase in the background."
  - article:
    - paragraph: "AI is changing everything — work, the economy, and how the state serves us. I write about how it lands on three things that have to keep working: the economy, learning, and freedom. Their synthesis is digital independence: a society that uses technology on its own terms."
    - heading "What does it mean to live in the age of AI?" [level=2]
    - paragraph: I have over a decade of hands-on experience building secure software and banking systems. From that background I write about why AI does not merely speed up work but forces us to rethink the whole social safety net, why digital independence is a precondition for a free society, and how to ensure that the benefits of technology reach everyone — not only a few.
    - heading "Artificial intelligence" [level=2]:
      - link "Artificial intelligence":
        - /url: /en/category/artificial-intelligence/
    - paragraph: I use AI tools professionally as a lead developer — I argue from hands-on experience, not theory. Finland must engage with AI actively and critically.
    - list:
      - listitem:
        - article "AI helps secure municipal services, but it is not free":
          - link "Lauri Lavanti stands in a floral shirt against a white background. AI helps secure municipal services, but it is not free":
            - /url: /en/blog/60/ai-helps-secure-municipal-services-but-it-isnt-free/
            - img "Lauri Lavanti stands in a floral shirt against a white background."
            - heading "AI helps secure municipal services, but it is not free" [level=2]
          - complementary "Meta information for post \"AI helps secure municipal services, but it is not free\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Artificial intelligence":
                  - /url: /en/category/artificial-intelligence/
              - listitem:
                - link "Kirkkonummi":
                  - /url: /en/category/kirkkonummi/
              - listitem:
                - link "Digitalisation":
                  - /url: /en/category/digitalisation/
              - listitem:
                - link "Learning":
                  - /url: /en/category/learning/
          - paragraph: In Konnevesi, AI cut processing time for road grants from two months to days. Kirkkonummi is too small to act alone — but collaboration makes change possible.
      - listitem:
        - article "AI changes what developers get paid for":
          - link "A computer screen showing code. AI changes what developers get paid for":
            - /url: /en/blog/57/ai-changes-what-developers-get-paid-for/
            - img "A computer screen showing code."
            - heading "AI changes what developers get paid for" [level=2]
          - complementary "Meta information for post \"AI changes what developers get paid for\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Artificial intelligence":
                  - /url: /en/category/artificial-intelligence/
              - listitem:
                - link "Digitalisation":
                  - /url: /en/category/digitalisation/
              - listitem:
                - link "Learning":
                  - /url: /en/category/learning/
              - listitem:
                - link "Economy":
                  - /url: /en/category/economy/
          - paragraph: AI does in two minutes what used to take a developer two weeks. The price of code is collapsing — but what will developers get paid for instead?
      - listitem:
        - article /\d+ is the year of AI/:
          - link /Lauri Lavanti standing in front of a mirror with a phone in his hand, taking a selfie\. Wearing a black jacket, white shirt and green tie\. In the background, the light corridor of the main building of the University of Helsinki\. \d+ is the year of AI/:
            - /url: /en/blog/47/2026-is-the-year-of-ai/
            - img "Lauri Lavanti standing in front of a mirror with a phone in his hand, taking a selfie. Wearing a black jacket, white shirt and green tie. In the background, the light corridor of the main building of the University of Helsinki."
            - heading /\d+ is the year of AI/ [level=2]
          - complementary /Meta information for post "\d+ is the year of AI"/:
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "Digitalisation":
                  - /url: /en/category/digitalisation/
              - listitem:
                - link "Artificial intelligence":
                  - /url: /en/category/artificial-intelligence/
              - listitem:
                - link "Learning":
                  - /url: /en/category/learning/
          - paragraph: AI is changing society — but perhaps not as you imagine. The biggest changes will be in private life and in the everyday lives of children.
