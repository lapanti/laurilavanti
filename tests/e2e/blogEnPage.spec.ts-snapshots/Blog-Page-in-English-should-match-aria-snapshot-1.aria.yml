- main:
  - heading "Writing" [level=1]
  - img "Lauri Lavanti sitting on a stool leaning against a tall table. He is wearing a black blazer and a blue-and-white floral shirt. In the blazer pocket is a multicoloured pocket square. A staircase in the background."
  - article:
    - paragraph: "AI is changing everything — work, the economy, and how the state serves us. I write about how it lands on three things that have to keep working: the economy, learning, and freedom. Their synthesis is digital independence: a society that uses technology on its own terms."
    - heading "What does it mean to live in the age of AI?" [level=2]
    - paragraph: I have over a decade of hands-on experience building secure software and banking systems. From that background I write about why AI does not merely speed up work but forces us to rethink the whole social safety net, why digital independence is a precondition for a free society, and how to ensure that the benefits of technology reach everyone — not only a few.
    - heading "Artificial intelligence" [level=2]
    - paragraph: I work with AI tools professionally as a lead developer — and I have built my whole team's ways of working with them. I argue from hands-on experience, not theory. AI is the most significant productivity transformation of our time, and Finland must engage with it actively and critically.
    - paragraph: AI amplifies both capability and bias. In public-sector applications — benefits decisions, permit processing, predictive policing — the stakes are too high to deploy systems without transparency and human oversight. I advocate for auditable algorithms in consequential decisions, open-source models where feasible, and mandatory human review for decisions that affect individual rights.
    - paragraph: The more powerful AI becomes, the more important privacy protections are. AI systems are data-hungry; without strong data protection rules, they become surveillance infrastructure. The EU AI Act is a step in the right direction, but implementation must be substantive — not checkbox compliance.
