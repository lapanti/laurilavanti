    - heading "Learning" [level=2]
    - paragraph: Finland's strength has always been its people and their skills. In the AI era, learning has to stay seamless — from early childhood education through working life — so that no one is left behind by a transition that is already underway. Without that, the productivity gains of AI accumulate to a small group while the rest watch their work change without the tools to keep up.
    - paragraph: Education is not a cost item to be trimmed when the budget tightens. It is the central infrastructure of the whole post-AI economy. Cuts to teaching, to libraries, to vocational training and to adult learning are paid back tenfold when the labour market shifts faster than people can learn new things.
    - paragraph: Seamless learning means the path stays open — between schools, between jobs, between life stages. AI makes that path vastly more important. The country that keeps the path open for everyone gets the full potential of its people. That is a stronger foundation than any other competitive advantage.
