    - heading "Economy" [level=2]
    - paragraph: Finland’s economy needs to keep working through the AI transition. That means new companies, new jobs, and public services that actually use the technology rather than buy it as a black box. Without serious technology competence in parliament, decisions about AI procurement, data infrastructure, and labour policy are made by people who don’t know what they are buying.
    - paragraph: "I write about the economy through the lens of what I have done for over a decade: built software and software teams across different industries. AI changes the basis of work, competitiveness and public services. Finland can lead this shift, but only if public investment is targeted at domestic capability in a way that actually understands what is being done."
    - paragraph: "A working economy in the AI era is not a slogan. It is substance: skills that survive the transition, businesses that can build on Finnish and European infrastructure, and a state that procures technology on its own terms."
