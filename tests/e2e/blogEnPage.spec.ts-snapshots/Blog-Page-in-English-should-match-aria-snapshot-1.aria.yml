    - heading "Digital independence" [level=2]
    - paragraph: Finland and Europe must control their own digital infrastructure. I am the lead author of the digital independence citizens' initiative. With it, we demand that Finland reduce its dependency on a small number of foreign digital service providers.
    - paragraph: "/Finnish public administration is heavily dependent on US hyperscalers — for example Amazon, Microsoft, and Google\\. The geopolitical risk of that dependency has grown substantially since \\d+\\. Finnish and European alternatives exist: UpCloud is a concrete example of a high-performance domestic cloud provider that public sector organisations can choose today\\. I advocate for breaking up public IT procurement, preferring open source, and factoring in crisis resilience\\./"
    - paragraph: Digital independence is also about data portability and avoiding vendor lock-in. Public data generated with public money should be portable and stored in a way that foreign states cannot misuse it.
