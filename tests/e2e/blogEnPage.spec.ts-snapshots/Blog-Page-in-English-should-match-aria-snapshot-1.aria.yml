    - heading "Kirkkonummi" [level=2]
    - paragraph: I am a Kirkkonummi municipal councillor. That means I have a say in the municipal budget, zoning, service contracts, and infrastructure — decisions that directly shape what it is like to live here. Most of those decisions are made without much public attention, and that is exactly when it matters who is in the room and what they understand.
    - paragraph: "The issues I push hardest on locally are the same ones I write about nationally: digital services that actually work for residents rather than just checking a procurement box, urban planning that builds on Kirkkonummi's geography instead of fighting it, and public transport that connects the municipality rather than leaving whole neighbourhoods car-dependent."
    - paragraph: "Kirkkonummi is a bilingual, coastal municipality growing fast at the edge of the Helsinki region. It has real assets — shoreline, nature, a mixed community — and real pressures: a revenue base that struggles to keep up with demand, and a rail corridor that matters enormously for how the whole region develops. Local politics here is not small politics."
