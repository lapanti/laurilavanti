- main:
  - article:
    - heading "Endorsements" [level=1]
    - img "Lauri Lavanti standing in a hallway with his hands in his pockets, looking at the camera. Wearing a dark suit and a white dress shirt."
    - complementary "About the endorsements":
      - heading "About the endorsements" [level=2]
      - list:
        - listitem: » Lauri has broad experience in both the tech sector and municipal politics.
        - listitem: » Lauri serves as a municipal councillor in Kirkkonummi and chairs the Green council group.
        - listitem: » Lauri is known for constructive cross-party collaboration.
        - listitem: » In his professional life, Lauri frequently works across expertise and organisational boundaries.
        - listitem: » On this page you'll find endorsements from people who know Lauri.
    - list:
      - listitem:
        - article:
          - img "Photo of Aki Koikkalainen. Wearing a white dress shirt and a dark blazer."
          - blockquote:
            - paragraph: Jos kuitenkin äänestät vihreitä, anna äänesi Laurille. Älystä ja osaamisesta on hyötyä ihan joka puolueessa!
            - text: Aki Koikkalainen CEO
      - listitem:
        - article:
          - img "Photo of Allu Pyhälammi. He is wearing a dark blazer and a large scarf."
          - blockquote:
            - paragraph: Lauri on hyvin nopeasti osoittanut suurta omistautumista ja aktiivisuutta maailman muuttamiselle ja Vihreän politiikan teolle! Häneltä hoituu niin järjestön pyörittäminen, poliittisten teemojen syväosaaminen, vahva ja kestävä sosiaalisen median näkyvyys ja hienot verkostotaidot. Hän on mm. kunnostautunut Suomen digitaalista itsenäisyyttä ajavana moottorina, jolla on aina ihmisen hyvinvointi ja järkevät talousratkaisut toimintansa keskiössä.
            - text: Allu Pyhälammi Deputy Chair of the Greens
      - listitem:
        - article:
          - img "Photo of Atte Harjanne. He is wearing a white dress shirt and a dark blazer."
          - blockquote:
            - paragraph: Eduskunnassa on iso vaje teknologian ja tietopolitiikan asiantuntijoista. Lauri paikkaisi tätä vajetta isosti!
            - text: Atte Harjanne Member of Parliament
      - listitem:
        - article:
          - img "Photo of Juho Makkonen. He is wearing a light blue shirt."
          - blockquote:
            - paragraph: Laurissa vankka osaaminen teknologiasta ja taloudesta yhdistyy vahvaan visioon siitä, miten yhteiskunnasta rakennetaan oikeudenmukaisempi ja parempi paikka kaikille, samalla ympäristöstä huolehtien.
            - text: Juho Makkonen CEO, Sharetribe Oy
      - listitem:
        - article:
          - img "Photo of Mari Holopainen. She is wearing a light-coloured jacket."
          - blockquote: Mari Holopainen Member of Parliament
      - listitem:
        - article:
          - img "Photo of Otso Kivekäs. He is wearing a t-shirt reading Helsinki and a blazer, and a hat."
          - blockquote: Otso Kivekäs CEO, city councillor
      - listitem:
        - article:
          - img "Photo of Sofia Virta. She is wearing a blue shirt and a leather jacket."
          - blockquote: Sofia Virta Member of Parliament