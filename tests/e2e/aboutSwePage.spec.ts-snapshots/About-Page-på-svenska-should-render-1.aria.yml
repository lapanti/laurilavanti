- main:
  - article:
    - heading "I gränslandet mellan teknik och samhälle" [level=1]
    - img "Lauri Lavanti seisomassa ja nojaamassa pylvääseen. Päällään hänellä on musta bleiseri ja sinivalkoinen kukkakuvioinen kauluspaita. Bleiserin taskussa on monivärinen taskuliina. Taustalla ikkunoita."
    - complementary "Fakta om Lauri":
      - heading "Lauri i korthet" [level=2]
      - list:
        - listitem: » Lauri arbetar som ledande utvecklare på banken.
        - listitem: » Lauri har en magisterexamen i teknik från utbildningsprogrammet informationsnätverk från Aalto-universitetet.
        - listitem: » Lauri är fullmäktigeledamot i Kyrkslätt.
        - listitem: » Lauri är ordförande för de Gröna fullmätkigegrupp.
        - listitem: » Lauri har fyra barn, tre döttrar och en son.
        - listitem: » De teman som Lauri fokuserar på inom politik och arbetsliv är digitalisering, integritetsskydd och ansvarsfull implementering av artificiell intelligens.
    - paragraph: Jag är en ledande utvecklare, magister i teknik och politiker. Jag arbetar där tekniken förändrar samhället – och där beslutsfattandet måste hålla jämna steg.
    - paragraph: "Digitalisering, integritetsskydd och ansvarsfull implementering av artificiell intelligens är alla delar av samma helhet: hur vi bygger en teknisk utveckling som är både konkurrenskraftig och hållbar för naturen och människorna."
    - heading "Expert på digitalisering och integritetsskydd" [level=2]
    - paragraph: Jag arbetar som ledande utvecklare och ansvarar för de tekniska lösningarna för vårt teams tjänster. Mitt arbete fokuserar på design, utveckling och underhåll av krävande system. Jag hanterar tekniska riktlinjer och för en aktiv dialog med intressenter för att säkerställa att lösningarna uppfyller verkliga behov och står sig över tid.
    - paragraph: För mig är digitalisering inte bara en teknisk fråga, utan också en social och etisk fråga. Jag ser till att lösningarna inte bara är funktionella idag, utan också säkra och underhållbara imorgon. Tekniken måste vara säker, funktionell och tjäna människorna.
    - heading "Multidisciplinaritet och ett brett perspektiv" [level=2]
    - paragraph: Jag har en magisterexamen i teknik från utbildningsprogrammet informationsnätverk. Programmet är baserat på informationsteknik, men sträcker sig bortom tekniken och omfattar även estetik och filosofi, bland andra ämnen. Programmet lärde mig att se system som både tekniska och mänskliga enheter.
    - paragraph: Min tvärvetenskapliga bakgrund har gett mig förmågan att fungera som en brobyggare och underlätta ömsesidig förståelse mellan olika yrkesgrupper. Jag granskar också alltid tekniken ur perspektivet av dess betydelse, påverkan och ansvar.
    - heading "I politiken" [level=2]
    - paragraph: Jag är fullmäktigeledamot i Kyrkslätt och ordförande för de Gröna fullmäktigegrupp.
    - paragraph: Inom politiken fokuserar jag särskilt på digitalisering, integritetsskydd och en kontrollerad introduktion av artificiell intelligens. Samhället digitaliseras i snabb takt, men den offentliga förvaltningen och beslutsfattandet hänger inte alltid med i utvecklingen.
    - paragraph: Vi behöver en bättre förståelse för de möjligheter och risker som tekniken medför, samt modet att investera i utbildning och högproduktiv teknisk utveckling. Det är viktigt att Finland inte hamnar på efterkälken när det gäller kompetens och konkurrenskraft.
    - heading "Hemma och på min lediga dag" [level=2]
    - paragraph: Vapaa-ajallani keskiössä ovat neljä lastani. Arki koostuu musiikkileikkikouluista, retkistä ja yhteisistä hetkistä. Vanhemmuus opettaa minulle paljon tunnetaidoista, vuorovaikutuksesta ja jatkuvasta harjoittelusta ja kehittymisestä.
    - paragraph: Brädspel, videospel, litteratur och lagsporter har varit en del av mitt liv under lång tid. Även om mitt fullspäckade schema begränsar min tid tycker jag att det är viktigt att ge utrymme för dessa intressen – och jag ersätter lagsporter med aktiv jogging.
