    - region "Vanliga frågor":
      - heading "Vanliga frågor" [level=2]
      - term: Vilken bakgrund har Lauri Lavanti?
      - definition: Lauri Lavanti är ledande mjukvaruutvecklare på en bank och diplomingenjör från Aalto-universitetet. Han är också kommunfullmäktigeledamot i Kyrkslätt och ordförande för Gröna fullmäktigegruppen.
      - term: Hur ställer sig Lauri Lavanti till företagande?
      - definition: Lauri Lavanti driver för lagstiftning som underlättar företagande och vill minska byråkratin för SMF-företag. Han anser att Finland behöver tillväxtorienterade företagare och tydliga digitala förutsättningar för att förbli konkurrenskraftigt.
      - term: Hur stöder Vihreät småföretagare?
      - definition: Vihreät vill minska den administrativa bördan för småföretagare och utveckla digitala tjänster som underlättar företagandet. Lauri Lavanti driver för praktiska reformer som förbättrar SMF-företagens verksamhetsförutsättningar.
      - term: Vad specialiserar sig Lauri Lavanti på politiskt?
      - definition: Lauri Lavanti specialiserar sig på digitalisering, integritetsskydd och kontrollerad implementering av artificiell intelligens. Han granskar teknologi både som tekniska system och ur perspektivet av deras samhälleliga konsekvenser.