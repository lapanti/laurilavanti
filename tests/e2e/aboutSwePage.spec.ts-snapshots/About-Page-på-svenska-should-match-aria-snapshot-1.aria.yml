- main:
  - heading "AI-kompetens hör hemma i beslutsfattandet" [level=1]
  - img "Lauri Lavanti sittande på en stol framför ett fönster, blicken mot kameran, leende. Han har på sig en vit skjorta med blå blomstermönster och en mörk kavaj. Bilden togs av Juha Jantunen."
  - article:
    - complementary "Fakta om Lauri":
      - heading "Lauri i korthet" [level=2]
      - list:
        - listitem: » Förenar praktisk teknologikompetens med ekonomiskt tänkande och samhällsansvar.
        - listitem: » Över ett decennium av erfarenhet av att bygga säker mjukvara, ledande mjukvaruutvecklare på en bank.
        - listitem: » Kommunfullmäktigeledamot i Kyrkslätt, ordförande för Gröna fullmäktigegruppen.
        - listitem: » Diplomingenjör i informationsnätverk, Aalto-universitetet.
        - listitem: » Driver för digital självständighet, integritetsskydd och ett förnuftigt användande av AI.
        - listitem: » Fyra barn.
      - button "Mer"
    - paragraph: Lauri Lavanti bygger mjukvara på en bank och fattar beslut i kommunfullmäktige. Hans syn på teknologi är grundad i praktisk erfarenhet och kompetens – inte i hype eller att stå vid sidlinjen.
    - paragraph: "Han är ledande mjukvaruutvecklare, kommunfullmäktigeledamot i Kyrkslätt samt ordförande för De Grönas fullmäktigegrupp. Han är utexaminerad diplomingenjör från Aalto-universitetet och fokuserar på AI, ekonomisk politik, företagande samt digital självständighet. Digital självständighet, integritetsskydd och ansvarsfull implementering av AI är delar av samma helhet: hur vi bygger teknologisk utveckling som är både konkurrenskraftig och hållbar."
    - paragraph:
      - text: Lauri har också en
      - link "Wikipedia-artikel":
        - /url: https://fi.wikipedia.org/wiki/Lauri_Lavanti
      - text: (på finska).
    - heading "En teknologiexpert som förenar konkurrenskraft och integritetsskydd" [level=2]
    - paragraph: Jag arbetar som ledande mjukvaruutvecklare och ansvarar för de tekniska lösningarna i vårt teams tjänster. I mitt arbete står planering, utveckling och underhåll av krävande helheter i centrum. Jag leder tekniska riktlinjer, bygger teamets AI-verktyg och för en aktiv dialog med intressenter för att säkerställa att lösningarna motsvarar verkliga behov och håller över tid.
    - paragraph: Digitalisering är inte bara en teknisk fråga för mig, utan också en samhällelig och etisk. Jag ser till att lösningarna inte bara fungerar idag, utan också är säkra och underhållbara imorgon. Teknologin ska vara säker, funktionell och tjäna människan.
    - paragraph: Finland har varit ett föregångsland inom högteknologi i decennier. AI förändrar arbete, tjänster och förtroendet för digitala system. Vi behöver människor i beslutsfattande positioner som förstår teknologi på en praktisk nivå.
    - heading "Varför gick jag in i politiken?" [level=2]
    - paragraph: I politiken fokuserar jag särskilt på AI, ekonomisk politik och digitalisering – samt på hur Finland kan förbli konkurrenskraftigt samtidigt som vi säkerställer integritetsskydd och digital självständighet. Samhället digitaliseras kontinuerligt, men den offentliga förvaltningen och beslutsfattandet hänger inte ofta med i utvecklingen. Samma utmaning gäller hela Finland.
    - paragraph: Mina viktigaste förtroendeuppdrag är att vara kommunfullmäktigeledamot i Kyrkslätt och ordförande för Gröna fullmäktigegruppen.
    - paragraph: Vi behöver bättre förståelse för teknologins möjligheter och risker samt mod att satsa på utbildning och högproduktiv teknologisk utveckling. Det är viktigare än någonsin att Finland inte halkar efter i kompetens eller konkurrenskraft.
    - heading "Digital självständighet och medborgarinitiativ" [level=2]
    - paragraph: Jag är initiativtagare och primär kontaktperson för medborgarinitiativet för digital självständighet. Vårt initiativ kräver lagstiftning som säkerställer att kritiska offentliga digitala tjänster och data förblir i händerna på finska och europeiska aktörer – på servrar inom EU/EES-området.
    - paragraph: Digital självständighet stöder europeisk teknologisk utveckling, minskar beroendet av enskilda leverantörer och skapar bättre förutsättningar för inhemsk mjukvaruutveckling. Det är inte en ideologi utan en praktisk förutsättning för ett fungerande samhälle – och det stärker också demokratin och medborgarnas rättigheter, samtidigt som det skapar marknader för ny företagsverksamhet.
    - heading "Mångdisciplinär och bred syn" [level=2]
    - paragraph: Jag är utbildad diplomingenjör i informationsnätverk. Utbildningsprogrammet bygger på datateknik, men breddas från teknik till bland annat estetik och filosofi. Utbildningen har lärt mig att se system som både tekniska och mänskliga helheter.
    - paragraph: Mångdisciplinariteten har gett mig förmågan att smidigt fungera som brobyggare och bygga gemensam förståelse mellan olika yrkesgrupper. Jag granskar teknologin alltid också ur perspektiven av betydelse, påverkan och ansvar. I praktiken innebär det att jag kan kommunicera med både tekniska experter och företrädare för näringslivet – och säkerställa att de förstår varandra.
    - heading "Hemma och på fritiden" [level=2]
    - paragraph: På fritiden står mina fyra barn i centrum. Vardagen består av hobbyer, utflykter och gemensamma stunder. Föräldraskapet lär mig mycket om emotionella färdigheter, interaktion och vikten av ständig övning och utveckling.
    - paragraph: Brädspel, datorspel, litteratur och lagsport har följt med mig länge. Även om de hektiska åren begränsar tiden, tycker jag det är viktigt att bevara utrymme även för dessa intressen, och jag har ersatt lagsport med aktiv löpning. Ett av mina käraste fritidsintressen har varit amerikansk fotboll, där jag spelade defensive lineman och long snapper för Aalto Predators och Helsinki Wolverines. Jag hade också äran att representera Finland i studentlandslaget, bland annat vid de allra första VM på universitetsnivå i Uppsala.
