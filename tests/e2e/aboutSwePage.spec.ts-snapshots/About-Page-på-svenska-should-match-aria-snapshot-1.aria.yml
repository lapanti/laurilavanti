    - heading "Förtroendeuppdrag" [level=2]
    - list:
      - listitem:
        - text: /» Kommunfullmäktigeledamot Kyrkslätt kommun \d+–/
        - list:
          - listitem: » I fullmäktige beslutar vi om kommunstrategin, budgeten samt kritiska och större frågor, såsom skolbyggnader.
      - listitem:
        - text: /» Ordförande för Gröna fullmäktigegruppen Kyrkslätt kommun \d+–/
        - list:
          - listitem: » Ansvarig för att samordna gruppens ställningstaganden och leda dess arbete i fullmäktige.
      - listitem:
        - text: /» Ledamot i kommunutvecklingsnämnden Kyrkslätt kommun \d+–/
        - list:
          - listitem: » Kommunutvecklingsnämnden beslutar om markanvändning och planläggning i kommunen, samt om underhållet av väginfrastrukturen.
      - listitem:
        - text: /» Ordförande Kyrkslätts Gröna \d+/
        - list:
          - listitem: /» Ledde Kyrkslätts Gröna genom kommunalvalet \d+ — befäste partiets ställning som det tredje största partiet i Kyrkslätt med betydande tillväxt i medlemsantal\./
          - listitem: » Byggde och ledde hela kandidatlistan; samarbetade direkt med valledaren om strategi och genomförande.
          - listitem: » Förbättrade organisationen och arbetssätten för att minska beroendet av enskilda personer.
      - listitem: /» Ersättare i nämnden för lokalservice Kyrkslätt kommun \d+–\d+/
      - listitem: /» Ersättare i styrelsen Kyrkslätts Gröna \d+–\d+/
      - listitem: /» Ersättare i direktionen för Västra Nylands räddningsverk Västra Nylands välfärdsområde \d+–\d+/
      - listitem: /» Ersättare i finska fostrings- och utbildningsnämnden Kyrkslätt kommun \d+–\d+/
      - listitem: /» Ledamot i grundtrygghetssektionen Kyrkslätt kommun \d+–\d+/
      - listitem:
        - text: /» Kapten för internationella frågor Gillet Athene för informationsnätverk \d+/
        - list:
          - listitem: » Första styrelseledamot i Athene med ansvar för internationella studenter — rollen var ny eftersom studieprogrammet nyligen hade öppnats för internationella studenter på magisternivå.
          - listitem: » Byggde upp gillet interna rutiner för att stödja internationella studenter.
          - listitem: » Samordnade mellan gillen för att anpassa hur Aaltos tekniska studieprogram betjänar internationella studenter, inte bara inom Athene.
      - listitem:
        - text: /» Lagkapten Aalto Predators \d+–\d+/
        - list:
          - listitem: » Byggde laganda och våra arbetssätt, och ledde genom att föregå med gott exempel.
      - listitem:
        - text: /» Styrelseordförande Aalto Predators \d+–\d+/
        - list:
          - listitem: » Tog laget från näst sista plats i serien till universitätsmästare under min tid.
          - listitem: » Startade direktsändning av våra matcher — sändningen trendade på Reddit och resulterade i en intervju med en av våra kommentatorer i ett amerikanskt morgonradioprogram.
          - listitem: » Byggde upp rekryteringen parallellt med tävlingsresultaten.
      - listitem:
        - text: /» Styrelseledamot, sekreterare och kommunikationsansvarig Aalto Predators \d+/
        - list:
          - listitem: » Byggde lagets externa kommunikation från grunden — matchrapporter, sociala medier och webbplats.
          - listitem: » Skötte styrelseadministration och protokollföring som sekreterare.
      - listitem:
        - text: /» Ordförande för ungdomsfullmäktiges styrelse Kyrkslätt kommun \d+/
        - list:
          - listitem: » Ledde styrelsens beslutsfattande, inklusive öppnandet av Kyrkslätts första (och Finlands tredje) lagliga graffitivägg.
    - heading "Arbetserfarenhet" [level=2]
    - list:
      - listitem:
        - text: /» Lead developer OP \(Helsingfors\) \d+–/
        - list:
          - listitem: "» Ansvarar för den tekniska färdplanen för teamets tjänster: arkitektur, viktiga teknikval och avvägningar mellan time-to-market och långsiktig underhållbarhet."
          - listitem: » Leder teamets process för tekniskt beslutsfattande och arbetssätt — inklusive hur vi utvärderar ny teknik (AI/ML-verktyg, observability, säkerhetsläge) innan vi tar den i bruk.
          - listitem: » Driver långsiktigt kompetens- och visionsarbete för att hålla teamet livskraftigt när kraven förändras.
          - listitem: » Bygger de AI-verktyg som teamet använder dagligen.
      - listitem:
        - text: /» Team Lead Verkkokauppa\.com \(Helsingfors\) \d+–\d+/
        - list:
          - listitem: » Ansvarade för teamets tekniska inriktning och arkitekturbeslut.
          - listitem: » Drev förbättringar av arbetssätten i hela IT-organisationen, inte bara i det närmaste teamet.
          - listitem: "» Ledde utvecklarrekryteringen för teamet: intervjuer, anställningar och introduktion av nya utvecklare i kodbasen och processerna."
      - listitem:
        - text: /» Software developer Verkkokauppa\.com \(Helsingfors\) \d+–\d+/
        - list:
          - listitem: » Ledde teamets process för att förbättra och synkronisera kodbasen mellan team.
          - listitem: » Arbetade mellan utvecklarteamet och produktägaren — hjälpte till att forma affärsmål till genomförbara initiativ och ifrågasatte mål när tekniska förutsättningar krävde det.
          - listitem: » Delade ansvar för utvecklarrekrytering. Skötte introduktionen av nya teammedlemmar i våra system.
      - listitem:
        - text: /» Software developer Gofore \(Helsingfors\) \d+/
        - list:
          - listitem: » Efter att Gofore köpte Solinor fortsatte jag ett tag på samma projekt. Därefter bytte jag till ett liknande projekt inom en annan bransch.
          - listitem: » Ansvarade för frontend-teknikbeslut för PaaS:en, med balans mellan affärsmål och plattformens långsiktiga underhållbarhet.
          - listitem: » Genomförde utvecklarrekrytering för kundorganisationen — intervjuade kandidater och introducerade nya teammedlemmar.
      - listitem:
        - text: /» Software developer Solinor \(Helsingfors\) \d+–\d+/
        - list:
          - listitem: » Konsult i ett stort Platform-as-a-Service-projekt; under större delen av uppdraget var jag teknisk ledare på frontendsidan i nära samarbete med backendteamet och kundens produktägare samt arkitekter.
          - listitem: » Ansvarade för frontend-teknikbeslut för PaaS:en, med balans mellan affärsmål och plattformens långsiktiga underhållbarhet.
          - listitem: » Genomförde utvecklarrekrytering för både Solinor och kundorganisationen — intervjuade kandidater och introducerade nya teammedlemmar.
          - listitem: » Bidrog till Solinors företagsövergripande förbättringar av arbetssätten.
      - listitem:
        - text: /» Software engineer Zalando \(Helsingfors\) \d+–\d+/
        - list:
          - listitem: » Frontend-utvecklare som byggde interna verktyg för Zalandos modedomänexperter — det här verktyget blev också ämnet för mitt diplomarbete, en ontologiredigerare för modedomänexperter.
          - listitem: » Designade och byggde ett visualiserings- och hanteringsverktyg för kunskapsgrafen från grunden med React, TypeScript, D3 och PIXI.js — används av domänexperter för att underhålla den modeontologi som driver Zalandos katalog.
          - listitem: » Arbetade i ett tvärfunktionellt agilt team och ledde frontend-rekryteringen.
      - listitem:
        - text: /» Software developer Futurice \(Helsingfors\) \d+–\d+/
        - list:
          - listitem: » Mjukvaruutvecklare i flera kundprojekt — från en Android-konsumentapp till B2B-plattformar — i tvärfunktionella agila team.
          - listitem: "» Sista projektet: teknisk ledare i ett projekt som levererades av ett team uppdelat mellan kontoren i Helsingfors och Stockholm. Jag reste själv ofta mellan kontoren och träffade alltid även kunder på Stockholmssidan."
          - listitem: » Aktiv gentemot kundernas affärsrepresentanter genomgående i alla projekt, för att förena tekniska realiteter med kundernas mål.
      - listitem:
        - text: /» Software developer Pulmaton Solutions Oy \(Helsingfors\) \d+/
        - list:
          - listitem: » Mjukvaruutvecklare på företagets huvudprodukt — ett molnbaserat ekonomirapporteringsverktyg med Java-backend och HTML/JavaScript/CSS-gränssnitt.
      - listitem:
        - text: /» Seasonal trainee Nokia Solutions & Networks \(Esbo\) \d+/
        - list:
          - listitem: » Praktikant som byggde ett internt ärendehanteringssystem för produktägare i en Scrum-baserad process — implementerat i Python.
    - heading "Utbildning" [level=2]
    - list:
      - listitem:
        - text: /» Diplomingenjör \(informationsnätverk\) Aalto-universitetet \(Esbo\) \d+–\d+/
        - list:
          - listitem: "» Utvidgat huvudämne i ICT in Business — valt framför ett traditionellt biämne för att få mer djup i skärningspunkten mellan teknik, affärsliv och beslutsfattande. Programmet gav mig den verktygslåda jag har använt i varje roll sedan dess: snabb förståelse för komplexa system, kartläggning av hur de interagerar med sin omgivning och förmåga att fungera som översättningslager mellan teknik och affärsverksamhet."
          - listitem: "» Masteruppsats: fallstudie om design och utveckling av ett ontologiredigeringsverktyg för modedomänexperter — gjord på Zalando, där jag byggde verktyget."
          - listitem: » Kandidatens huvudämne användarupplevelse och användbarhet, som lärde mig att se system och krav genom användarens ögon, oavsett hur tekniskt systemet är.
          - listitem: » Kandidatens biämne tillämpningar av datanät, som gav mig grundläggande kunskaper på låg nivå inom IT som jag har använt i varje roll inom bank, detaljhandel och plattformar sedan dess.
          - listitem: "» Kandidatarbete: användning av drönare (då fortfarande kallade \"quadcoptrar\") för lagerhantering."
      - listitem:
        - text: /» Datanomi Omnia yrkesinstitut \(Kyrkslätt\) \d+–\d+/
        - list:
          - listitem: » Datanomi, informationsnätverk och -teknologier, avlagd som en del av en så kallad trippelexamen — fullständigt gymnasium, yrkesexamen och studentexamen samtidigt.
          - listitem: » I gymnasiet låg tyngdpunkten på matematik och samhällskunskap. Den yrkesmässiga delen täckte datanät och -teknologier.
          - listitem: » Jag ville få en färdig yrkesexamen samt tekniskt djup, utöver det studentexamen erbjuder.
      - listitem: /» Student Masaby gymnasium \(Kyrkslätt\) \d+–\d+/