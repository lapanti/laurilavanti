    - img "Lauri Lavanti standing with arms at his sides, a relaxed smile and looking at the camera. He is wearing a white shirt with blue flower patterns and a dark jacket. Photo was taken by Erkki Laine."
    - paragraph: AI, digitalisation and social media are changing society faster than legislators can respond. News rushes past, and few people have time to stop and think about what the change actually means for everyday life, work or democracy. Not to mention how social media algorithms shape which conversations we even get to see.
    - paragraph: In the newsletter I go through these questions calmly. I don’t offer easy answers and I don’t hype technology — but I don’t scaremonger either. I try to explain what is actually happening and why it might matter to you.
    - paragraph: Concisely, to the point, no spam. Straight to you, no gatekeepers.
    - heading "Newsletter" [level=2]
    - paragraph: Subscribe to receive Lauri's thoughts—digested and ready to read at your leisure—delivered straight to your inbox.
