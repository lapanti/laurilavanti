    - region "Vanliga frågor":
      - heading "Vanliga frågor" [level=2]
      - term: Vad innebär AI för den finländska ekonomin?
      - definition: AI förändrar grunderna för arbete, konkurrenskraft och offentliga tjänster — Finland måste bygga upp sin egen kompetens i stället för att bli beroende av utländska plattformar. Lauri Lavanti anser att ekonomisk politik måste svara på denna förändring med konkret teknologikunskap, inte bara allmänna riktlinjer.
      - term: Varför är integritetsskydd en politisk fråga?
      - definition: "Integritetsskydd är en grundläggande rättighet som riskerar att bli ojämlik: den som har resurser och kunskap skyddar sig själv — andra kan inte det. Lauri Lavanti ser det digitala integritetsskyddet som en jämlikhetsfråga som kräver både lagstiftning och genuin teknisk förståelse."
      - term: Vad innebär digital självständighet i praktiken?
      - definition: Digital självständighet innebär att offentliga tjänster, kritisk infrastruktur och medborgarnas data inte är i händerna på ett fåtal utländska företag. Lauri Lavanti förespråkar en politik där Finland och EU bygger upp sin egen teknologibas i stället för att köpa övervakningskapacitet från utlandet.
      - term: Hur syns teknisk expertis i politiskt beslutsfattande?
      - definition: Lauri Lavanti tar med sig praktisk erfarenhet av mjukvaruutveckling och digitala system till beslutsfattandet — han kan avgöra när ett tekniskt argument håller och när det bara är ett säljsnack. Målet är att den offentliga sektorn håller jämna steg med den teknologiska utvecklingen och inte köper lösningar den inte förstår.