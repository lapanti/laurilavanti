- main:
  - heading "Lauri Lavanti" [level=1]
  - heading "Kompetens för AI-eran" [level=2]
  - img "Lauri Lavanti lutar sig mot händerna och tittar in i kameran med ett leende. Han bär en vit skjorta och en mörk kavaj. Foto av Erkki Laine."
  - article:
    - paragraph: "Finland har i decennier varit ett föredöme för hög teknik och kompetens – från Vaisala till isbrytare, Nokia, Linux och Supercell. Nu är dock denna ställning hotad. Samtidigt revolutionerar AI samhället på ett grundläggande sätt: det förändrar arbete, förtroendet för digitala tjänster och människors inbördes relationer. Dessutom sätter statens ekonomiska situation gränser för vad vi kan göra."
    - heading "Varför behövs nytt tänkande just nu?" [level=2]
    - paragraph: Just nu behövs det mer än någonsin kompetens och förståelse för teknik, AI och näringsliv. Jag har en teknisk utbildning från Aalto-universitetet och praktisk erfarenhet från över ett decennium som utvecklare av säkra programvaror och banktjänster. Jag förstår de olika sätten att bedriva näringsverksamhet samt sambandet mellan allt detta och samhället och rättsstaten, som sätter gränser för teknologin.
    - paragraph: "En del av dessa gränser är särskilt värdefulla: de skyddar allas integritet och grundläggande rättigheter. Integritetsskydd är ingen broms för utvecklingen, utan en förutsättning för demokratin."
    - paragraph: Jag är Lauri Lavanti, kommunalråd i Kyrkslätt, ordförande för Grönas fullmäktigegrupp, far till fyra barn, ledande mjukvaruutvecklare och civilingenjör. På dessa sidor hittar du mina tankar om framtiden och vad som väntar oss.
    - heading "Nyhetsbrev" [level=2]
    - paragraph: Prenumerera och få genomarbetade förklaringar och analyser av de senaste teknologierna och deras påverkan på samhället. Direkt till din inkorg.
    - text: E-post
    - textbox "E-post"
    - button "Prenumerera"
    - paragraph:
      - text: Du kan avsluta prenumerationen när som helst. För mer information, läs vår
