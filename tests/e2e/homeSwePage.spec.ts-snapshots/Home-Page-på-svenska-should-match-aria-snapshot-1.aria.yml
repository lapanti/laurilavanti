          - paragraph: Digital självständighet byggs i varje upphandlingsbeslut. Helsingfors valde finska UpCloud som plattform för kärnsystemet för stadens tjänster.
      - listitem:
        - article "Kyrkslätt är mer jämlikt idag än igår":
          - link "Två hanlejon på en savann. Den ena sitter och ryter, den andra ligger ner. Kyrkslätt är mer jämlikt idag än igår":
            - /url: /sv/blog/52/kyrsklatt-ar-mer-jamlikt-idag-an-det-var-igar/
            - img "Två hanlejon på en savann. Den ena sitter och ryter, den andra ligger ner."
            - heading "Kyrkslätt är mer jämlikt idag än igår" [level=2]
          - complementary "Metainformation för inlägget \"Kyrkslätt är mer jämlikt idag än igår\"":
