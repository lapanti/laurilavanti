- main:
  - heading "Lauri Lavanti" [level=1]
  - heading "Om vardagen mitt i digitaliseringen" [level=2]
  - img "Lauri Lavanti lutar sig mot händerna och tittar in i kameran med ett leende. Han bär en vit skjorta och en mörk kavaj. Foto av Erkki Laine."
  - article:
    - paragraph: Jag är Lauri Lavanti – fullmäktigeledamot i Kyrkslätt för De Gröna, ledande programvaruutvecklare och diplomingenjör. Jag kombinerar IT-kunnande, ekonomiskt tänkande och kommunalpolitisk erfarenhet – för en bra kommun i den digitala tidsåldern behövs alla tre. Bläddra i mina blogginlägg, eller prenumerera på nyhetsbrevet om du vill ha dem direkt i din inkorg.
    - heading "Nyhetsbrev" [level=2]
    - paragraph: Prenumerera och få genomarbetade förklaringar och analyser av de senaste teknologierna och deras påverkan på samhället. Direkt till din inkorg.
    - text: E-post
    - textbox "E-post"
    - paragraph:
      - text: Du kan avsluta prenumerationen när som helst. För mer information, läs vår
      - link "integritetspolicy":
        - /url: /sv/privacy-policy/
      - text: .
