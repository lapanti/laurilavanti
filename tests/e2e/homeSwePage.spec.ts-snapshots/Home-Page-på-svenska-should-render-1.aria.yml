      - listitem:
        - article /År \d+ är AI-året/:
          - link /Lauri Lavanti stående framför en spegel med en telefon i handen och tar en selfie\. Klädd i svart jacka, vit skjorta och grön slips\. I bakgrunden den ljusa korridoren i Helsingfors universitets huvudbyggnad\. År \d+ är AI-året/:
            - /url: /sv/blog/47/ar-2026-ar-ai-aret/
            - img "Lauri Lavanti stående framför en spegel med en telefon i handen och tar en selfie. Klädd i svart jacka, vit skjorta och grön slips. I bakgrunden den ljusa korridoren i Helsingfors universitets huvudbyggnad."
            - heading /År \d+ är AI-året/ [level=2]
          - complementary /Metainformation för inlägget "År \d+ är AI-året"/:
