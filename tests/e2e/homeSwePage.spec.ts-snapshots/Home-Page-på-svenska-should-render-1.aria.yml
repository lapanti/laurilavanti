    - region "Vanliga frågor":
      - heading "Vanliga frågor" [level=2]
      - term: Vilket parti tillhör Lauri Lavanti?
      - definition: Lauri Lavanti tillhör De Gröna (Vihreät) och är kommunfullmäktigeledamot i Kyrkslätt samt ordförande för Gröna fullmäktigegruppen.
      - term: Vad fokuserar Lauri Lavanti på politiskt?
      - definition: Lauri Lavanti fokuserar på digitalisering, integritetsskydd och ansvarsfull implementering av artificiell intelligens. Han kombinerar teknisk expertis med ekonomiskt tänkande.
      - term: Vad arbetar Lauri Lavanti med?
      - definition: Lauri Lavanti arbetar som ledande mjukvaruutvecklare på en bank och är diplomingenjör från Aalto-universitetet. Han är specialiserad på digitalisering, integritetsskydd och ansvarsfull AI-implementering.
      - term: Hur kombinerar Lauri Lavanti teknologi och politik?
      - definition: Lauri Lavanti för med sig praktisk IT-expertis in i politiken och betraktar utmaningar som både tekniska och samhälleliga helheter. Hans mål är att den offentliga förvaltningen håller jämna steg med den teknologiska utvecklingen.