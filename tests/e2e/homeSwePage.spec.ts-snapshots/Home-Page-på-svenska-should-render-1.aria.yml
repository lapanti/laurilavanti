      - listitem:
        - article "Lyyra öppnar nya möjligheter för Kyrkslätts framtid":
          - link "En bild av Kyrkslätts nya gymnasiekampus, bildningens hus Lyyra, under konstruktion. Lyyra öppnar nya möjligheter för Kyrkslätts framtid":
            - /url: /sv/blog/49/lyyra-bildningens-hus-oppnar-nya-mojligheter-och-visar-vagen/
            - img "En bild av Kyrkslätts nya gymnasiekampus, bildningens hus Lyyra, under konstruktion."
