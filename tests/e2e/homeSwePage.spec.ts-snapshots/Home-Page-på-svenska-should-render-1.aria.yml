          - paragraph: Den 9 mars godkände Kirkkonummis kommunfullmäktige mitt initiativ att börja hissa Pride-flaggor i Kirkkonummi två gånger om året!
      - listitem:
        - article "Digital självständighet är en nödvändighet":
          - link "En tecknad bild av en blond kvinna som håller en bärbar dator. Den finska flaggan visas på datorskärmen. En vitskallig örn försöker snappa datorn från kvinnan. Runt bilden står det skrivet \"Digital independence\", \"Digitaalinen itsenäisyys\" och \"Digital självständighet\". Upphovsrätten till bilden tillhör medborgarinitiativet Digital självständighet. Digital självständighet är en nödvändighet":
            - /url: /sv/blog/51/digital-sjalvstandighet-ar-en-nodvandighet/
            - img "En tecknad bild av en blond kvinna som håller en bärbar dator. Den finska flaggan visas på datorskärmen. En vitskallig örn försöker snappa datorn från kvinnan. Runt bilden står det skrivet \"Digital independence\", \"Digitaalinen itsenäisyys\" och \"Digital självständighet\". Upphovsrätten till bilden tillhör medborgarinitiativet Digital självständighet."
            - heading "Digital självständighet är en nödvändighet" [level=2]
          - complementary "Metainformation för inlägget \"Digital självständighet är en nödvändighet\"":
            - time: /\d+\.\d+\.\d+/
            - list:
              - listitem:
                - link "#Digital självständighet":
                  - /url: /sv/category/digitaalinen-itsenaisyys/
              - listitem:
                - link "#Digitalisering":
                  - /url: /sv/category/digitalisaatio/
          - paragraph: Som Rysslands granne har Finland lärt sig att vara beredd. Begreppen försörjningstrygghet och suveränitet har dock inte spridit sig till digitala tjänster.
      - listitem:
        - article "Västbanan avslöjade problem i Kyrkslätts beslutsfattande":
          - link "Lauri Lavanti lutar sig mot ett högt bord. Han bär en svart blazer och en blåvit blommönstrad skjorta. I blazerns ficka sitter en flerfärgad näsduk. Fönster i bakgrunden. Västbanan avslöjade problem i Kyrkslätts beslutsfattande":
