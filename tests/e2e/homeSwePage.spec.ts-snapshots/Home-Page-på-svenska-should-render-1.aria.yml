      - listitem:
        - article "Kyrkslätt är mer jämlikt idag än det var igår":
          - link "Två hanlejon på en savann. Den ena sitter och ryter, den andra ligger ner. Kyrkslätt är mer jämlikt idag än det var igår":
            - /url: /sv/blog/52/kyrsklatt-ar-mer-jamlikt-idag-an-det-var-igar/
            - img "Två hanlejon på en savann. Den ena sitter och ryter, den andra ligger ner."
            - heading "Kyrkslätt är mer jämlikt idag än det var igår" [level=2]
          - complementary "Metainformation för inlägget \"Kyrkslätt är mer jämlikt idag än det var igår\"":
