- main:
  - heading "Topics – AI, privacy, education, economics" [level=1]
  - img "Lauri Lavanti sitting on a stool leaning against a tall table. He is wearing a black blazer and a blue-and-white floral shirt. In the blazer pocket is a multicoloured pocket square. A staircase in the background."
  - article:
    - paragraph: Finland has spent decades building technological expertise — from Vaisala and icebreakers to Nokia, Linux and Supercell. That foundation is now under pressure, and at the same time AI is transforming work, digital services and human connection faster than legislators can respond.
    - paragraph: Too often, decision-making lacks an understanding of how technology works and how it affects society. I hold a Master of Science in Engineering from Aalto University, and have over a decade of experience building secure software and banking services. I know how these systems work — and what happens when they don’t.
    - paragraph: Below you’ll find my thoughts organized by topic — from AI to economics, education and freedom, and digital independence.
    - heading "Artificial intelligence" [level=2]:
      - link "Artificial intelligence":
        - /url: /en/category/artificial-intelligence/
    - paragraph: I use AI tools professionally as a lead developer — I argue from hands-on experience, not theory. Finland must engage with AI actively and critically.
    - heading "Technology" [level=2]:
      - link "Technology":
        - /url: /en/category/technology/
    - paragraph: Finland has a strong tradition of technological competence. Maintaining that edge requires people with practical expertise at the table where policy is made.
    - heading "Digital independence" [level=2]:
      - link "Digital independence":
        - /url: /en/category/digital-independence/
    - paragraph: Finland and Europe must control their own digital infrastructure. I authored the citizens' initiative calling for reduced dependency on foreign cloud providers.
    - heading "Digitalisation" [level=2]:
      - link "Digitalisation":
        - /url: /en/category/digitalisation/
    - paragraph: Digitalisation is both an opportunity and a risk. Finland must lead with quality, not just speed — getting it wrong at scale is expensive and hard to reverse.
    - heading "Privacy" [level=2]:
      - link "Privacy":
        - /url: /en/category/privacy/
    - paragraph: Privacy is a democratic prerequisite — not a brake on innovation or security. Without protected private space, free thought and action become impossible.
    - heading "Equality & equity" [level=2]:
      - link "Equality & equity":
        - /url: /en/category/equality-and-non-discrimination/
    - paragraph: Equality is practical governance, not ideology. Every resident deserves equal service quality regardless of background, gender, ethnicity, or disability.
    - heading "Social media" [level=2]:
      - link "Social media":
        - /url: /en/category/social-media/
    - paragraph: Posts about social media and its impact on politics and communication.
    - heading "Education" [level=2]:
      - link "Education":
        - /url: /en/category/education/
    - paragraph: Education is an investment, not a spending item. Cuts that look like savings today accumulate into skills deficits and lost competitiveness for years to come.
    - heading "Culture & education" [level=2]:
      - link "Culture & education":
        - /url: /en/category/culture-and-education/
    - paragraph: Posts about culture, civic education, libraries, and leisure services.
    - heading "Early childhood education" [level=2]:
      - link "Early childhood education":
        - /url: /en/category/early-childhood-education/
    - paragraph: Posts about early childhood education, daycare, and children's services.
    - heading "Social & health reform" [level=2]:
      - link "Social & health reform":
        - /url: /en/category/health-and-social-reform/
    - paragraph: Posts about the social and health reform, welfare areas, and the organisation of health and social services.
    - heading "Basic welfare" [level=2]:
      - link "Basic welfare":
        - /url: /en/category/basic-welfare/
    - paragraph: Posts about basic welfare, social benefits, and social services.