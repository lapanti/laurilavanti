- main:
  - heading "Ämnen – AI, integritet och utbildning" [level=1]
  - img "Lauri Lavanti sitter på en pall och lutar sig mot ett högt bord. Han har på sig en svart kavaj och en blåvit blommig skjorta. I kavajfickan finns en flerfärgad bröstduk. En trappa i bakgrunden."
  - article:
    - paragraph: Finland har under decennier byggt upp ett teknologiskt kunnande — från Vaisala och isbrytare till Nokia, Linux och Supercell. Den grunden är nu under press, och samtidigt förändrar AI arbetet, digitala tjänster och mänskliga relationer snabbare än beslutsfattarna hinner reagera.
    - paragraph: Alltför ofta saknas förståelsen i beslutsfattandet för hur teknologi fungerar och hur den påverkar samhället. Jag har en diplomingenjörsexamen från Aalto-universitetet och mer än ett decenniums erfarenhet av att bygga säker mjukvara och banktjänster. Jag vet hur systemen fungerar — och vad som händer när de inte gör det.
    - paragraph: Nedan hittar du mina tankar uppdelade efter ämne — från AI till ekonomi, bildning och frihet, samt digital självständighet.
    - heading "Artificiell intelligens" [level=2]:
      - link "Artificiell intelligens":
        - /url: /sv/category/artificial-intelligence/
    - paragraph: Jag arbetar med AI-verktyg professionellt som lead developer — jag argumenterar utifrån praktisk erfarenhet. Finland måste engagera sig med AI aktivt.
    - heading "Teknologi" [level=2]:
      - link "Teknologi":
        - /url: /sv/category/technology/
    - paragraph: Finland har en stark tradition av teknologisk kompetens. Att upprätthålla den fördelen kräver praktisk expertis vid bordet där politiska beslut fattas.
    - heading "Digital självständighet" [level=2]:
      - link "Digital självständighet":
        - /url: /sv/category/digital-independence/
    - paragraph: Finland och Europa måste kontrollera sin digitala infrastruktur — jag är huvudinitiativtagare till medborgarinitiativet om digital självständighet.
    - heading "Digitalisering" [level=2]:
      - link "Digitalisering":
        - /url: /sv/category/digitalisation/
    - paragraph: Digitalisering är både en möjlighet och en risk. Finland måste leda med kvalitet, inte bara hastighet — att misslyckas i stor skala är dyrt.
    - heading "Integritetsskydd" [level=2]:
      - link "Integritetsskydd":
        - /url: /sv/category/privacy/
    - paragraph: Integritetsskydd är en demokratisk förutsättning — inte en broms för innovation eller säkerhet. Utan ett skyddat privat utrymme försvåras fritt tänkande.
    - heading "Jämlikhet" [level=2]:
      - link "Jämlikhet":
        - /url: /sv/category/equality-and-non-discrimination/
    - paragraph: Jämlikhet är praktisk förvaltning, inte ideologi. Varje invånare förtjänar likvärdig servicekvalitet oavsett bakgrund, kön, etnicitet eller läggning.
    - heading "Sociala medier" [level=2]:
      - link "Sociala medier":
        - /url: /sv/category/social-media/
    - paragraph: Texter om sociala medier och deras påverkan på politik och kommunikation.
    - heading "Utbildning" [level=2]:
      - link "Utbildning":
        - /url: /sv/category/education/
    - paragraph: Utbildning är en investering, inte en utgiftspost. Nedskärningar idag ackumuleras till kompetensbrist och förlorad konkurrenskraft under lång tid framöver.
    - heading "Bildning" [level=2]:
      - link "Bildning":
        - /url: /sv/category/culture-and-education/
    - paragraph: Texter om bildning, kultur, bibliotek och fritidstjänster.
    - heading "Småbarnspedagogik" [level=2]:
      - link "Småbarnspedagogik":
        - /url: /sv/category/early-childhood-education/
    - paragraph: Texter om småbarnspedagogik, daghem och barntjänster.
    - heading "Vård- och servicereform" [level=2]:
      - link "Vård- och servicereform":
        - /url: /sv/category/health-and-social-reform/
    - paragraph: Texter om vård- och servicereformen, välfärdsområdena och organisering av social- och hälsovårdstjänster.
    - heading "Grundläggande" [level=2]:
      - link "Grundläggande":
        - /url: /sv/category/basic-welfare/
    - paragraph: Texter om grundläggande trygghet, sociala förmåner och socialtjänster.