      - name: Install Playwright Browsers
        run: npm run test:e2e:setup
      - name: Run other tests against production
        env:
          E2E_URL: https://laurilavanti.fi
        run: npm run test:e2e:other
        timeout-minutes: 10
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-prod-other
          path: playwright-report-prod-other/
          retention-days: 30

  lighthouse:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref != 'refs/heads/main'
    name: Lighthouse
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ needs.deploy.outputs.pages-deployment-alias-url }}/fi/
            ${{ needs.deploy.outputs.pages-deployment-alias-url }}/fi/about/
            ${{ needs.deploy.outputs.pages-deployment-alias-url }}/fi/blog/1/kotihoidon-tuen-kuntalisa/
          budgetPath: .github/lighthouse-budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          githubToken: ${{ secrets.GITHUB_TOKEN }}
