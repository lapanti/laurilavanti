name: pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.PUBLIC_CLOUDINARY_CLOUD_NAME }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: build it
        run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: build-folder
          path: dist

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    name: Check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Check types
        run: npm run check

  knip:
    runs-on: ubuntu-latest
    name: Knip
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: knip code
        run: npm run knip

  check-long-words:
    runs-on: ubuntu-latest
    name: Word length check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - name: Check MDX files for words that would cause horizontal scroll
        run: node scripts/check-long-words.mjs $(find src/pages -name '*.mdx')

  validate-translations:
    runs-on: ubuntu-latest
    name: Validate translations
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - name: Check all posts have translations in all languages
        run: node scripts/validate-translations.mjs

  validate-titles:
    runs-on: ubuntu-latest
    name: Validate titles
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - name: Check all page titles meet SEO length requirements
        run: node scripts/validate-titles.mjs

  unit-test:
    runs-on: ubuntu-latest
    name: Unit tests
    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.PUBLIC_CLOUDINARY_CLOUD_NAME }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:coverage
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-folder
          path: coverage
  
  sonarcloud:
    runs-on: ubuntu-latest
    needs: [unit-test]
    name: SonarCloud analysis
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: actions/download-artifact@v8
        with:
          name: coverage-folder
          path: coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  
  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    name: Deploy
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: build-folder
          path: dist
      - id: deploy
        name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=laurilavanti
    outputs:
      pages-deployment-alias-url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}

  test-e2e-snapshots:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref != 'refs/heads/main'
    name: E2E snapshots
    permissions:
      contents: read
    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.PUBLIC_CLOUDINARY_CLOUD_NAME }}
      PLAYWRIGHT_HTML_REPORT: playwright-report-snapshots
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npm run test:e2e:setup
      - name: Run snapshot tests
        env:
          E2E_URL: ${{ needs.deploy.outputs.pages-deployment-alias-url }}
        run: npm run test:e2e:snapshots
        timeout-minutes: 15
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-snapshots
          path: playwright-report-snapshots/
          retention-days: 30

  test-e2e-screenshots:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref != 'refs/heads/main'
    name: E2E screenshots
    permissions:
      contents: read
    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.PUBLIC_CLOUDINARY_CLOUD_NAME }}
      PLAYWRIGHT_HTML_REPORT: playwright-report-screenshots
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npm run test:e2e:setup
      - name: Run screenshot tests
        env:
          E2E_URL: ${{ needs.deploy.outputs.pages-deployment-alias-url }}
        run: npm run test:e2e:screenshots
        timeout-minutes: 15
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-screenshots
          path: playwright-report-screenshots/
          retention-days: 30

  test-e2e-axe:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref != 'refs/heads/main'
    name: E2E axe
    permissions:
      contents: read
    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.PUBLIC_CLOUDINARY_CLOUD_NAME }}
      PLAYWRIGHT_HTML_REPORT: playwright-report-axe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npm run test:e2e:setup
      - name: Run axe accessibility tests
        env:
          E2E_URL: ${{ needs.deploy.outputs.pages-deployment-alias-url }}
        run: npm run test:e2e:axe
        timeout-minutes: 10
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-axe
          path: playwright-report-axe/
          retention-days: 30

  test-e2e-siteimprove:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref != 'refs/heads/main'
    name: E2E siteimprove
    permissions:
      contents: read
    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.PUBLIC_CLOUDINARY_CLOUD_NAME }}
      PLAYWRIGHT_HTML_REPORT: playwright-report-siteimprove
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npm run test:e2e:setup
      - name: Run SiteImprove tests
        env:
          E2E_URL: ${{ needs.deploy.outputs.pages-deployment-alias-url }}
        run: npm run test:e2e:siteimprove
        timeout-minutes: 15
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-siteimprove
          path: playwright-report-siteimprove/
          retention-days: 30

  test-e2e-other:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref != 'refs/heads/main'
    name: E2E other
    permissions:
      contents: read
    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.PUBLIC_CLOUDINARY_CLOUD_NAME }}
      PLAYWRIGHT_HTML_REPORT: playwright-report-other
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npm run test:e2e:setup
      - name: Run other tests
        env:
          E2E_URL: ${{ needs.deploy.outputs.pages-deployment-alias-url }}
        run: npm run test:e2e:other
        timeout-minutes: 10
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-other
          path: playwright-report-other/
          retention-days: 30

  test-e2e-production-snapshots:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main'
    name: E2E production snapshots
    permissions:
      contents: read
    env:
      PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.PUBLIC_CLOUDINARY_CLOUD_NAME }}
      PLAYWRIGHT_HTML_REPORT: playwright-report-prod-snapshots
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npm run test:e2e:setup
      - name: Run screenshot tests against production
        env:
          E2E_URL: https://laurilavanti.fi
        run: npm run test:e2e:snapshots
        timeout-minutes: 15
